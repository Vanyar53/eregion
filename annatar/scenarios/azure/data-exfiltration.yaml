name: azure-data-exfiltration
description: Simulate large outbound data transfer, validate network anomaly detection
mitre: T1041
version: "1.0.0"

target:
  type: azure_vm
  resource_group: annatar             # replace with your resource group
  vm_name: vm-annatar-victim          # replace with your VM name

steps:
  - name: exfiltrate_synthetic_data
    action: run_script_on_vm
    script: scripts/vm/exfil_sim.sh
    record: T0

detection:
  timeout: "300s"
  # CallerIpAddress = VM private IP when uploading via MSI → Glorfindel chooses
  # isolate_vm, not block_suspicious_ip.
  prerequisites:
    - name: storage_blob_logs
      table: StorageBlobLogs
      why: detection rule reads PutBlob (StorageWrite) operations — requires diagnostic settings on /blobServices/default
      verify: "StorageBlobLogs | where AccountName == 'stannatarexfil' | where TimeGenerated > ago(1h) | limit 1"
      setup: >
        Managed by Terraform (storage.tf — azurerm_monitor_diagnostic_setting.exfil_storage).
        If missing: cd infra/terraform && terraform apply.
        Verify at the blob service level, not storage account:
        az monitor diagnostic-settings list --resource <storage_id>/blobServices/default
    - name: vm_managed_identity
      why: exfil_sim.sh uploads via MSI — VM needs Storage Blob Data Contributor on the storage account
      verify: "az role assignment list --assignee <vm_principal_id> --scope <storage_id>"
      setup: "az role assignment create --assignee <vm_principal_id> --role 'Storage Blob Data Contributor' --scope <storage_id>"
  hints:
    log_source: StorageBlobLogs
    attack_commands_summary: >
      Uploads synthetic test files to Azure Blob Storage using az storage blob
      upload-batch via Managed Identity (MSI). Generates PutBlob entries in
      StorageBlobLogs with the VM's private IP as CallerIpAddress.
    expected_indicators:
      - "StorageBlobLogs: OperationName='PutBlob', CallerIpAddress=VM private IP"
      - "Multiple PutBlob operations within a short window (< 5 min)"
      - "Diagnostic settings must be enabled on the storage account"
    failure_candidates:
      - "Wrong AccountName or container name filter in the query"
      - "StorageBlobLogs diagnostic settings not enabled or LAW not linked"
      - "Time window too narrow — uploads complete in < 60s"
