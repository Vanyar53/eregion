name: azure-lateral-movement
description: Simulate SSH brute force from external IP, validate network-level block response
mitre: T1110.001
version: "1.0.0"

target:
  type: azure_vm
  resource_group: annatar             # replace with your resource group
  vm_name: vm-annatar-victim          # replace with your VM name

steps:
  - name: simulate_ssh_brute_force
    action: run_script_on_vm
    script: scripts/vm/lateral_movement_sim.sh
    record: T0

detection:
  timeout: "300s"
  # The rule extracts SourceIP so Glorfindel can block_suspicious_ip on the attacker's IP.
  prerequisites:
    - name: syslog_dcr
      table: Syslog
      why: detection rule reads auth facility — requires a DCR collecting Syslog at Warning+ on the VM
      verify: "Syslog | where Facility == 'auth' | where TimeGenerated > ago(1h) | where Computer == '<vm_name>' | limit 1"
      setup: "Create a DCR with Syslog data source (facility: auth, level: Warning) and associate it with the VM"
    - name: ama_heartbeat
      table: Heartbeat
      why: AMA must be installed for the DCR to collect and ship Syslog data
      verify: "Heartbeat | where TimeGenerated > ago(5m) | where Computer == '<vm_name>' | limit 1"
      setup: "az vm extension set -g <resource_group> --vm-name <vm_name> --publisher Microsoft.Azure.Monitor --name AzureMonitorLinuxAgent"
  hints:
    log_source: Syslog
    attack_commands_summary: >
      Simulates rapid SSH authentication failures via sshpass to a random
      external IP range. Generates 'Failed password' and 'Invalid user'
      Syslog messages in the auth facility, visible via AMA + DCR pipeline.
    expected_indicators:
      - "Syslog: Facility='auth', SyslogMessage contains 'Failed password'"
      - "10+ failures from a single SourceIP within 5 minutes"
      - "SourceIP is an external (non-RFC1918) address"
    failure_candidates:
      - "FailedAttempts threshold too high (>= 10) — lower to >= 5 for faster detection"
      - "SourceIP extraction regex may fail on IPv6 or alternate sshd log formats"
      - "DCR Syslog minimum level may filter out info-level auth messages"
