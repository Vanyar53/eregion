name: azure-privilege-escalation
description: >
  Simulate T1548.003 — attacker with a foothold on the VM escalates to root via a
  misconfigured sudoers wildcard entry. Validates that Glorfindel isolates the VM
  on confirmed OS-level compromise.
mitre: T1548.003
version: "1.0.0"

target:
  type: azure_vm
  resource_group: annatar             # replace with your resource group
  vm_name: vm-annatar-victim          # replace with your VM name

prerequisites:
  detection:
    - name: syslog_dcr
      table: Syslog
      why: detection rule reads auth facility — same DCR pipeline as T1110.001
      verify: "Syslog | where Facility == 'auth' | where TimeGenerated > ago(1h) | where Computer == '<vm_name>' | limit 1"
      setup: "Create a DCR with Syslog data source (facility: auth, level: Warning) and associate it with the VM"
    - name: ama_heartbeat
      table: Heartbeat
      why: AMA must be running — NSG isolation from a previous run blocks AMA (outbound deny-all), causing detection timeout
      verify: "Heartbeat | where TimeGenerated > ago(5m) | where Computer == '<vm_name>' | limit 1"
      setup: "If AMA is silenced by a stale isolation: glorfindel release <resource_id> --yes, then wait ~2 min for AMA to reconnect"

steps:
  - name: simulate_privilege_escalation
    action: run_script_on_vm
    script: scripts/vm/privilege_escalation_sim.sh
    record: T0

# ─── Detection ─────────────────────────────────────────────────────────────────
# Detection config lives in glorfindel/rules/azure/detection_rules.yaml (T1548.003).
# Successful sudo to root → Glorfindel isolates the VM (OS-level compromise).
detection:
  timeout: "300s"
  hints:
    log_source: Syslog
    attack_commands_summary: >
      Configures a sudoers wildcard entry and executes a sudo command as a
      non-privileged user, producing 'sudo: USER=root COMMAND=...' in the
      auth Syslog facility. The command succeeds (no 'NOT in sudoers' error).
    expected_indicators:
      - "Syslog: Facility='auth', SyslogMessage contains 'sudo' and 'USER=root' and 'COMMAND='"
      - "Successful sudo (no 'NOT in sudoers' or 'authentication failure' in the message)"
      - "Same pipeline as T1110 — DCR auth facility must be active"
    failure_candidates:
      - "Query filters 'NOT in sudoers' but legitimate sudo also produces that — may drop valid alerts"
      - "DCR level threshold may suppress info-level sudo log lines"
      - "Time window ago(5m) may miss delayed AMA ingestion (nominal latency ~60s)"
