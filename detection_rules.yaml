# Glorfindel detection rules
# Glorfindel polls these continuously (independent of Annatar scenarios).
# Each rule fires a synthetic "detection" signal when its query returns rows.
#
# source: azure_monitor (others: prometheus, datadog — extend detectors.py)
# interval_s: polling period in seconds (default 30)
# enabled: set to false to disable without deleting

rules:

  - name: ransomware-disk-write
    description: "High disk write rate — T1486 ransomware encryption"
    enabled: true
    source: azure_monitor
    workspace_id: "${AZURE_WORKSPACE_ID}"
    ttp: T1486
    resource_id: "${AZURE_VM_RESOURCE_ID}"
    interval_s: 30
    query: |
      Perf
      | where ObjectName == "LogicalDisk" and CounterName == "Disk Write Bytes/sec"
      | where CounterValue > 10000000
      | summarize avg_write = avg(CounterValue) by Computer
      | where avg_write > 10000000

  - name: data-exfiltration-blob
    description: "Unusual StorageBlobLogs PutBlob volume — T1041"
    enabled: true
    source: azure_monitor
    workspace_id: "${AZURE_WORKSPACE_ID}"
    ttp: T1041
    resource_id: "${AZURE_VM_RESOURCE_ID}"
    interval_s: 60
    query: |
      StorageBlobLogs
      | where OperationName == "PutBlob"
      | where TimeGenerated > ago(5m)
      | summarize count() by CallerIpAddress
      | where count_ > 5

  - name: ssh-brute-force
    description: "Repeated SSH authentication failures — T1110.001"
    enabled: true
    source: azure_monitor
    workspace_id: "${AZURE_WORKSPACE_ID}"
    ttp: T1110.001
    resource_id: "${AZURE_VM_RESOURCE_ID}"
    interval_s: 30
    query: |
      Syslog
      | where Facility == "auth"
      | where SyslogMessage has "Failed password"
      | where TimeGenerated > ago(5m)
      | summarize count() by HostName, SourceSystem
      | where count_ > 10

  - name: sudo-privilege-escalation
    description: "sudo to root from non-privileged user — T1548.003"
    enabled: true
    source: azure_monitor
    workspace_id: "${AZURE_WORKSPACE_ID}"
    ttp: T1548.003
    resource_id: "${AZURE_VM_RESOURCE_ID}"
    interval_s: 30
    query: |
      Syslog
      | where Facility == "auth"
      | where SyslogMessage has "sudo" and SyslogMessage has "root"
      | where SyslogMessage !has "session opened for user root by root"
      | where TimeGenerated > ago(5m)
