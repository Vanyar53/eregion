<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glorfindel — War Room</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg1:       #161b22;
    --bg2:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --dim:       #7d8590;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --orange:    #e3b341;
    --blue:      #58a6ff;
    --cyan:      #39d353;
    --purple:    #bc8cff;
    --font:      ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { color: var(--blue); font-weight: 700; font-size: 15px; letter-spacing: 2px; }
  .subtitle { color: var(--dim); font-size: 12px; }
  #live-dot { color: var(--green); font-size: 10px; animation: pulse 2s infinite; }
  #live-dot.disconnected { color: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .spacer { flex: 1; }

  #clock { color: var(--dim); font-size: 11px; }

  .scenario-row { display: flex; gap: 8px; align-items: center; }
  select, button {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }
  select:hover, button:hover { border-color: var(--blue); }
  button.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
  button.primary:hover { background: #388bfd; }
  button.danger  { background: #b62324; border-color: #f85149; color: #fff; }
  button.danger:hover  { background: #f85149; }
  button.action  { background: var(--bg2); border-color: var(--border); font-size: 11px; padding: 3px 8px; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Main layout ── */
  main {
    display: flex;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Feed column (LEFT, fixed width) ── */
  #feed-col {
    width: 390px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  .feed-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    font-size: 11px;
    border-radius: 4px;
    transition: background .1s;
  }
  .feed-entry:hover { background: var(--bg1); padding-left: 4px; padding-right: 4px; }
  .feed-ts   { color: var(--dim); font-size: 10px; flex-shrink: 0; width: 100px; }
  .feed-event{ flex-shrink: 0; width: 160px; font-weight: 600; }
  .feed-meta { color: var(--dim); font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .feed-pct  { color: var(--dim); font-size: 10px; flex-shrink: 0; }

  .ev-attack_started    { color: var(--yellow); }
  .ev-detection         { color: var(--green); }
  .ev-detection_timeout { color: var(--orange); }
  .ev-recovery_complete { color: var(--cyan); }
  .ev-recovery_failed   { color: var(--red); }

  .act-ok  { color: var(--green); }
  .act-esc { color: var(--red); }
  .act-run { color: var(--blue); }
  .act-err { color: var(--red); }

  /* ── Incidents column (RIGHT, flex:1) ── */
  #incidents-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    padding: 10px 16px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .infra-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--dim);
    flex: 1;
  }
  .infra-sub {
    font-size: 10px;
    color: var(--dim);
    font-weight: 400;
    margin-left: auto;
  }
  .readiness-inline {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    font-size: 10px;
  }
  .readiness-inline span { color: var(--dim); }
  #incidents-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── Infrastructure Map ── */
  .infra-map {
    position: relative;
    display: grid;
    grid-template-areas:
      "network  monitoring"
      "compute  compute"
      "backup   storage";
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    align-items: start;
    align-content: start;
    gap: 10px;
    padding: 12px;
    flex: 1;
  }
  .map-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .map-zone {
    position: relative;
    z-index: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg1);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .map-zone.zone-alert  { border-color: var(--red);    background: color-mix(in srgb, var(--red)    6%, var(--bg1)); }
  .map-zone.zone-warn   { border-color: var(--orange); background: color-mix(in srgb, var(--orange) 6%, var(--bg1)); }
  .map-zone.zone-ok     { border-color: var(--border); }
  .zone-network    { grid-area: network; }
  .zone-monitoring { grid-area: monitoring; }
  .zone-compute    { grid-area: compute; }
  .zone-backup     { grid-area: backup; }
  .zone-storage    { grid-area: storage; }
  .zone-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dim);
    margin-bottom: 2px;
  }
  .map-node {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
  }
  .map-node-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .map-node-name { flex: 1; color: var(--text); }
  .map-node-body { color: var(--dim); font-size: 10px; line-height: 1.6; }
  .map-node-body .row { display: flex; align-items: baseline; gap: 6px; }
  .map-decision {
    margin-top: 6px;
    padding: 5px 8px;
    background: var(--bg1);
    border-radius: 4px;
    border-left: 2px solid var(--border);
    font-size: 10px;
    line-height: 1.5;
  }
  .map-decision .dec-row {
    display: flex; align-items: baseline; gap: 6px; padding: 1px 0;
  }
  .map-decision .dec-action { color: var(--cyan); font-weight: 700; }
  .map-decision .dec-conf   { color: var(--orange); }
  .map-decision .dec-ttp    { color: var(--dim); font-size: 9px; }
  .map-decision .dec-text   { color: var(--dim); font-size: 9px; display: block; padding-left: 2px; }
  .map-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* ── VM Card ── */
  .vm-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .vm-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .vm-dot { font-size: 10px; }
  .vm-name { font-weight: 700; font-size: 13px; flex: 1; }
  .vm-age  { font-size: 10px; color: var(--dim); }

  .vm-card-body { padding: 10px 14px; }

  .state-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: .5px;
  }
  .badge.isolated  { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .badge.blocked   { background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .badge.restoring { background: #0d2035; color: var(--blue); border: 1px solid #1a4060;
                     animation: pulse 2s infinite; }
  .restore-progress { background: #0a1a2a; border-radius: 4px; padding: 4px 6px; }
  .state-detail    { color: var(--dim); font-size: 11px; }

  /* ── Escalation items ── */
  .vm-escalations {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .esc-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .esc-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .esc-action-label { font-weight: 700; font-size: 12px; color: var(--orange); flex: 1; }
  .esc-context { color: var(--dim); font-size: 10px; margin-bottom: 4px; }
  .esc-reason  { color: var(--dim); font-size: 11px; line-height: 1.5; margin-bottom: 4px; }
  .esc-steps { margin-top: 6px; border-left: 2px solid var(--border); padding-left: 8px; display: flex; flex-direction: column; gap: 3px; }
  .esc-step  { color: var(--dim); font-size: 10px; line-height: 1.5; }
  .esc-query { background: var(--bg2); border-left: 2px solid var(--cyan); padding: 8px;
               font-size: 10px; color: var(--blue); white-space: pre-wrap; overflow-x: auto;
               margin: 6px 0; border-radius: 0 4px 4px 0; }

  .vm-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
  }
  .empty-state .check { font-size: 24px; color: var(--green); margin-bottom: 8px; }

  /* ── Config panel ── */
  #config-panel { font-size: 12px; }
  .cfg-section { margin-bottom: 4px; }
  .cfg-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .cfg-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 4px 0; border-bottom: 1px solid var(--bg2);
  }
  .cfg-key   { color: var(--dim); font-size: 11px; flex-shrink: 0; width: 130px; }
  .cfg-val   { color: var(--text); font-size: 11px; word-break: break-all; }
  .cfg-badge {
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 4px; flex-shrink: 0;
  }
  .cfg-badge.ok  { background: #1a3a1a; color: var(--green); border: 1px solid #2d5a2d; }
  .cfg-badge.warn{ background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .cfg-badge.err { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .cfg-badge.dim { background: var(--bg2); color: var(--dim); border: 1px solid var(--border); }

  .ttp-table { width: 100%; border-collapse: collapse; }
  .ttp-table th { padding: 4px 8px; font-size: 10px; color: var(--dim); text-align: left; border-bottom: 1px solid var(--border); }
  .ttp-table td { padding: 5px 8px; font-size: 11px; border-bottom: 1px solid var(--bg2); }
  .ttp-table td:first-child { color: var(--blue); font-weight: 600; }
  .ttp-table td:last-child { text-align: right; }

  button#config-toggle.active { border-color: var(--blue); color: var(--blue); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 100;
    max-width: 320px;
  }
  #toast.show { opacity: 1; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    min-width: 360px;
    max-width: 520px;
  }
  .modal-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .modal-body  { color: var(--dim); font-size: 12px; line-height: 1.6; margin-bottom: 16px; }
  .modal-cmd   { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
                 padding: 8px 12px; font-family: var(--font); font-size: 11px; color: var(--cyan);
                 white-space: pre-wrap; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--dim);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <span class="logo">GLORFINDEL</span>
  <span class="subtitle">War Room</span>
  <span id="watch-dot" style="font-size:10px;color:var(--dim)">●</span>
  <span id="watch-label" style="color:var(--dim);font-size:11px">watch…</span>
  <span style="color:var(--border);margin:0 4px">│</span>
  <span id="live-dot">●</span>
  <span id="live-label" style="color:var(--dim);font-size:11px">connecting…</span>

  <div class="spacer"></div>

  <div class="scenario-row">
    <select id="scenario-select"><option value="">Run scenario…</option></select>
    <button class="primary" id="run-btn" disabled>▶ Run</button>
  </div>

  <button id="config-toggle" class="action" onclick="toggleConfig()" title="Azure configuration">⚙ Config</button>
  <span id="clock" style="min-width:70px;text-align:right"></span>
</header>

<main>
  <!-- Feed LEFT -->
  <div id="feed-col">
    <div class="col-header">LIVE FEED</div>
    <div id="feed-list"></div>
  </div>

  <!-- Infrastructure / Config RIGHT -->
  <div id="incidents-col">
    <div class="col-header" id="right-col-header">INFRASTRUCTURE</div>
    <div id="incidents-list">
      <div class="empty-state">
        <div class="check">✓</div>
        <div>All clear — no active incidents</div>
        <div style="margin-top:6px;font-size:11px">Run a scenario to start</div>
      </div>
    </div>
    <div id="config-panel" style="display:none;flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:16px;"></div>
  </div>
</main>

<div id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-cmd"   id="modal-cmd" style="display:none"></div>
    <div class="modal-actions">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-confirm" class="primary"></button>
    </div>
  </div>
</div>

<script>
// ── Label maps (mirrors escalations.py) ────────────────────────────────────────

const ACTION_LABELS = {
  isolate_vm:           'VM isolée du réseau',
  release_isolation:    'Isolation levée',
  snapshot:             'Snapshot forensique créé',
  block_suspicious_ip:  'IP suspecte bloquée',
  revoke_temp_access:   'Accès temporaire révoqué',
  restore_from_backup:  'Restauration depuis backup',
  delete_resource:      'Ressource supprimée',
  wipe_storage:         'Stockage effacé',
  modify_network_rule:  'Règle réseau modifiée',
  escalate_permissions: 'Permissions élevées',
};

const ESC_LABELS = {
  low_confidence:      'detection timeout',
  destructive_action:  'action destructive',
  proposed_action:     'action inconnue',
  verification_failed: 'vérification échouée',
  proposed_rule:       'règle proposée',
  ttl_exceeded:        'TTL expiré',
};

function actionLabel(action) {
  return ACTION_LABELS[action] || action;
}

function escLabel(type) {
  return ESC_LABELS[type] || type;
}

function cliCommand(esc) {
  const rid = esc.resource_id;
  const id  = esc.id.slice(0, 8);
  if (esc.action === 'restore_from_backup') {
    return `glorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'verification_failed') {
    return `glorfindel revert ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'low_confidence') {
    return `# Vérifier le snapshot, puis si nécessaire :\nglorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  return `glorfindel ack ${id}`;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function age(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm ago';
}

function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toISOString().slice(11, 19) + ' UTC';
}

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function openModal(title, body, cmd, confirmLabel, confirmClass, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const cmdEl = document.getElementById('modal-cmd');
  if (cmd) { cmdEl.textContent = cmd; cmdEl.style.display = ''; }
  else cmdEl.style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = confirmLabel;
  btn.className = confirmClass;
  btn.onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modal').classList.add('open');
}

function openCommandModal(escId) {
  const esc = _escById[escId];
  if (!esc) return;
  const cmd = cliCommand(esc);
  const label = actionLabel(esc.action);
  document.getElementById('modal-title').textContent = '📋 ' + label;
  document.getElementById('modal-body').textContent = 'Commande CLI à exécuter pour cette escalade :';
  const cmdEl = document.getElementById('modal-cmd');
  cmdEl.textContent = cmd;
  cmdEl.style.display = '';
  document.getElementById('modal-cancel').style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = () => {
    closeModal();
    document.getElementById('modal-cancel').style.display = '';
  };
  document.getElementById('modal').classList.add('open');
}

// ── State ──────────────────────────────────────────────────────────────────────

let _state      = { resources: [], escalations: [] };
let _escById    = {};
let _cfgData    = null;
let _auditData  = null;
let _actionsCache = {};   // vm_name → {actions, fetchedAt}
let _autoScroll = true;

// ── Clock ──────────────────────────────────────────────────────────────────────

setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toISOString().slice(11, 19) + ' UTC';
}, 1000);

// ── Scenarios ──────────────────────────────────────────────────────────────────

async function loadScenarios() {
  try {
    const r = await fetch('/api/scenarios');
    const data = await r.json();
    const sel = document.getElementById('scenario-select');
    data.scenarios.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      document.getElementById('run-btn').disabled = !sel.value;
    });
  } catch (e) {}
}

document.getElementById('run-btn').addEventListener('click', () => {
  const name = document.getElementById('scenario-select').value;
  if (!name) return;
  openModal(
    'Run scenario',
    `This will launch annatar run scenarios/azure/${name}.yaml on the live Azure infrastructure.`,
    `annatar run scenarios/azure/${name}.yaml`,
    '▶ Run',
    'primary',
    () => runScenario(name),
  );
});

async function runScenario(name) {
  toast('⚡ Starting ' + name + '…');
  try {
    await fetch(`/api/run/${name}`, { method: 'POST' });
  } catch (e) {
    toast('✗ Failed to start scenario: ' + e.message);
  }
}

// ── Infrastructure cards ───────────────────────────────────────────────────────

function _renderEscItem(e) {
  const label = actionLabel(e.action);
  const ctx   = [e.ttp, e.severity, escLabel(e.escalation_type)].filter(Boolean).join(' · ');
  const steps = (e.suggested_steps || []).slice(0, 3);
  const stepsHtml = steps.length
    ? `<div class="esc-steps">${steps.map(s => `<div class="esc-step">• ${s}</div>`).join('')}</div>` : '';
  const escId = e.id;
  const isRule = e.action === 'improve_detection' && e.proposal_id;
  const queryHtml = isRule && e.proposed_query
    ? `<pre class="esc-query">${e.proposed_query.trim()}</pre>` : '';
  const ruleButtons = isRule ? `
    <button class="action ok" onclick="doApproveRule('${e.proposal_id}','${escId}')" style="flex-shrink:0">✓ Approve</button>
    <button class="action" onclick="doRejectRule('${e.proposal_id}','${escId}')" style="flex-shrink:0;color:var(--red)">✗ Reject</button>` : '';
  return `<div class="esc-item">
    <div class="esc-item-header">
      <span class="esc-action-label">🚨 ${label}</span>
      <button class="action" onclick="confirmAck('${escId}')" style="flex-shrink:0">✓ Ack</button>
      <button class="action" onclick="openCommandModal('${escId}')" style="flex-shrink:0">📋 Cmd</button>
      ${ruleButtons}
    </div>
    ${ctx ? `<div class="esc-context">${ctx}</div>` : ''}
    <div class="esc-reason">${e.reason}</div>
    ${queryHtml}${stepsHtml}
  </div>`;
}

function _escFooter(escs) {
  if (!escs.length) return '';
  return `<div class="vm-escalations" style="margin:0;padding:8px 14px;border-top:1px solid var(--border)">
    ${escs.map(_renderEscItem).join('')}
  </div>`;
}

// ── Map rendering ──────────────────────────────────────────────────────────────


function _dot(color) {
  return `<span style="color:${color};font-size:10px">●</span>`;
}

function _zoneClass(status) {
  return status === 'alert' ? 'zone-alert' : status === 'warn' ? 'zone-warn' : 'zone-ok';
}

function _networkZone(resources, escalations) {
  const isIsolated = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked  = resources.some(r => r.states?.some(s => s.type === 'blocked'));
  const status = isIsolated ? 'alert' : isBlocked ? 'warn' : 'ok';
  const dot = isIsolated ? _dot('var(--red)') : isBlocked ? _dot('var(--orange)') : _dot('var(--green)');

  const blockRows = resources.flatMap(r =>
    (r.states || []).filter(s => s.type === 'blocked').map(s =>
      `<div class="row"><span class="badge blocked" style="font-size:9px">BLOCKED</span>
       <span>${s.ip}</span><span style="color:var(--dim)">${age(s.since)}</span></div>`
    )
  ).join('');

  const isolRows = resources.filter(r => r.states?.some(s => s.type === 'isolated')).map(r =>
    `<div class="row"><span class="badge isolated" style="font-size:9px">DENY-ALL</span>
     <span style="color:var(--dim)">${r.vm_name}</span></div>`
  ).join('');

  return `<div class="map-zone zone-network ${_zoneClass(status)}" id="zone-network">
    <div class="zone-label">NETWORK</div>
    <div class="map-node">
      <div class="map-node-header">${dot}<span class="map-node-name">nsg-annatar</span></div>
      <div class="map-node-body">
        ${blockRows || isolRows
          ? blockRows + isolRows
          : `<span style="color:var(--green)">✓ No active rules</span>`}
      </div>
    </div>
  </div>`;
}

function _monitoringZone(rules) {
  const hasErr     = rules.some(r => r.last_error);
  const allPoll    = rules.length > 0 && rules.every(r => r.last_poll && !r.last_error);
  const dot = hasErr ? _dot('var(--red)') : allPoll ? _dot('var(--green)') : _dot('var(--dim)');
  const status = hasErr ? 'alert' : 'ok';

  const ruleRows = rules.map(r => {
    const ic = r.last_error ? `<span style="color:var(--red)">✗</span>`
             : r.last_poll  ? `<span style="color:var(--green)">●</span>`
             : `<span style="color:var(--dim)">○</span>`;
    const match = r.last_match ? ` · <span style="color:var(--orange)">${_relTime(r.last_match)}</span>` : '';
    return `<div class="row">${ic}
      <span>${r.name}</span>
      <span class="cfg-badge dim" style="font-size:9px">${r.ttp}</span>${match}</div>`;
  }).join('');

  return `<div class="map-zone zone-monitoring ${_zoneClass(status)}" id="zone-monitoring">
    <div class="zone-label">MONITORING</div>
    <div class="map-node">
      <div class="map-node-header">${dot}<span class="map-node-name">law-annatar</span>
        <span style="font-size:9px;color:var(--dim)">Azure Monitor</span>
      </div>
      <div class="map-node-body">
        ${ruleRows || `<span style="color:var(--dim)">No rules configured</span>`}
      </div>
    </div>
  </div>`;
}

function _computeZone(resourceMap, vmEscs, restoreByVm) {
  const anyAlert = [...resourceMap.values()].some(r =>
    r.states?.some(s => s.type === 'isolated')
  );
  const anyWarn = [...resourceMap.values()].some(r =>
    r.states?.some(s => s.type === 'blocked') || r.states?.length > 0
  );
  const status = anyAlert ? 'alert' : anyWarn ? 'warn' : 'ok';

  const nodes = [...resourceMap.values()].map(resource => {
    const { resource_id, vm_name, states = [] } = resource;
    const isIsolated  = states.some(s => s.type === 'isolated');
    const isBlocked   = states.some(s => s.type === 'blocked');
    const myEscs      = vmEscs.filter(e =>
      e.resource_id === resource_id || e.resource_id.split('/').pop() === vm_name);
    const restoreInfo = restoreByVm[vm_name];
    const cached      = _actionsCache[vm_name];

    const dot = restoreInfo   ? _dot('var(--blue)')
              : isIsolated    ? _dot('var(--red)')
              : isBlocked     ? _dot('var(--orange)')
              : myEscs.length ? _dot('var(--orange)')
              :                 _dot('var(--green)');

    const stateRows = [
      restoreInfo ? `<div class="row"><span class="badge restoring" style="font-size:9px">🔄 RESTORING</span>
        <span style="color:var(--dim)">${restoreInfo.elapsed_label}</span></div>` : '',
      ...states.map(s => s.type === 'isolated'
        ? `<div class="row"><span class="badge isolated" style="font-size:9px">ISOLATED</span>
           <span style="color:var(--dim)">${age(s.since)}</span></div>`
        : `<div class="row"><span class="badge blocked" style="font-size:9px">BLOCKED</span>
           <span>${s.ip}</span><span style="color:var(--dim)">${age(s.since)}</span></div>`)
    ].join('');

    const auditEntry = (_auditData?.audits || []).find(a => a.resource_id === resource_id);
    const readiness  = auditEntry
      ? ACTION_GROUPS.map(g => {
          const st = _worstStatus(auditEntry.checks, g.actions);
          const [ic, col] = st === 'ok' ? ['✓','var(--green)'] : st === 'warn' ? ['⚠','var(--orange)']
                          : st === 'fail' ? ['✗','var(--red)'] : ['—','var(--dim)'];
          return `<span><span style="color:${col}">${ic}</span> ${g.label}</span>`;
        }).join('  ')
      : '';

    // Last LLM decisions (conclusion pre-extracted server-side)
    const reasonHtml = (cached?.actions || []).slice(0, 2).map(a => {
      const pct = a.confidence ? Math.round(a.confidence * 100) + '%' : '';
      return `<div class="dec-row">
        <span class="dec-action">${actionLabel(a.action)}</span>
        ${pct ? `<span class="dec-conf">${pct}</span>` : ''}
        ${a.ttp ? `<span class="dec-ttp">${a.ttp}</span>` : ''}
        ${a.reasoning ? `<span class="dec-text">↳ ${a.reasoning}</span>` : ''}
      </div>`;
    }).join('');

    const actions = [];
    if (isIsolated) actions.push(`<button class="action danger" onclick="confirmRelease('${vm_name}')">↩️ Release</button>`);
    if (isBlocked)  actions.push(`<button class="action danger" onclick="confirmUnblock('${vm_name}')">↩️ Unblock</button>`);
    if (isIsolated && isBlocked) actions.push(`<button class="action danger" onclick="confirmReset('${vm_name}')">⟳ Reset</button>`);
    if (!restoreInfo && myEscs.some(e => e.action === 'restore_from_backup'))
      actions.push(`<button class="action primary" onclick="confirmRestore('${vm_name}')">🔄 Restore</button>`);

    const clean = !isIsolated && !isBlocked && !restoreInfo && !myEscs.length;

    return `<div class="map-node">
      <div class="map-node-header">${dot}
        <span class="map-node-name">${vm_name}</span>
        ${readiness ? `<span style="font-size:9px;color:var(--dim);margin-left:auto">${readiness}</span>` : ''}
      </div>
      <div class="map-node-body">
        ${clean ? `<span style="color:var(--green)">✓ No active incidents</span>` : stateRows}
        ${reasonHtml ? `<div class="map-decision">${reasonHtml}</div>` : ''}
        ${actions.length ? `<div class="map-actions">${actions.join('')}</div>` : ''}
      </div>
      ${_escFooter(myEscs)}
    </div>`;
  }).join('');

  return `<div class="map-zone zone-compute ${_zoneClass(status)}" id="zone-compute">
    <div class="zone-label">COMPUTE</div>
    ${nodes || `<div class="map-node"><div class="map-node-body" style="color:var(--dim)">No resources configured</div></div>`}
  </div>`;
}

function _backupZone(rsvEscs, restores) {
  const allAudits    = _auditData?.audits || [];
  const vault        = allAudits[0]?.vault || 'rsv-annatar';
  const backupChecks = allAudits.flatMap(a => (a.checks||[]).filter(c => c.action === 'restore_from_backup'));
  const worst = backupChecks.some(c => c.status === 'fail') ? 'fail'
              : backupChecks.some(c => c.status === 'warn') ? 'warn'
              : backupChecks.length ? 'ok' : 'unknown';
  const dot = worst === 'ok'   ? _dot('var(--green)')
            : worst === 'warn' ? _dot('var(--orange)')
            : worst === 'fail' ? _dot('var(--red)')
            :                    _dot('var(--dim)');
  const status = worst === 'fail' ? 'alert' : worst === 'warn' ? 'warn' : 'ok';

  const restoreRows = restores.map(r =>
    `<div class="row"><span class="badge restoring" style="font-size:9px">🔄 RESTORING</span>
     <span style="color:var(--dim)">${r.vm_name} · ${r.elapsed_label}</span></div>`).join('');

  const backupRows = backupChecks.length
    ? backupChecks.map(c => {
        const col  = c.status === 'ok' ? 'var(--green)' : c.status === 'warn' ? 'var(--orange)' : 'var(--red)';
        const icon = c.status === 'ok' ? '✓' : c.status === 'warn' ? '⚠' : '✗';
        return `<div class="row"><span style="color:${col}">${icon}</span>
          <span style="color:var(--dim)">${c.message}</span></div>`;
      }).join('')
    : `<div style="color:var(--dim)">Loading…</div>`;

  const rsvEscHtml = rsvEscs.length ? `<div class="vm-escalations" style="margin:0;padding:6px 10px;border-top:1px solid var(--border)">
    ${rsvEscs.map(e => {
      const vm = e.resource_id.split('/').pop();
      const restoring = restores.some(r => r.vm_name === vm);
      const ctx = [e.ttp, e.severity].filter(Boolean).join(' · ');
      return `<div class="esc-item"><div class="esc-item-header">
        <span class="esc-action-label">🚨 restore_from_backup</span>
        <button class="action" onclick="confirmAck('${e.id}')" style="flex-shrink:0">✓ Ack</button>
        <button class="action" onclick="openCommandModal('${e.id}')" style="flex-shrink:0">📋</button>
        ${!restoring ? `<button class="action primary" onclick="confirmRestore('${vm}')" style="flex-shrink:0">🔄 Restore</button>` : ''}
      </div>
      ${ctx ? `<div class="esc-context">${ctx}</div>` : ''}
      <div class="esc-reason">${e.reason}</div>
      </div>`;
    }).join('')}</div>` : '';

  return `<div class="map-zone zone-backup ${_zoneClass(status)}" id="zone-backup">
    <div class="zone-label">BACKUP</div>
    <div class="map-node">
      <div class="map-node-header">${dot}<span class="map-node-name">${vault}</span></div>
      <div class="map-node-body">${restoreRows}${backupRows}</div>
    </div>
    ${rsvEscHtml}
  </div>`;
}

function _storageZone() {
  const rules      = _cfgData?.detection?.rules || [];
  const exfilRule  = rules.find(r => r.ttp === 'T1041');
  const lastMatch  = exfilRule?.last_match;
  const recent     = lastMatch && (Date.now() - new Date(lastMatch).getTime()) < 10 * 60 * 1000;
  const dot        = recent ? _dot('var(--orange)') : _dot('var(--green)');
  const status     = recent ? 'warn' : 'ok';

  return `<div class="map-zone zone-storage ${_zoneClass(status)}" id="zone-storage">
    <div class="zone-label">STORAGE</div>
    <div class="map-node">
      <div class="map-node-header">${dot}<span class="map-node-name">stannatarexfil</span></div>
      <div class="map-node-body">
        ${lastMatch
          ? `<div class="row"><span style="color:var(--orange)">T1041</span>
             <span style="color:var(--dim)">last event ${_relTime(lastMatch)}</span></div>`
          : `<div style="color:var(--green)">✓ No exfil detected</div>`}
      </div>
    </div>
  </div>`;
}

function _drawConnections() {
  const svg = document.getElementById('map-svg');
  if (!svg) return;
  const map = document.getElementById('infra-map');
  if (!map) return;
  const mapRect = map.getBoundingClientRect();

  function bbox(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      cx: r.left - mapRect.left + r.width / 2,
      cy: r.top - mapRect.top + r.height / 2,
      top: r.top - mapRect.top,
      bottom: r.bottom - mapRect.top,
      left: r.left - mapRect.left,
      right: r.right - mapRect.left,
    };
  }

  const net = bbox('zone-network');
  const mon = bbox('zone-monitoring');
  const cmp = bbox('zone-compute');
  const bkp = bbox('zone-backup');
  const sto = bbox('zone-storage');
  if (!net || !cmp) return;

  const { resources = [] } = _state;
  const isIsolated = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked  = resources.some(r => r.states?.some(s => s.type === 'blocked'));
  const hasDetErr  = (_cfgData?.detection?.rules || []).some(r => r.last_error);
  const exfilRule  = (_cfgData?.detection?.rules || []).find(r => r.ttp === 'T1041');
  const exfilRecent = exfilRule?.last_match &&
    (Date.now() - new Date(exfilRule.last_match).getTime()) < 10 * 60 * 1000;

  const netColor = isIsolated ? '#e74c3c' : isBlocked ? '#f39c12' : '#556';
  const monColor = hasDetErr  ? '#e74c3c' : '#2ecc71';
  const stoColor = exfilRecent ? '#f39c12' : '#556';
  const bkpColor = '#556';

  const defs = `<defs>
    <marker id="a-r" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#e74c3c"/></marker>
    <marker id="a-o" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#f39c12"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#2ecc71"/></marker>
    <marker id="a-d" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#556"/></marker>
  </defs>`;

  function mId(c) {
    return c === '#e74c3c' ? 'a-r' : c === '#f39c12' ? 'a-o' : c === '#2ecc71' ? 'a-g' : 'a-d';
  }

  function seg(x1, y1, x2, y2, color, dash = '') {
    return `<line x1="${x1|0}" y1="${y1|0}" x2="${x2|0}" y2="${y2|0}"
      stroke="${color}" stroke-width="2"
      ${dash ? `stroke-dasharray="${dash}"` : ''}
      marker-end="url(#${mId(color)})" opacity="0.85"/>`;
  }

  const lines = [defs];

  // NETWORK → COMPUTE
  lines.push(seg(net.cx, net.bottom + 2, net.cx, cmp.top - 4,
    netColor, isIsolated ? '5,4' : ''));

  // MONITORING → COMPUTE (enters right side)
  if (mon) lines.push(seg(mon.cx, mon.bottom + 2, mon.cx, cmp.top - 4, monColor, '4,3'));

  // COMPUTE → BACKUP
  if (bkp) lines.push(seg(bkp.cx, cmp.bottom + 2, bkp.cx, bkp.top - 4, bkpColor));

  // COMPUTE → STORAGE
  if (sto) lines.push(seg(sto.cx, cmp.bottom + 2, sto.cx, sto.top - 4, stoColor,
    exfilRecent ? '4,3' : ''));

  svg.innerHTML = lines.join('\n');
}

async function refreshActionsData() {
  const { resources = [] } = _state;
  const toFetch = resources
    .map(r => r.vm_name)
    .filter(vm => {
      const cached = _actionsCache[vm];
      return !cached || (Date.now() - cached.fetchedAt > 30000);
    });

  for (const vm of toFetch) {
    try {
      const r = await fetch(`/api/actions/${vm}`);
      const d = await r.json();
      _actionsCache[vm] = { actions: d.actions || [], fetchedAt: Date.now() };
    } catch (e) {}
  }
  if (toFetch.length) renderInfra();
}

function renderInfra() {
  if (_configMode) return;
  const list = document.getElementById('incidents-list');
  const rules          = _cfgData?.detection?.rules || [];
  const knownResources = _cfgData?.known_resources  || [];
  const { resources = [], escalations = [], restores = [] } = _state;

  _escById = {};
  escalations.forEach(e => { _escById[e.id] = e; });
  const restoreByVm   = {};
  restores.forEach(r => { restoreByVm[r.vm_name] = r; });

  const detectionEscs = escalations.filter(e => e.action === 'improve_detection');
  const rsvEscs       = escalations.filter(e => e.action === 'restore_from_backup');
  const vmEscs        = escalations.filter(e => !['improve_detection','restore_from_backup'].includes(e.action));

  const resourceMap = new Map();
  knownResources.forEach(r => resourceMap.set(r.resource_id, { ...r, states: [] }));
  resources.forEach(r => {
    if (resourceMap.has(r.resource_id)) resourceMap.get(r.resource_id).states = r.states;
    else resourceMap.set(r.resource_id, r);
  });
  vmEscs.forEach(e => {
    if (!resourceMap.has(e.resource_id))
      resourceMap.set(e.resource_id, { resource_id: e.resource_id,
        vm_name: e.resource_id.split('/').pop(), states: [] });
  });

  const lawEscHtml = detectionEscs.length
    ? `<div class="vm-escalations" style="margin:0;padding:6px 10px;border-top:1px solid var(--border)">
        ${detectionEscs.map(_renderEscItem).join('')}
      </div>` : '';

  list.innerHTML = `<div class="infra-map" id="infra-map">
    <svg class="map-svg" id="map-svg"></svg>
    ${_networkZone(resources, escalations)}
    ${_monitoringZone(rules)}
    ${_computeZone(resourceMap, vmEscs, restoreByVm)}
    ${_backupZone(rsvEscs, restores)}
    ${_storageZone()}
  </div>
  ${lawEscHtml ? `<div style="padding:0 12px 12px">${lawEscHtml}</div>` : ''}`;

  requestAnimationFrame(_drawConnections);
}

// legacy alias kept for WS onmessage calls — delegates to renderInfra
function renderIncidents() { renderInfra(); }

async function doApproveRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/approve-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      toast(`✓ Rule '${d.rule_name}' added to detection_rules.yaml — restart watch to activate`);
      await doAck(escId);
      refreshState();
    } else {
      toast('Error: ' + (d.error || 'unknown'), true);
    }
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function doRejectRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/reject-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      toast(`✗ Rule '${d.rule_name}' rejected`);
      await doAck(escId);
      refreshState();
    } else {
      toast('Error: ' + (d.error || 'unknown'), true);
    }
  } catch (e) { toast('Error: ' + e.message, true); }
}

// ── Actions ────────────────────────────────────────────────────────────────────

function confirmRelease(vmName) {
  openModal(
    'Release isolation — ' + vmName,
    'Remove the NSG isolation rule. IP blocks (if any) remain active.',
    `glorfindel release ${vmName} --yes`,
    '↩️ Release',
    'danger',
    () => doRelease(vmName),
  );
}

async function doRelease(vmName) {
  toast('↩️ Releasing isolation on ' + vmName + '…');
  try {
    const r = await fetch(`/api/action/release/${vmName}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) { toast('✓ Isolation released — ' + vmName + ' is back online'); refreshState(); }
    else { toast('✗ Release failed: ' + (d.stderr || d.error || '?')); }
  } catch (e) { toast('✗ ' + e.message); }
}

function confirmUnblock(vmName) {
  openModal(
    'Unblock IPs — ' + vmName,
    'Remove all NSG IP block rules on this VM.',
    `glorfindel revert ${vmName} --yes`,
    '↩️ Unblock',
    'danger',
    () => doRevert(vmName),
  );
}

function confirmReset(vmName) {
  openModal(
    'Reset ' + vmName,
    'Remove isolation AND all IP blocks in one operation.',
    `glorfindel revert ${vmName} --yes`,
    '⟳ Reset',
    'danger',
    () => doRevert(vmName),
  );
}

function confirmRevert(vmName) {
  // kept for backward compat (called from escalation cards, bot, etc.)
  confirmReset(vmName);
}

function confirmRestore(vmName) {
  openModal(
    'Restore ' + vmName + ' from backup',
    'This triggers an Azure Backup restore (~20 min). The VM will be offline during restore. Glorfindel will release isolation automatically after completion.',
    `glorfindel restore ${vmName} --yes`,
    '🔄 Restore',
    'primary',
    () => doRestore(vmName),
  );
}

function confirmAck(escId) {
  openModal(
    'Acknowledge escalation',
    'Mark this escalation as resolved. No action will be taken on Azure.',
    `glorfindel ack ${escId.slice(0, 8)}`,
    '✓ Acknowledge',
    'action',
    () => doAck(escId),
  );
}

async function doRevert(vmName) {
  toast('↩️ Reverting ' + vmName + '…');
  try {
    const r = await fetch(`/api/action/revert/${vmName}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      toast('✓ Revert complete — ' + vmName + ' is clean');
      refreshState();
    } else {
      toast('✗ Revert failed: ' + (d.stderr || d.error || '?'));
    }
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

async function doRestore(vmName) {
  toast('🔄 Restore started for ' + vmName + ' (~20 min)…', 8000);
  try {
    await fetch(`/api/action/restore/${vmName}`, { method: 'POST' });
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

async function doAck(escId) {
  try {
    await fetch(`/api/action/ack/${escId}`, { method: 'POST' });
    toast('✓ Acknowledged');
    refreshState();
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

// ── Feed ───────────────────────────────────────────────────────────────────────

function appendFeedEntry(entry) {
  const list = document.getElementById('feed-list');
  const el = document.createElement('div');
  el.className = 'feed-entry';

  const ts = fmtTime(entry.timestamp);

  if (entry.type === 'signal') {
    const cls = 'ev-' + entry.event;
    const icons = {
      attack_started: '▶',
      detection: '✓',
      detection_timeout: '⚠',
      recovery_complete: '↺',
      recovery_failed: '✗',
    };
    const icon = icons[entry.event] || '·';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${entry.event}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>`;
  } else {
    const icon = entry.escalate ? '🚨' : entry.verified ? '✓' : entry.verified === false ? '✗' : '⚡';
    const cls  = entry.escalate ? 'act-esc' : entry.verified ? 'act-ok' : entry.verified === false ? 'act-err' : 'act-run';
    const label = entry.escalate ? 'escalate → ' + entry.action : entry.action;
    const pct = entry.confidence ? Math.round(entry.confidence * 100) + '%' : '';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${label}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>
      <span class="feed-pct">${pct}</span>`;
  }

  list.appendChild(el);

  if (_autoScroll) {
    list.scrollTop = list.scrollHeight;
  }
}

document.getElementById('feed-list').addEventListener('scroll', function () {
  const el = this;
  _autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
});

// ── State polling ──────────────────────────────────────────────────────────────

async function refreshState() {
  try {
    const r = await fetch('/api/state');
    _state = await r.json();
    renderInfra();
    refreshActionsData();  // fetch LLM reasoning for active VMs (cached, no-op if fresh)
  } catch (e) {}
}

setInterval(refreshState, 5000);

// ── WebSocket ──────────────────────────────────────────────────────────────────

let _ws = null;
let _wsRetry = 1000;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  _ws = new WebSocket(`${proto}://${location.host}/api/feed`);

  _ws.onopen = () => {
    _wsRetry = 1000;
    document.getElementById('live-dot').classList.remove('disconnected');
    document.getElementById('live-label').textContent = 'live';
    document.getElementById('feed-list').innerHTML = '';
  };

  _ws.onmessage = (evt) => {
    try {
      const entry = JSON.parse(evt.data);
      appendFeedEntry(entry);
      if (entry.type === 'action' || entry.escalate) {
        refreshState();
      }
    } catch (e) {}
  };

  _ws.onclose = () => {
    document.getElementById('live-dot').classList.add('disconnected');
    document.getElementById('live-label').textContent = 'reconnecting…';
    setTimeout(connectWS, _wsRetry);
    _wsRetry = Math.min(_wsRetry * 2, 10000);
  };

  _ws.onerror = () => _ws.close();
}

// ── Watch status ───────────────────────────────────────────────────────────────

async function refreshWatchStatus() {
  try {
    const r = await fetch('/api/watch/status');
    const d = await r.json();
    const dot   = document.getElementById('watch-dot');
    const label = document.getElementById('watch-label');
    if (d.status === 'running') {
      dot.style.color   = 'var(--green)';
      label.textContent = 'watch active';
      label.style.color = 'var(--green)';
    } else if (d.status === 'stale') {
      dot.style.color   = 'var(--orange)';
      label.textContent = 'watch stale';
      label.style.color = 'var(--orange)';
    } else if (d.status === 'stopped') {
      dot.style.color   = 'var(--red)';
      label.textContent = 'watch stopped';
      label.style.color = 'var(--red)';
    } else {
      dot.style.color   = 'var(--dim)';
      label.textContent = 'watch unknown';
      label.style.color = 'var(--dim)';
    }
  } catch (e) {}
}

setInterval(refreshWatchStatus, 15000);

// ── Config panel ───────────────────────────────────────────────────────────────

let _configMode = false;

function toggleConfig() {
  _configMode = !_configMode;
  document.getElementById('config-toggle').classList.toggle('active', _configMode);
  document.getElementById('incidents-list').style.display = _configMode ? 'none' : '';
  const cfgPanel = document.getElementById('config-panel');
  cfgPanel.style.display = _configMode ? 'flex' : 'none';
  document.getElementById('right-col-header').textContent = _configMode ? 'CONFIGURATION' : 'INFRASTRUCTURE';
  if (_configMode) refreshConfig();
}

function mask(s, keep = 8) {
  if (!s) return '—';
  return s.slice(0, keep) + '…' + s.slice(-4);
}

function ttpStatus(c) {
  if (c.detected && c.timeout) return ['⚠ partial', 'warn'];
  if (c.detected)  return ['✓ detected', 'ok'];
  if (c.timeout)   return ['✗ timeout', 'err'];
  return ['— unknown', 'dim'];
}

function _relTime(iso) {
  if (!iso) return '—';
  const age = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (age < 60) return `${age}s ago`;
  if (age < 3600) return `${Math.floor(age / 60)}m ago`;
  return `${Math.floor(age / 3600)}h ago`;
}

async function refreshConfig() {
  const panel = document.getElementById('config-panel');
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    const az = d.azure;

    const azBadge = az.configured
      ? '<span class="cfg-badge ok">✓ connected</span>'
      : '<span class="cfg-badge err">✗ missing credentials</span>';

    const backends = d.monitoring_backends || [];
    const assets   = d.assets || [];

    const backendsHtml = backends.length
      ? backends.map(b => `
        <div class="cfg-row">
          <span class="cfg-key">${b.name}</span>
          <span class="cfg-val">

            <span style="color:var(--dim);font-size:10px">${mask(b.workspace_id || b.endpoint, 12)}</span>
          </span>
        </div>`).join('')
      : `<div class="cfg-row"><span class="cfg-val" style="color:var(--dim)">No backends configured</span></div>`;

    const assetsHtml = assets.length
      ? assets.map(a => `
        <div class="cfg-row">
          <span class="cfg-key">${a.name}</span>
          <span class="cfg-val">
            <span class="cfg-badge dim">${a.type}</span>
            <span style="color:var(--dim);font-size:10px">${mask(a.resource_id, 16)}</span>
            ${a.monitoring_backends.map(b => `<span class="cfg-badge dim" style="font-size:9px">${b}</span>`).join('')}
          </span>
        </div>`).join('')
      : `<div class="cfg-row"><span class="cfg-val" style="color:var(--dim)">No assets configured</span></div>`;

    panel.innerHTML = `
      <div class="cfg-section">
        <div class="cfg-section-title">Azure</div>
        <div class="cfg-row">
          <span class="cfg-key">status</span>
          <span class="cfg-val">${azBadge}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">subscription</span>
          <span class="cfg-val">${mask(az.subscription_id)}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">tenant</span>
          <span class="cfg-val">${mask(az.tenant_id)}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">client (SP)</span>
          <span class="cfg-val">${mask(az.client_id)}</span>
        </div>
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">LLM</div>
        <div class="cfg-row">
          <span class="cfg-key">provider</span>
          <span class="cfg-val">${d.llm.provider}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">model</span>
          <span class="cfg-val">${d.llm.model}</span>
        </div>
        ${d.llm.base_url ? `<div class="cfg-row">
          <span class="cfg-key">base_url</span>
          <span class="cfg-val" style="color:var(--dim)">${d.llm.base_url}</span>
        </div>` : ''}
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">Monitoring backends</div>
        ${backendsHtml}
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">Assets</div>
        ${assetsHtml}
      </div>

      `;

  } catch (e) {
    panel.innerHTML = `<div style="color:var(--red);padding:16px">Failed to load config: ${e.message}</div>`;
  }
}

// ── Data constants (used by infra cards) ──────────────────────────────────────

const ACTION_GROUPS = [
  { label: 'NSG',    actions: ['isolate_vm', 'block_suspicious_ip'] },
  { label: 'Backup', actions: ['restore_from_backup'] },
  { label: 'Compute',actions: ['snapshot'] },
];

function _worstStatus(checks, actions) {
  const relevant = checks.filter(c =>
    actions.some(a => c.action.split(/,\s*/).includes(a)));
  if (!relevant.length) return 'skip';
  if (relevant.some(c => c.status === 'fail'))  return 'fail';
  if (relevant.some(c => c.status === 'warn'))  return 'warn';
  if (relevant.every(c => c.status === 'ok'))   return 'ok';
  return 'skip';
}

function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;
    background:${isError ? 'var(--red)' : 'var(--green)'};color:#fff;font-size:12px;
    z-index:9999;max-width:400px`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

(async function init() {
  await loadScenarios();
  await refreshCfgData();     // detection rules + known resources → renderInfra
  await refreshState();       // active incidents → renderInfra
  await refreshWatchStatus();
  connectWS();
  setInterval(refreshCfgData,   30000);  // rules polling status
  setInterval(refreshAuditData, 300000); // backup/compute readiness (slow, Azure API)

})();
