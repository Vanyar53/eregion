<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glorfindel — War Room</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg1:       #161b22;
    --bg2:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --dim:       #7d8590;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --orange:    #e3b341;
    --blue:      #58a6ff;
    --cyan:      #39d353;
    --purple:    #bc8cff;
    --font:      ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { color: var(--blue); font-weight: 700; font-size: 15px; letter-spacing: 2px; }
  .subtitle { color: var(--dim); font-size: 12px; }
  #live-dot { color: var(--green); font-size: 10px; animation: pulse 2s infinite; }
  #live-dot.disconnected { color: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .spacer { flex: 1; }

  #clock { color: var(--dim); font-size: 11px; }

  .scenario-row { display: flex; gap: 8px; align-items: center; }
  select, button {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }
  select:hover, button:hover { border-color: var(--blue); }
  button.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
  button.primary:hover { background: #388bfd; }
  button.danger  { background: #b62324; border-color: #f85149; color: #fff; }
  button.danger:hover  { background: #f85149; }
  button.action  { background: var(--bg2); border-color: var(--border); font-size: 11px; padding: 3px 8px; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Main layout ── */
  main {
    display: flex;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Feed column (LEFT, fixed width) ── */
  #feed-col {
    width: 390px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  .feed-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    font-size: 11px;
    border-radius: 4px;
    transition: background .1s;
  }
  .feed-entry:hover { background: var(--bg1); padding-left: 4px; padding-right: 4px; }
  .feed-ts   { color: var(--dim); font-size: 10px; flex-shrink: 0; width: 100px; }
  .feed-event{ flex-shrink: 0; width: 160px; font-weight: 600; }
  .feed-meta { color: var(--dim); font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .feed-pct  { color: var(--dim); font-size: 10px; flex-shrink: 0; }

  .ev-attack_started    { color: var(--yellow); }
  .ev-detection         { color: var(--green); }
  .ev-detection_timeout { color: var(--orange); }
  .ev-recovery_complete { color: var(--cyan); }
  .ev-recovery_failed   { color: var(--red); }

  .act-ok  { color: var(--green); }
  .act-esc { color: var(--red); }
  .act-run { color: var(--blue); }
  .act-err { color: var(--red); }

  /* ── Incidents column (RIGHT, flex:1) ── */
  #incidents-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    padding: 10px 16px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #incidents-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── VM Card ── */
  .vm-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .vm-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .vm-dot { font-size: 10px; }
  .vm-name { font-weight: 700; font-size: 13px; flex: 1; }
  .vm-age  { font-size: 10px; color: var(--dim); }

  .vm-card-body { padding: 10px 14px; }

  .state-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: .5px;
  }
  .badge.isolated  { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .badge.blocked   { background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .badge.restoring { background: #0d2035; color: var(--blue); border: 1px solid #1a4060;
                     animation: pulse 2s infinite; }
  .restore-progress { background: #0a1a2a; border-radius: 4px; padding: 4px 6px; }
  .state-detail    { color: var(--dim); font-size: 11px; }

  /* ── Escalation items ── */
  .vm-escalations {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .esc-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .esc-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .esc-action-label { font-weight: 700; font-size: 12px; color: var(--orange); flex: 1; }
  .esc-context { color: var(--dim); font-size: 10px; margin-bottom: 4px; }
  .esc-reason  { color: var(--dim); font-size: 11px; line-height: 1.5; margin-bottom: 4px; }
  .esc-steps { margin-top: 6px; border-left: 2px solid var(--border); padding-left: 8px; display: flex; flex-direction: column; gap: 3px; }
  .esc-step  { color: var(--dim); font-size: 10px; line-height: 1.5; }
  .esc-query { background: var(--bg2); border-left: 2px solid var(--cyan); padding: 8px;
               font-size: 10px; color: var(--blue); white-space: pre-wrap; overflow-x: auto;
               margin: 6px 0; border-radius: 0 4px 4px 0; }

  .vm-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
  }
  .empty-state .check { font-size: 24px; color: var(--green); margin-bottom: 8px; }

  /* ── Config panel ── */
  #config-panel { font-size: 12px; }
  .cfg-section { margin-bottom: 4px; }
  .cfg-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .cfg-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 4px 0; border-bottom: 1px solid var(--bg2);
  }
  .cfg-key   { color: var(--dim); font-size: 11px; flex-shrink: 0; width: 130px; }
  .cfg-val   { color: var(--text); font-size: 11px; word-break: break-all; }
  .cfg-badge {
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 4px; flex-shrink: 0;
  }
  .cfg-badge.ok  { background: #1a3a1a; color: var(--green); border: 1px solid #2d5a2d; }
  .cfg-badge.warn{ background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .cfg-badge.err { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .cfg-badge.dim { background: var(--bg2); color: var(--dim); border: 1px solid var(--border); }

  .ttp-table { width: 100%; border-collapse: collapse; }
  .ttp-table th { padding: 4px 8px; font-size: 10px; color: var(--dim); text-align: left; border-bottom: 1px solid var(--border); }
  .ttp-table td { padding: 5px 8px; font-size: 11px; border-bottom: 1px solid var(--bg2); }
  .ttp-table td:first-child { color: var(--blue); font-weight: 600; }
  .ttp-table td:last-child { text-align: right; }

  button#config-toggle.active { border-color: var(--blue); color: var(--blue); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 100;
    max-width: 320px;
  }
  #toast.show { opacity: 1; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    min-width: 360px;
    max-width: 520px;
  }
  .modal-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .modal-body  { color: var(--dim); font-size: 12px; line-height: 1.6; margin-bottom: 16px; }
  .modal-cmd   { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
                 padding: 8px 12px; font-family: var(--font); font-size: 11px; color: var(--cyan);
                 white-space: pre-wrap; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--dim);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <span class="logo">GLORFINDEL</span>
  <span class="subtitle">War Room</span>
  <span id="watch-dot" style="font-size:10px;color:var(--dim)">●</span>
  <span id="watch-label" style="color:var(--dim);font-size:11px">watch…</span>
  <span style="color:var(--border);margin:0 4px">│</span>
  <span id="live-dot">●</span>
  <span id="live-label" style="color:var(--dim);font-size:11px">connecting…</span>

  <div class="spacer"></div>

  <div class="scenario-row">
    <select id="scenario-select"><option value="">Run scenario…</option></select>
    <button class="primary" id="run-btn" disabled>▶ Run</button>
  </div>

  <button id="config-toggle" class="action" onclick="toggleConfig()" title="Azure configuration">⚙ Config</button>
  <span id="clock" style="min-width:70px;text-align:right"></span>
</header>

<main>
  <!-- Feed LEFT -->
  <div id="feed-col">
    <div class="col-header">LIVE FEED</div>
    <div id="feed-list"></div>
  </div>

  <!-- Incidents / Config RIGHT -->
  <div id="incidents-col">
    <div class="col-header" id="right-col-header">INCIDENTS</div>
    <div id="incidents-list">
      <div class="empty-state">
        <div class="check">✓</div>
        <div>All clear — no active incidents</div>
        <div style="margin-top:6px;font-size:11px">Run a scenario to start</div>
      </div>
    </div>
    <div id="config-panel" style="display:none;flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:16px;"></div>
  </div>
</main>

<div id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-cmd"   id="modal-cmd" style="display:none"></div>
    <div class="modal-actions">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-confirm" class="primary"></button>
    </div>
  </div>
</div>

<script>
// ── Label maps (mirrors escalations.py) ────────────────────────────────────────

const ACTION_LABELS = {
  isolate_vm:           'VM isolée du réseau',
  release_isolation:    'Isolation levée',
  snapshot:             'Snapshot forensique créé',
  block_suspicious_ip:  'IP suspecte bloquée',
  revoke_temp_access:   'Accès temporaire révoqué',
  restore_from_backup:  'Restauration depuis backup',
  delete_resource:      'Ressource supprimée',
  wipe_storage:         'Stockage effacé',
  modify_network_rule:  'Règle réseau modifiée',
  escalate_permissions: 'Permissions élevées',
};

const ESC_LABELS = {
  low_confidence:      'detection timeout',
  destructive_action:  'action destructive',
  proposed_action:     'action inconnue',
  verification_failed: 'vérification échouée',
};

function actionLabel(action) {
  return ACTION_LABELS[action] || action;
}

function escLabel(type) {
  return ESC_LABELS[type] || type;
}

function cliCommand(esc) {
  const rid = esc.resource_id;
  const id  = esc.id.slice(0, 8);
  if (esc.action === 'restore_from_backup') {
    return `glorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'verification_failed') {
    return `glorfindel revert ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'low_confidence') {
    return `# Vérifier le snapshot, puis si nécessaire :\nglorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  return `glorfindel ack ${id}`;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function age(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm ago';
}

function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toISOString().slice(11, 19) + ' UTC';
}

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function openModal(title, body, cmd, confirmLabel, confirmClass, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const cmdEl = document.getElementById('modal-cmd');
  if (cmd) { cmdEl.textContent = cmd; cmdEl.style.display = ''; }
  else cmdEl.style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = confirmLabel;
  btn.className = confirmClass;
  btn.onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modal').classList.add('open');
}

function openCommandModal(escId) {
  const esc = _escById[escId];
  if (!esc) return;
  const cmd = cliCommand(esc);
  const label = actionLabel(esc.action);
  document.getElementById('modal-title').textContent = '📋 ' + label;
  document.getElementById('modal-body').textContent = 'Commande CLI à exécuter pour cette escalade :';
  const cmdEl = document.getElementById('modal-cmd');
  cmdEl.textContent = cmd;
  cmdEl.style.display = '';
  document.getElementById('modal-cancel').style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = () => {
    closeModal();
    document.getElementById('modal-cancel').style.display = '';
  };
  document.getElementById('modal').classList.add('open');
}

// ── State ──────────────────────────────────────────────────────────────────────

let _state = { resources: [], escalations: [] };
let _escById = {};   // id → escalation object, refreshed on each renderIncidents
let _autoScroll = true;

// ── Clock ──────────────────────────────────────────────────────────────────────

setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toISOString().slice(11, 19) + ' UTC';
}, 1000);

// ── Scenarios ──────────────────────────────────────────────────────────────────

async function loadScenarios() {
  try {
    const r = await fetch('/api/scenarios');
    const data = await r.json();
    const sel = document.getElementById('scenario-select');
    data.scenarios.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      document.getElementById('run-btn').disabled = !sel.value;
    });
  } catch (e) {}
}

document.getElementById('run-btn').addEventListener('click', () => {
  const name = document.getElementById('scenario-select').value;
  if (!name) return;
  openModal(
    'Run scenario',
    `This will launch annatar run scenarios/azure/${name}.yaml on the live Azure infrastructure.`,
    `annatar run scenarios/azure/${name}.yaml`,
    '▶ Run',
    'primary',
    () => runScenario(name),
  );
});

async function runScenario(name) {
  toast('⚡ Starting ' + name + '…');
  try {
    await fetch(`/api/run/${name}`, { method: 'POST' });
  } catch (e) {
    toast('✗ Failed to start scenario: ' + e.message);
  }
}

// ── Render incidents ───────────────────────────────────────────────────────────

function renderIncidents() {
  const list = document.getElementById('incidents-list');
  const { resources, escalations, restores = [] } = _state;

  const restoreByVm = {};
  restores.forEach(r => { restoreByVm[r.vm_name] = r; });

  _escById = {};
  const escByVm = {};
  escalations.forEach(e => {
    _escById[e.id] = e;
    const vm = e.resource_id.split('/').pop();
    if (!escByVm[vm]) escByVm[vm] = [];
    escByVm[vm].push(e);
  });

  const resourceMap = {};
  resources.forEach(r => { resourceMap[r.vm_name] = r; });
  const escOnlyVms = Object.keys(escByVm).filter(vm => !resourceMap[vm]);
  escOnlyVms.forEach(vm => {
    resourceMap[vm] = {
      resource_id: escalations.find(e => e.resource_id.split('/').pop() === vm)?.resource_id || vm,
      vm_name: vm,
      states: [],
    };
  });

  const allResources = Object.values(resourceMap);

  if (!allResources.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="check">✓</div>
        <div>All clear — no active incidents</div>
        <div style="margin-top:6px;font-size:11px">Run a scenario to start</div>
      </div>`;
    return;
  }

  list.innerHTML = allResources.map(r => {
    const { vm_name, states } = r;
    const escs = escByVm[vm_name] || [];

    const isIsolated = states.some(s => s.type === 'isolated');
    const isBlocked  = states.some(s => s.type === 'blocked');
    const hasEscOnly = !isIsolated && !isBlocked && escs.length > 0;
    const dot = isIsolated ? '🔴' : isBlocked ? '🟡' : hasEscOnly ? '🟠' : '🟢';

    const restoreInfo = restoreByVm[vm_name];
    const restoreRow = restoreInfo ? `
      <div class="state-row restore-progress">
        <span class="badge restoring">🔄 RESTORING</span>
        <span class="state-detail">${restoreInfo.elapsed_label} elapsed — Azure Backup in progress (~20 min)</span>
      </div>` : '';

    const stateRows = states.map(s => {
      if (s.type === 'isolated') {
        return `<div class="state-row">
          <span class="badge isolated">ISOLATED</span>
          <span class="state-detail">${age(s.since)}</span>
        </div>`;
      }
      return `<div class="state-row">
        <span class="badge blocked">BLOCKED</span>
        <span class="state-detail">${s.ip}  ${age(s.since)}</span>
      </div>`;
    }).join('');

    // Each escalation as its own structured block
    const escItems = escs.map(e => {
      const label  = actionLabel(e.action);
      const ctx    = [e.ttp, e.severity, escLabel(e.escalation_type)].filter(Boolean).join(' · ');
      const steps  = (e.suggested_steps || []).slice(0, 3);
      const stepsHtml = steps.length ? `
        <div class="esc-steps">
          ${steps.map(s => `<div class="esc-step">• ${s}</div>`).join('')}
        </div>` : '';

      const escId = e.id;
      const isRuleProposal = e.action === 'improve_detection' && e.proposal_id;
      const queryHtml = isRuleProposal && e.proposed_query ? `
        <pre class="esc-query">${e.proposed_query.trim()}</pre>` : '';
      const approveBtn = isRuleProposal ? `
        <button class="action ok" onclick="doApproveRule('${e.proposal_id}','${escId}')" style="flex-shrink:0">✓ Approve rule</button>` : '';
      return `<div class="esc-item">
        <div class="esc-item-header">
          <span class="esc-action-label">🚨 ${label}</span>
          <button class="action" onclick="confirmAck('${escId}')" style="flex-shrink:0">✓ Ack</button>
          <button class="action" onclick="openCommandModal('${escId}')" style="flex-shrink:0">📋 Cmd</button>
          ${approveBtn}
        </div>
        ${ctx ? `<div class="esc-context">${ctx}</div>` : ''}
        <div class="esc-reason">${e.reason}</div>
        ${queryHtml}
        ${stepsHtml}
      </div>`;
    }).join('');

    // Card-level actions (VM-wide)
    const cardActions = [];
    if (isIsolated || isBlocked) {
      cardActions.push(
        `<button class="action danger" onclick="confirmRevert('${vm_name}')">↩️ Revert</button>`
      );
    }
    // Restore when VM is isolated (operator decision) OR explicit restore_from_backup escalation.
    // NOT shown for low_confidence alone (detection_timeout without isolation).
    // Also hidden while restore is in progress.
    const needsRestore = !restoreInfo && (isIsolated || escs.some(e => e.action === 'restore_from_backup'));
    if (needsRestore) {
      cardActions.push(
        `<button class="action primary" onclick="confirmRestore('${vm_name}')">🔄 Restore</button>`
      );
    }

    return `<div class="vm-card">
      <div class="vm-card-header">
        <span class="vm-dot">${dot}</span>
        <span class="vm-name">${vm_name}</span>
      </div>
      <div class="vm-card-body">
        ${restoreRow}
        ${stateRows}
        ${escs.length ? `<div class="vm-escalations">${escItems}</div>` : ''}
        ${cardActions.length ? `<div class="vm-actions">${cardActions.join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function doApproveRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/approve-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      toast(`✓ Rule '${d.rule_name}' added to detection_rules.yaml — restart watch to activate`);
      await doAck(escId);
      refreshState();
    } else {
      toast('Error: ' + (d.error || 'unknown'), true);
    }
  } catch (e) { toast('Error: ' + e.message, true); }
}

// ── Actions ────────────────────────────────────────────────────────────────────

function confirmRevert(vmName) {
  openModal(
    'Revert ' + vmName,
    'Release isolation and unblock all IPs. The VM will be reconnected to the network.',
    `glorfindel revert ${vmName} --yes`,
    '↩️ Revert',
    'danger',
    () => doRevert(vmName),
  );
}

function confirmRestore(vmName) {
  openModal(
    'Restore ' + vmName + ' from backup',
    'This triggers an Azure Backup restore (~20 min). The VM will be offline during restore. Glorfindel will release isolation automatically after completion.',
    `glorfindel restore ${vmName} --yes`,
    '🔄 Restore',
    'primary',
    () => doRestore(vmName),
  );
}

function confirmAck(escId) {
  openModal(
    'Acknowledge escalation',
    'Mark this escalation as resolved. No action will be taken on Azure.',
    `glorfindel ack ${escId.slice(0, 8)}`,
    '✓ Acknowledge',
    'action',
    () => doAck(escId),
  );
}

async function doRevert(vmName) {
  toast('↩️ Reverting ' + vmName + '…');
  try {
    const r = await fetch(`/api/action/revert/${vmName}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      toast('✓ Revert complete — ' + vmName + ' is clean');
      refreshState();
    } else {
      toast('✗ Revert failed: ' + (d.stderr || d.error || '?'));
    }
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

async function doRestore(vmName) {
  toast('🔄 Restore started for ' + vmName + ' (~20 min)…', 8000);
  try {
    await fetch(`/api/action/restore/${vmName}`, { method: 'POST' });
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

async function doAck(escId) {
  try {
    await fetch(`/api/action/ack/${escId}`, { method: 'POST' });
    toast('✓ Acknowledged');
    refreshState();
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

// ── Feed ───────────────────────────────────────────────────────────────────────

function appendFeedEntry(entry) {
  const list = document.getElementById('feed-list');
  const el = document.createElement('div');
  el.className = 'feed-entry';

  const ts = fmtTime(entry.timestamp);

  if (entry.type === 'signal') {
    const cls = 'ev-' + entry.event;
    const icons = {
      attack_started: '▶',
      detection: '✓',
      detection_timeout: '⚠',
      recovery_complete: '↺',
      recovery_failed: '✗',
    };
    const icon = icons[entry.event] || '·';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${entry.event}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>`;
  } else {
    const icon = entry.escalate ? '🚨' : entry.verified ? '✓' : entry.verified === false ? '✗' : '⚡';
    const cls  = entry.escalate ? 'act-esc' : entry.verified ? 'act-ok' : entry.verified === false ? 'act-err' : 'act-run';
    const label = entry.escalate ? 'escalate → ' + entry.action : entry.action;
    const pct = entry.confidence ? Math.round(entry.confidence * 100) + '%' : '';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${label}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>
      <span class="feed-pct">${pct}</span>`;
  }

  list.appendChild(el);

  if (_autoScroll) {
    list.scrollTop = list.scrollHeight;
  }
}

document.getElementById('feed-list').addEventListener('scroll', function () {
  const el = this;
  _autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
});

// ── State polling ──────────────────────────────────────────────────────────────

async function refreshState() {
  try {
    const r = await fetch('/api/state');
    _state = await r.json();
    renderIncidents();
  } catch (e) {}
}

setInterval(refreshState, 5000);

// ── WebSocket ──────────────────────────────────────────────────────────────────

let _ws = null;
let _wsRetry = 1000;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  _ws = new WebSocket(`${proto}://${location.host}/api/feed`);

  _ws.onopen = () => {
    _wsRetry = 1000;
    document.getElementById('live-dot').classList.remove('disconnected');
    document.getElementById('live-label').textContent = 'live';
    document.getElementById('feed-list').innerHTML = '';
  };

  _ws.onmessage = (evt) => {
    try {
      const entry = JSON.parse(evt.data);
      appendFeedEntry(entry);
      if (entry.type === 'action' || entry.escalate) {
        refreshState();
      }
    } catch (e) {}
  };

  _ws.onclose = () => {
    document.getElementById('live-dot').classList.add('disconnected');
    document.getElementById('live-label').textContent = 'reconnecting…';
    setTimeout(connectWS, _wsRetry);
    _wsRetry = Math.min(_wsRetry * 2, 10000);
  };

  _ws.onerror = () => _ws.close();
}

// ── Watch status ───────────────────────────────────────────────────────────────

async function refreshWatchStatus() {
  try {
    const r = await fetch('/api/watch/status');
    const d = await r.json();
    const dot   = document.getElementById('watch-dot');
    const label = document.getElementById('watch-label');
    if (d.status === 'running') {
      dot.style.color   = 'var(--green)';
      label.textContent = 'watch active';
      label.style.color = 'var(--green)';
    } else if (d.status === 'stale') {
      dot.style.color   = 'var(--orange)';
      label.textContent = 'watch stale';
      label.style.color = 'var(--orange)';
    } else if (d.status === 'stopped') {
      dot.style.color   = 'var(--red)';
      label.textContent = 'watch stopped';
      label.style.color = 'var(--red)';
    } else {
      dot.style.color   = 'var(--dim)';
      label.textContent = 'watch unknown';
      label.style.color = 'var(--dim)';
    }
  } catch (e) {}
}

setInterval(refreshWatchStatus, 15000);

// ── Config panel ───────────────────────────────────────────────────────────────

let _configMode = false;

function toggleConfig() {
  _configMode = !_configMode;
  document.getElementById('config-toggle').classList.toggle('active', _configMode);
  document.getElementById('incidents-list').style.display = _configMode ? 'none' : '';
  const cfgPanel = document.getElementById('config-panel');
  cfgPanel.style.display = _configMode ? 'flex' : 'none';
  document.getElementById('right-col-header').textContent = _configMode ? 'CONFIGURATION' : 'INCIDENTS';
  if (_configMode) refreshConfig();
}

function mask(s, keep = 8) {
  if (!s) return '—';
  return s.slice(0, keep) + '…' + s.slice(-4);
}

function ttpStatus(c) {
  if (c.detected && c.timeout) return ['⚠ partial', 'warn'];
  if (c.detected)  return ['✓ detected', 'ok'];
  if (c.timeout)   return ['✗ timeout', 'err'];
  return ['— unknown', 'dim'];
}

function _relTime(iso) {
  if (!iso) return '—';
  const age = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (age < 60) return `${age}s ago`;
  if (age < 3600) return `${Math.floor(age / 60)}m ago`;
  return `${Math.floor(age / 3600)}h ago`;
}

async function refreshConfig() {
  const panel = document.getElementById('config-panel');
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    const az = d.azure;
    const det = d.detection;

    const azBadge = az.configured
      ? '<span class="cfg-badge ok">✓ connected</span>'
      : '<span class="cfg-badge err">✗ missing credentials</span>';

    const wsRows = det.workspaces.length
      ? det.workspaces.map(w => `<div class="cfg-row">
          <span class="cfg-key">workspace</span>
          <span class="cfg-val">${mask(w, 12)}</span>
        </div>`).join('')
      : `<div class="cfg-row"><span class="cfg-val" style="color:var(--dim)">No runs yet</span></div>`;

    const ttpRows = Object.keys(det.coverage).length
      ? Object.entries(det.coverage).map(([ttp, c]) => {
          const [label, cls] = ttpStatus(c);
          return `<tr>
            <td>${ttp}</td>
            <td><span class="cfg-badge ${cls}">${label}</span></td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="2" style="color:var(--dim)">No runs yet</td></tr>`;

    panel.innerHTML = `
      <div class="cfg-section">
        <div class="cfg-section-title">Azure</div>
        <div class="cfg-row">
          <span class="cfg-key">status</span>
          <span class="cfg-val">${azBadge}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">subscription</span>
          <span class="cfg-val">${mask(az.subscription_id)}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">tenant</span>
          <span class="cfg-val">${mask(az.tenant_id)}</span>
        </div>
        <div class="cfg-row">
          <span class="cfg-key">client (SP)</span>
          <span class="cfg-val">${mask(az.client_id)}</span>
        </div>
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">Detection sources</div>
        ${wsRows}
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">TTP coverage (last 10 runs)</div>
        <table class="ttp-table">
          <tbody>${ttpRows}</tbody>
        </table>
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">Detection rules${det.rules_file ? ` <span style="color:var(--dim);font-weight:400">${det.rules_file}</span>` : ''}</div>
        ${det.rules && det.rules.length ? `
        <table class="ttp-table">
          <thead><tr><th>Rule</th><th>TTP</th><th>Interval</th><th>Last poll</th><th>Last match</th><th>Status</th></tr></thead>
          <tbody>${det.rules.map(r => {
            const pollAge = r.last_poll ? _relTime(r.last_poll) : '—';
            const matchAge = r.last_match ? _relTime(r.last_match) : '—';
            const statusBadge = r.last_error
              ? `<span class="cfg-badge err" title="${r.last_error}">✗ error</span>`
              : r.last_poll
                ? `<span class="cfg-badge ok">✓ polling</span>`
                : `<span class="cfg-badge dim">⏸ idle</span>`;
            return `<tr>
              <td title="${r.description || ''}">${r.name}</td>
              <td><span class="cfg-badge dim">${r.ttp || '—'}</span></td>
              <td style="color:var(--dim)">${r.interval_s}s</td>
              <td style="color:var(--dim)">${pollAge}</td>
              <td style="color:${r.last_match ? 'var(--orange)' : 'var(--dim)'}">${matchAge}${r.match_count ? ` (×${r.match_count})` : ''}</td>
              <td>${statusBadge}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>` : `<div class="cfg-row"><span class="cfg-val" style="color:var(--dim)">No detection_rules.yaml found</span></div>`}
      </div>

      <div class="cfg-section" id="proposed-rules-section" style="display:none">
        <div class="cfg-section-title" style="color:var(--cyan)">⚡ Proposed detection rules</div>
        <div id="proposed-rules-list"></div>
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">NSG state</div>
        ${d.state.isolations.length
          ? d.state.isolations.map(i => `<div class="cfg-row">
              <span class="cfg-key">${i.vm}</span>
              <span class="cfg-val"><span class="cfg-badge err">ISOLATED</span></span>
            </div>`).join('')
          : `<div class="cfg-row"><span class="cfg-val" style="color:var(--green)">✓ No active isolations</span></div>`
        }
        ${d.state.blocks.map(b => `<div class="cfg-row">
          <span class="cfg-key">${b.vm}</span>
          <span class="cfg-val"><span class="cfg-badge warn">BLOCKED</span> ${b.ip}</span>
        </div>`).join('')}
      </div>

      <div class="cfg-section">
        <div class="cfg-section-title">Remediation readiness</div>
        <div id="audit-content"><span style="color:var(--dim)">Loading…</span></div>
      </div>`;

    await refreshProposedRules();
    refreshAudit();
  } catch (e) {
    panel.innerHTML = `<div style="color:var(--red);padding:16px">Failed to load config: ${e.message}</div>`;
  }
}

// ── Audit ──────────────────────────────────────────────────────────────────────

async function refreshAudit() {
  const el = document.getElementById('audit-content');
  if (!el) return;
  try {
    const r = await fetch('/api/audit');
    const d = await r.json();
    const audits = d.audits || [];
    if (!audits.length) {
      el.innerHTML = `<div class="cfg-row"><span class="cfg-val" style="color:var(--dim)">No resources configured in detection_rules.yaml</span></div>`;
      return;
    }
    el.innerHTML = audits.map(a => {
      const vm = a.resource_id.split('/').pop();
      const allOk = a.ready;
      const headerColor = allOk ? 'var(--green)' : 'var(--red)';
      const icon = allOk ? '✓' : '✗';
      const rows = a.checks.map(c => {
        const col = c.status === 'ok' ? 'var(--green)' : c.status === 'warn' ? 'var(--orange)' : c.status === 'fail' ? 'var(--red)' : 'var(--dim)';
        const badge = c.status === 'ok' ? '✓' : c.status === 'warn' ? '⚠' : c.status === 'fail' ? '✗' : '—';
        return `<div class="cfg-row" style="padding-left:8px">
          <span class="cfg-key" style="font-size:10px">${c.name}</span>
          <span class="cfg-val" style="color:${col};font-size:10px">${badge} ${c.message}</span>
        </div>
        ${c.fix ? `<div class="cfg-row" style="padding-left:8px"><span class="cfg-val" style="color:var(--dim);font-size:10px">Fix: <code>${c.fix}</code></span></div>` : ''}`;
      }).join('');
      return `<div style="margin-bottom:10px">
        <div style="color:${headerColor};font-weight:700;font-size:11px;margin-bottom:4px">${icon} ${vm}</div>
        ${rows}
      </div>`;
    }).join('');
  } catch (e) {
    const el2 = document.getElementById('audit-content');
    if (el2) el2.innerHTML = `<span style="color:var(--dim)">Audit unavailable (no Azure credentials)</span>`;
  }
}

// ── Proposed rules ─────────────────────────────────────────────────────────────

async function refreshProposedRules() {
  try {
    const r = await fetch('/api/pending/rules');
    const d = await r.json();
    const proposals = d.proposals || [];
    const section = document.getElementById('proposed-rules-section');
    const list = document.getElementById('proposed-rules-list');
    if (!proposals.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    list.innerHTML = proposals.map(p => {
      const vm = p.resource_id.split('/').pop();
      const conf = Math.round(p.confidence * 100);
      return `<div class="esc-item" style="border-left:2px solid var(--cyan);margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="color:var(--cyan);font-weight:700">${p.rule_name}</span>
          <span class="cfg-badge dim">${p.ttp || '—'}</span>
          <span class="cfg-badge dim">${vm}</span>
          <span class="cfg-badge ${conf >= 70 ? 'ok' : 'warn'}">${conf}% confidence</span>
        </div>
        <div class="esc-reason" style="margin-bottom:4px">${p.analysis}</div>
        <div class="esc-reason" style="color:var(--text);margin-bottom:6px">${p.explanation}</div>
        <pre style="background:var(--bg2);padding:8px;border-radius:4px;font-size:10px;overflow-x:auto;white-space:pre-wrap;color:var(--blue);margin-bottom:8px">${p.query.trim()}</pre>
        <div style="display:flex;gap:8px">
          <button class="action ok" onclick="approveRule('${p.id}')">✓ Approve &amp; add to rules</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) {}
}

async function approveRule(proposalId) {
  try {
    const r = await fetch(`/api/action/approve-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      showToast(`Rule '${d.rule_name}' approved — restart watch to activate`);
      refreshProposedRules();
      refreshConfig();
    } else {
      showToast(`Error: ${d.error}`, true);
    }
  } catch (e) { showToast(`Error: ${e.message}`, true); }
}

function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;
    background:${isError ? 'var(--red)' : 'var(--green)'};color:#fff;font-size:12px;
    z-index:9999;max-width:400px`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── Init ───────────────────────────────────────────────────────────────────────

(async function init() {
  await loadScenarios();
  await refreshState();
  await refreshWatchStatus();
  connectWS();
  // Poll for proposed rules every 30s even when config panel is closed
  refreshProposedRules();
  setInterval(refreshProposedRules, 30000);
})();
</script>
