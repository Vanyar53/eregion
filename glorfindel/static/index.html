<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glorfindel — War Room</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg1:       #161b22;
    --bg2:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --dim:       #7d8590;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --orange:    #e3b341;
    --blue:      #58a6ff;
    --cyan:      #39d353;
    --purple:    #bc8cff;
    --font:      ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { color: var(--blue); font-weight: 700; font-size: 15px; letter-spacing: 2px; }
  .subtitle { color: var(--dim); font-size: 12px; }
  #live-dot { color: var(--green); font-size: 10px; animation: pulse 2s infinite; }
  #live-dot.disconnected { color: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .spacer { flex: 1; }

  #clock { color: var(--dim); font-size: 11px; }

  .scenario-row { display: flex; gap: 8px; align-items: center; }
  select, button {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }
  select:hover { border-color: var(--blue); }
  button { transition: background 0.1s, box-shadow 0.1s; }
  button.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
  button.primary:hover { background: #388bfd; }
  button.danger  { background: #b62324; border-color: #f85149; color: #fff; }
  button.danger:hover  { background: #f85149; }
  button.action  { background: var(--bg2); border-color: var(--border); font-size: 11px; padding: 3px 8px; }
  button.action:hover  { background: color-mix(in srgb, var(--text) 10%, var(--bg2)); border-color: var(--dim); }
  button.action.ok { color: var(--green); }
  button.action.ok:hover { background: color-mix(in srgb, var(--green) 10%, var(--bg2)); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Main layout ── */
  main {
    display: flex;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Feed column (LEFT, fixed width) ── */
  #feed-col {
    width: 390px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  .feed-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    font-size: 11px;
    border-radius: 4px;
    transition: background .1s;
  }
  .feed-entry:hover { background: var(--bg1); padding-left: 4px; padding-right: 4px; }
  .feed-ts   { color: var(--dim); font-size: 10px; flex-shrink: 0; width: 100px; }
  .feed-event{ flex-shrink: 0; width: 160px; font-weight: 600; }
  .feed-meta { color: var(--dim); font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .feed-pct  { color: var(--dim); font-size: 10px; flex-shrink: 0; }

  .ev-attack_started    { color: var(--yellow); }
  .ev-detection         { color: var(--green); }
  .ev-detection_timeout { color: var(--orange); }
  .ev-recovery_complete { color: var(--cyan); }
  .ev-recovery_failed   { color: var(--red); }

  .act-ok  { color: var(--green); }
  .act-esc { color: var(--red); }
  .act-run { color: var(--blue); }
  .act-err { color: var(--red); }

  /* ── Incidents column (RIGHT, flex:1) ── */
  #incidents-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    padding: 10px 16px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #incidents-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  /* shared section style — left border, used by both dec-groups and esc-items */
  .section-group {
    border-left: 2px solid var(--border);
    padding: 5px 8px;
    font-size: 10px;
    line-height: 1.5;
    margin-top: 6px;
  }
  .section-group.s-protect { border-color: var(--orange); background: color-mix(in srgb, var(--orange) 4%, transparent); }
  .section-group.s-protect:hover { background: color-mix(in srgb, var(--orange) 8%, transparent); cursor: pointer; }
  .section-group.s-escalation { border-color: var(--purple); background: color-mix(in srgb, var(--purple) 4%, transparent); }
  .section-group.s-escalation:hover { background: color-mix(in srgb, var(--purple) 8%, transparent); cursor: pointer; }
  .section-group.s-recover { border-color: var(--green); background: color-mix(in srgb, var(--green) 3%, transparent); }
  .dec-row { display: flex; flex-direction: column; gap: 2px; padding: 2px 0; }
  .dec-header { display: flex; align-items: center; }
  .dec-action { color: var(--dim); font-weight: 600; flex: 1; }
  .dec-meta   { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
  .dec-conf   { color: var(--orange); }
  .dec-ttp    { color: var(--dim); font-size: 9px; }
  .dec-clickable { cursor: pointer; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: .5px;
  }
  .badge.isolated  { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .badge.blocked   { background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .badge.restoring { background: #0d2035; color: var(--blue); border: 1px solid #1a4060;
                     animation: pulse 2s infinite; }

  /* ── Escalation items ── */
  .vm-escalations {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .esc-item { font-size: 10px; line-height: 1.5; }
  .esc-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .esc-action-label { font-weight: 700; font-size: 12px; color: var(--purple); flex: 1; min-width: 0; line-height: 1.3; }
  .esc-context { color: var(--dim); font-size: 10px; margin-bottom: 4px; }
  .esc-reason  { color: var(--dim); font-size: 11px; line-height: 1.5; margin-bottom: 4px;
                 display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .esc-steps { margin-top: 6px; border-left: 2px solid var(--border); padding-left: 8px; display: flex; flex-direction: column; gap: 3px; }
  .esc-step  { color: var(--dim); font-size: 10px; line-height: 1.5; }
  .esc-query { background: var(--bg2); border-left: 2px solid var(--cyan); padding: 8px;
               font-size: 10px; color: var(--blue); white-space: pre-wrap; overflow-x: auto;
               margin: 6px 0; border-radius: 0 4px 4px 0; }


  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
  }
  .empty-state .check { font-size: 24px; color: var(--green); margin-bottom: 8px; }

  /* ── Config panel ── */
  #config-panel { font-size: 12px; }
  .cfg-section { margin-bottom: 4px; }
  .cfg-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .cfg-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 4px 0; border-bottom: 1px solid var(--bg2);
  }
  .cfg-key   { color: var(--dim); font-size: 11px; flex-shrink: 0; width: 130px; }
  .cfg-val   { color: var(--text); font-size: 11px; word-break: break-all; }
  .cfg-badge {
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 4px; flex-shrink: 0;
  }
  .cfg-badge.ok  { background: #1a3a1a; color: var(--green); border: 1px solid #2d5a2d; }
  .cfg-badge.warn{ background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .cfg-badge.err { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .cfg-badge.dim { background: var(--bg2); color: var(--dim); border: 1px solid var(--border); }
  .rule-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; border-radius: 6px; cursor: pointer;
    border-bottom: 1px solid var(--bg2);
  }
  .rule-item:hover { background: var(--bg2); }
  .rule-dot { font-size: 9px; flex-shrink: 0; }
  .rule-dot.ok   { color: var(--green); }
  .rule-dot.err  { color: var(--red); }
  .rule-dot.dim  { color: var(--dim); }
  .rule-name { font-size: 11px; flex: 1; }
  .rule-meta { font-size: 10px; color: var(--dim); display: flex; gap: 6px; flex-shrink: 0; }
  .cfg-backend-header {
    font-size: 10px; font-weight: 600; color: var(--blue);
    margin: 8px 0 4px; letter-spacing: 0.5px;
  }
  .modal.wide { max-width: 680px; min-width: 500px; max-height: 92vh; }
  .modal-query {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; font-family: var(--font); font-size: 11px; color: var(--cyan);
    white-space: pre; overflow-x: auto; margin-bottom: 16px; line-height: 1.5;
    max-height: 220px; overflow-y: auto;
  }

  button#config-toggle.active { border-color: var(--blue); color: var(--blue); }

  /* ── Topology Graph ── */
  .topo-graph {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 20px 20px 16px;
    flex: 1;
    overflow-y: auto;
    gap: 0;
  }
  .topo-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .topo-layer {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }
  .topo-spacer { height: 52px; flex-shrink: 0; }

  /* Agent node */
  .node-agent {
    background: var(--bg1);
    border: 2px solid var(--blue);
    border-radius: 10px;
    padding: 12px 20px;
    min-width: 240px;
    max-width: 420px;
    cursor: pointer;
    transition: box-shadow .2s;
    position: relative;
    z-index: 1;
  }
  .node-agent:hover { box-shadow: 0 0 20px color-mix(in srgb, var(--blue) 15%, transparent); }
  .node-agent-header { display: flex; align-items: center; gap: 8px; }
  .node-agent-title { color: var(--blue); font-weight: 700; font-size: 14px; letter-spacing: 2px; flex: 1; }
  .node-agent-stats { display: flex; gap: 14px; margin-top: 6px; font-size: 10px; color: var(--dim); }

  /* Module sections */
  .topo-modules {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 1;
    align-items: flex-start;
  }
  .topo-module {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
  }
  .topo-module + .topo-module { border-left: 1px solid var(--border); }
  .topo-module-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--dim);
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    white-space: nowrap;
    align-self: stretch;
    text-align: center;
  }
  .topo-module-label.detect  { border-color: var(--blue);   color: var(--blue); }
  .topo-module-label.protect { border-color: var(--orange); color: var(--orange); }
  .topo-module-label.recover { border-color: var(--green);  color: var(--green); }
  .topo-module-nodes { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

  /* Backend nodes */
  .node-backend {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    min-width: 140px;
    max-width: 200px;
    font-size: 11px;
    position: relative;
  }
  .node-backend.detect  { border: 1px solid var(--blue); }
  .node-backend.protect { border: 1px solid var(--orange); }
  .node-backend.recover { border: 1px solid var(--green); }
  .node-backend { transition: box-shadow 0.15s; }
  .node-backend.detect:hover  { box-shadow: 0 0 12px color-mix(in srgb, var(--blue)   55%, transparent); cursor: pointer; }
  .node-backend.protect:hover { box-shadow: 0 0 12px color-mix(in srgb, var(--orange) 55%, transparent); cursor: pointer; }
  .node-backend.recover:hover { box-shadow: 0 0 12px color-mix(in srgb, var(--green)  55%, transparent); cursor: pointer; }
  .node-backend-name { font-weight: 700; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
  .node-backend-type { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .node-backend-row  { display: flex; align-items: center; gap: 4px; color: var(--dim); font-size: 10px; margin-top: 2px; }

  /* Asset layer */
  .topo-assets {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-start;
    position: relative;
    z-index: 1;
    padding: 4px 0;
  }
  .node-asset {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    min-width: 160px;
    flex: 0 1 260px;
    max-width: 260px;
    transition: border-color .15s, background .15s;
    cursor: pointer;
    position: relative;
  }
  .node-asset.s-isolated  { border-color: var(--red);    background: color-mix(in srgb, var(--red)    5%, var(--bg1)); }
  .node-asset.s-blocked   { border-color: var(--orange); background: color-mix(in srgb, var(--orange) 5%, var(--bg1)); }
  .node-asset.s-both      { border-color: var(--red);    background: color-mix(in srgb, var(--red)    6%, var(--bg1)); }
  .node-asset.s-restoring { border-color: var(--blue);   background: color-mix(in srgb, var(--blue)   5%, var(--bg1)); animation: pulse 2s infinite; }
  .node-asset.s-releasing { border-color: var(--orange); background: color-mix(in srgb, var(--orange) 5%, var(--bg1)); animation: pulse 2s infinite; }
  .node-asset.s-incident  { border: 2px solid var(--purple); background: color-mix(in srgb, var(--purple) 6%, var(--bg1)); box-shadow: 0 0 8px color-mix(in srgb, var(--purple) 20%, transparent); }
  .node-asset-header { display: flex; align-items: center; gap: 6px; }
  .node-asset-header:hover { opacity: 0.85; }
  .node-asset-name   { font-weight: 700; font-size: 12px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-asset-states { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .node-asset-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* Drag-and-drop cards */
  .node-asset { transition: opacity 0.15s; }
  .node-asset.dragging   { opacity: 0.35; }
  .node-asset.drag-over  { box-shadow: 0 0 0 2px var(--purple), 0 0 12px color-mix(in srgb, var(--purple) 35%, transparent); }
  .node-asset-header     { cursor: grab; }
  .node-asset-header:active { cursor: grabbing; }
  .node-asset-empty {
    min-width: 160px; flex: 0 1 260px; max-width: 260px; height: 44px;
    border: 1px dashed color-mix(in srgb, var(--border) 50%, transparent);
    border-radius: 8px; opacity: 0.4; transition: opacity 0.15s, box-shadow 0.15s;
  }
  .node-asset-empty.drag-over {
    opacity: 1; border-color: var(--purple);
    box-shadow: 0 0 0 2px var(--purple), 0 0 12px color-mix(in srgb, var(--purple) 35%, transparent);
  }

  /* Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 100;
    max-width: 320px;
  }
  #toast.show { opacity: 1; }

  /* ── Capability popover ── */
  #cap-popover {
    display: none;
    position: fixed;
    z-index: 300;
    max-width: 340px;
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    box-shadow: 0 8px 28px rgba(0,0,0,.55);
    font-size: 11px;
    line-height: 1.5;
  }
  .cap-title { font-weight: 700; font-size: 12px; margin-bottom: 8px; }
  .cap-line  { color: var(--dim); margin: 4px 0; }
  .cap-group { margin-top: 8px; }
  .cap-head  { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 3px; }
  .cap-item  { color: var(--text); padding: 1px 0 1px 4px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    min-width: 360px;
    max-width: 520px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
  }
  .modal-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; flex-shrink: 0; }
  .modal-body  { color: var(--dim); font-size: 12px; line-height: 1.6; margin-bottom: 16px;
                 overflow-y: auto; flex: 1; min-height: 0; }
  .modal-cmd   { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
                 padding: 8px 12px; font-family: var(--font); font-size: 11px; color: var(--cyan);
                 white-space: pre-wrap; margin-bottom: 16px; flex-shrink: 0; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; padding-top: 4px; }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--dim);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <span class="logo">GLORFINDEL</span>
  <span class="subtitle">War Room</span>
  <span id="watch-dot" style="font-size:10px;color:var(--dim)">●</span>
  <span id="watch-label" style="color:var(--dim);font-size:11px">watch…</span>
  <span style="color:var(--border);margin:0 4px">│</span>
  <span id="live-dot">●</span>
  <span id="live-label" style="color:var(--dim);font-size:11px">connecting…</span>

  <div class="spacer"></div>

  <div class="scenario-row">
    <select id="scenario-select"><option value="">Run scenario…</option></select>
    <button class="primary" id="run-btn" disabled>▶ Run</button>
  </div>

  <button id="config-toggle" class="action" onclick="toggleConfig()" title="Azure configuration">⚙ Config</button>
  <span id="clock" style="min-width:70px;text-align:right"></span>
</header>

<main>
  <!-- Feed LEFT -->
  <div id="feed-col">
    <div class="col-header">LIVE FEED</div>
    <div id="feed-list"></div>
  </div>

  <!-- Infrastructure / Config RIGHT -->
  <div id="incidents-col">
    <div class="col-header" id="right-col-header" style="display:flex;align-items:center;gap:12px">
      <span id="right-col-label">INFRASTRUCTURE</span>
      <!-- Posture panel — anchored to the infra view (what Glorfindel can do TO it) -->
      <span id="posture-panel" style="margin-left:auto;display:inline-flex;align-items:center;gap:7px;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg2);letter-spacing:normal" title="Security posture — what Glorfindel can do to this infrastructure">
        <span style="font-size:10px;color:var(--dim)">mode</span>
        <span id="regime-badge" style="font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--dim)">…</span>
        <span style="color:var(--border);margin:0 2px">·</span>
        <span id="autonomy-default" style="font-size:10px"></span>
      </span>
    </div>
    <div id="incidents-list">
      <div class="empty-state">
        <div class="check">✓</div>
        <div>All clear — no active incidents</div>
        <div style="margin-top:6px;font-size:11px">Run a scenario to start</div>
      </div>
    </div>
    <div id="config-panel" style="display:none;flex:1;overflow-y:auto;padding:16px;flex-direction:column;gap:16px;"></div>
  </div>
</main>

<div id="toast"></div>

<!-- Autonomy capability popover — what Glorfindel runs alone vs always gates, per mode -->
<div id="cap-popover"></div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-cmd"   id="modal-cmd" style="display:none"></div>
    <div class="modal-actions">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-confirm" class="primary"></button>
    </div>
  </div>
</div>

<script>
// ── Label maps (mirrors escalations.py) ────────────────────────────────────────

const ACTION_LABELS = {
  isolate_vm:           'VM isolated from network',
  release_isolation:    'Isolation lifted',
  snapshot:             'Forensic snapshot created',
  block_suspicious_ip:  'Suspicious IP blocked',
  revoke_temp_access:   'Temporary access revoked',
  restore_from_backup:  'Restore from backup',
  delete_resource:      'Resource deleted',
  wipe_storage:         'Storage wiped',
  modify_network_rule:  'Network rule modified',
  escalate_permissions: 'Permissions escalated',
};

// Verb forms — used for actions not yet executed (mode_hold: recommended, pending approval)
const ACTION_LABELS_VERB = {
  isolate_vm:          'Isolate VM',
  release_isolation:   'Release isolation',
  snapshot:            'Create forensic snapshot',
  block_suspicious_ip: 'Block suspicious IP',
  revoke_temp_access:  'Revoke temporary access',
};

function actionLabelVerb(action) {
  return ACTION_LABELS_VERB[action] || ACTION_LABELS[action] || action;
}

const ESC_LABELS = {
  low_confidence:      'low confidence',
  destructive_action:  'destructive action',
  proposed_action:     'unknown action',
  verification_failed: 'verification failed',
  proposed_rule:       'proposed rule',
  mode_hold:           'mode human-only',
  write_blocked:       'write blocked',
  action_failed:       'action failed',
  ttl_exceeded:        'TTL exceeded',
};

function actionLabel(action) {
  return ACTION_LABELS[action] || action;
}

function escLabel(type) {
  return ESC_LABELS[type] || type;
}

function cliCommand(esc) {
  const rid = esc.resource_id;
  const id  = esc.id.slice(0, 8);
  if (esc.escalation_type === 'mode_hold') {
    const vm = rid.split('/').pop();
    const actionMap = {
      isolate_vm:          `glorfindel isolate ${vm} --yes`,
      snapshot:            `glorfindel snapshot ${vm} --yes`,
      block_suspicious_ip: `glorfindel block <ip> ${vm} --yes`,
      release_isolation:   `glorfindel release ${vm} --yes`,
      revoke_temp_access:  `glorfindel ack ${id}  # revoke_temp_access — manual`,
    };
    return (actionMap[esc.action] || `glorfindel ack ${id}`) + `\nglorfindel ack ${id}`;
  }
  if (esc.action === 'restore_from_backup') {
    return `glorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'verification_failed') {
    return `glorfindel revert ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'low_confidence') {
    return `# Verify the snapshot, then if needed:\nglorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  return `glorfindel ack ${id}`;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function age(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm ago';
}

function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toISOString().slice(11, 19) + ' UTC';
}

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.querySelector('.modal').classList.remove('wide');
}

function openModal(title, body, cmd, confirmLabel, confirmClass, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const cmdEl = document.getElementById('modal-cmd');
  if (cmd) { cmdEl.textContent = cmd; cmdEl.style.display = ''; }
  else cmdEl.style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = confirmLabel;
  btn.className = confirmClass;
  btn.onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modal').classList.add('open');
}

function showReasoning(vmName, idx) {
  const cached = _actionsCache[vmName];
  if (!cached) return;
  const a = cached.actions[idx];
  if (!a) return;

  const pct  = a.confidence ? ` · ${Math.round(a.confidence * 100)}%` : '';
  const title = `${actionLabel(a.action)}${pct} — ${a.ttp || ''} — ${a.timestamp ? new Date(a.timestamp).toISOString().slice(11,19) + ' UTC' : ''}`;
  const text  = a.full_reasoning || a.reasoning || '(no reasoning available)';

  document.getElementById('modal-title').textContent = title;
  // Render reasoning with step headers highlighted
  const formatted = text
    .replace(/^(Étape\s+\d+\s*[–\-:].*)/gim, '\n$1\n')
    .replace(/^(Step\s+\d+\s*[–\-:].*)/gim, '\n$1\n')
    .trim();
  const bodyEl = document.getElementById('modal-body');
  bodyEl.textContent = formatted;

  const cmdEl = document.getElementById('modal-cmd');
  cmdEl.style.display = 'none';

  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = closeModal;

  document.getElementById('modal').classList.add('open');
}

function openCommandModal(escId) {
  const esc = _escById[escId];
  if (!esc) return;
  const cmd = cliCommand(esc);
  const isSnapshotPending = esc.action === 'snapshot' && esc.escalation_type === 'low_confidence';
  const isCmdModeHold = esc.escalation_type === 'mode_hold';
  const label = isCmdModeHold ? actionLabelVerb(esc.action) + ' — pending approval'
              : isSnapshotPending ? 'Snapshot recommended' : actionLabel(esc.action);
  document.getElementById('modal-title').textContent = '📋 ' + label;
  document.getElementById('modal-body').textContent = 'CLI command to run for this escalation:';
  const cmdEl = document.getElementById('modal-cmd');
  cmdEl.textContent = cmd;
  cmdEl.style.display = '';
  document.getElementById('modal-cancel').style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = () => {
    closeModal();
    document.getElementById('modal-cancel').style.display = '';
  };
  document.getElementById('modal').classList.add('open');
}

// ── State ──────────────────────────────────────────────────────────────────────

let _state      = { resources: [], escalations: [] };
let _escById    = {};
let _cfgData    = null;
let _auditData     = null;   // null=never loaded, {audits:[]} = loaded (possibly empty)
let _auditLoading  = false;
let _auditLastRun  = null;   // ISO timestamp of last successful fetch
let _actionsCache = {};   // vm_name → {actions, fetchedAt}
let _autoScroll = true;

// ── Clock ──────────────────────────────────────────────────────────────────────

setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toISOString().slice(11, 19) + ' UTC';
}, 1000);

// ── Scenarios ──────────────────────────────────────────────────────────────────

async function loadScenarios() {
  try {
    const r = await fetch('/api/scenarios');
    const data = await r.json();
    const sel = document.getElementById('scenario-select');
    data.scenarios.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      document.getElementById('run-btn').disabled = !sel.value;
    });
  } catch (e) {}
}

document.getElementById('run-btn').addEventListener('click', () => {
  const name = document.getElementById('scenario-select').value;
  if (!name) return;
  openModal(
    'Run scenario',
    `This will launch annatar run scenarios/azure/${name}.yaml on the live Azure infrastructure.`,
    `annatar run scenarios/azure/${name}.yaml`,
    '▶ Run',
    'primary',
    () => runScenario(name),
  );
});

async function runScenario(name) {
  toast('⚡ Starting ' + name + '…');
  try {
    await fetch(`/api/run/${name}`, { method: 'POST' });
  } catch (e) {
    toast('✗ Failed to start scenario: ' + e.message);
  }
}

// ── Infrastructure cards ───────────────────────────────────────────────────────

// Group escalations by action, render each group as one item (N dupes = single Ack All)
function _groupEscs(escs) {
  const map = new Map();
  escs.forEach(e => {
    const key = e.action === 'improve_detection' ? e.id : e.action; // rules stay separate
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(e);
  });
  return [...map.values()];
}

function _renderEscGroup(group) {
  const e     = group[0]; // most recent / representative
  const isSnapshotPending = e.action === 'snapshot' && e.escalation_type === 'low_confidence';
  const isModeHold        = e.escalation_type === 'mode_hold';
  const isWriteBlocked    = e.escalation_type === 'write_blocked';
  const isActionFailed    = e.escalation_type === 'action_failed';
  const pct    = e.confidence ? Math.round(e.confidence * 100) + '%' : '';
  const label  = isModeHold
    ? `${actionLabelVerb(e.action)}${pct ? ` (${pct})` : ''} — pending approval`
    : isSnapshotPending  ? 'Snapshot recommended'
    : isWriteBlocked     ? `${actionLabelVerb(e.action) || e.action || '?'} — write blocked`
    : isActionFailed     ? `${actionLabelVerb(e.action) || e.action || '?'} — failed`
    : (actionLabel(e.action) || escLabel(e.escalation_type) || e.escalation_type || '?');
  const count = group.length;
  const ids   = group.map(g => g.id).join(','); // CSV — safe in onclick attrs, no quotes
  const isRule = e.action === 'improve_detection' && e.proposal_id;
  // proposed rule: Approve/Reject cover the decision — Ack is redundant
  const ruleButtons = isRule ? `
    <button class="action ok" onclick="event.stopPropagation();doApproveRule('${e.proposal_id}','${e.id}')" style="font-size:9px;padding:2px 7px">✓ Approve</button>
    <button class="action" onclick="event.stopPropagation();doRejectRule('${e.proposal_id}','${e.id}')" style="font-size:9px;padding:2px 7px;color:var(--red)">✗ Reject</button>` : '';
  const vmName = e.resource_id.split('/').pop();
  const countBadge = count > 1
    ? `<span style="font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;
                    background:color-mix(in srgb,var(--purple) 15%,transparent);
                    color:var(--purple)">×${count}</span>` : '';
  const isRestore = e.action === 'restore_from_backup';
  const actionBtns = isRule
    ? ruleButtons
    : isModeHold
    ? `<button class="action primary" onclick="event.stopPropagation();doApproveAction('${e.id}','${vmName}')" style="font-size:9px;padding:2px 7px">▶ Approve & execute</button>
       <button class="action" onclick="event.stopPropagation();doAckAll('${ids}')" style="font-size:9px;padding:2px 7px">✓ Ack</button>
       <button class="action" onclick="event.stopPropagation();openCommandModal('${e.id}')" style="font-size:9px;padding:2px 7px">📋 Cmd</button>`
    : isRestore
    ? `<button class="action primary" onclick="event.stopPropagation();confirmRestore('${vmName}')" style="font-size:9px;padding:2px 7px">🔄 Restore</button>
       <button class="action" onclick="event.stopPropagation();doAckAll('${ids}')" style="font-size:9px;padding:2px 7px">✓ Ack</button>
       <button class="action" onclick="event.stopPropagation();openCommandModal('${e.id}')" style="font-size:9px;padding:2px 7px">📋 Cmd</button>`
    : isSnapshotPending
    ? `<button class="action" onclick="event.stopPropagation();doSnapshot('${vmName}')" style="font-size:9px;padding:2px 7px">📸 Snapshot</button>
       <button class="action" onclick="event.stopPropagation();doAckAll('${ids}')" style="font-size:9px;padding:2px 7px">✓ Ack</button>
       <button class="action" onclick="event.stopPropagation();openCommandModal('${e.id}')" style="font-size:9px;padding:2px 7px">📋 Cmd</button>`
    : `<button class="action" onclick="event.stopPropagation();doAckAll('${ids}')" style="font-size:9px;padding:2px 7px">✓ Ack</button>
       <button class="action" onclick="event.stopPropagation();openCommandModal('${e.id}')" style="font-size:9px;padding:2px 7px">📋 Cmd</button>`;
  // mode_hold/write_blocked/action_failed: type already encoded in title, keep ctx lean
  const ctxParts = (isModeHold || isWriteBlocked || isActionFailed)
    ? [e.ttp, e.severity].filter(Boolean).join(' · ')
    : [e.ttp, pct, e.severity, escLabel(e.escalation_type)].filter(Boolean).join(' · ');
  return `<div class="esc-item section-group s-escalation" style="margin-top:5px" onclick="showEscModal('${vmName}')">
    <div style="display:flex;align-items:flex-start;gap:5px;margin-bottom:3px">
      <span class="esc-action-label">${label}</span>
      ${countBadge}
      <span style="color:var(--blue);font-size:10px;margin-left:auto;padding-top:1px;flex-shrink:0">▸ details</span>
    </div>
    ${ctxParts ? `<div class="esc-context">${ctxParts}</div>` : ''}
    <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap" onclick="event.stopPropagation()">${actionBtns}</div>
  </div>`;
}

async function doAckAll(ids) {
  if (typeof ids === 'string') ids = ids.split(',').filter(Boolean);
  try {
    await Promise.all(ids.map(id => fetch(`/api/action/ack/${id}`, { method: 'POST' })));
    toast(`✓ Acknowledged (${ids.length})`);
    refreshState();
  } catch (e) {
    toast('✗ ' + e.message);
  }
}

// ── Topology rendering ─────────────────────────────────────────────────────────

let _expandedVms      = new Set();
let _collapsedVms     = new Set(); // user explicitly collapsed — immune to auto-expand
let _expandedBackends = new Set();
let _rulesCache       = [];   // flat array, index used in onclick to avoid JSON.stringify in HTML
let _pendingActions   = new Set(); // vm_names with in-flight release/unblock actions
let _cardOrder     = JSON.parse(localStorage.getItem('glorfindel_card_order') || '[]');
let _currentVmNames = [];

// Build ordered slot array (vm_name | null) — always min 4 slots, always 1 extra empty
function _buildSlots(vmNames) {
  const minSize = Math.max(4, vmNames.length + 1);
  const slots = [..._cardOrder];
  while (slots.length < minSize) slots.push(null);
  // Remove stale VMs (no longer exist)
  const nameSet = new Set(vmNames);
  for (let i = 0; i < slots.length; i++) {
    if (slots[i] && !nameSet.has(slots[i])) slots[i] = null;
  }
  // Place new VMs into first available empty slot
  const inSlots = new Set(slots.filter(Boolean));
  for (const name of vmNames) {
    if (!inSlots.has(name)) {
      const ei = slots.findIndex(s => s === null);
      if (ei >= 0) slots[ei] = name; else slots.push(name);
    }
  }
  return slots;
}

function dropOnSlot(slotIdx, sourceName) {
  if (!sourceName) return;
  const slots = _buildSlots(_currentVmNames);
  const sourceIdx = slots.indexOf(sourceName);
  if (sourceIdx === slotIdx) return;
  const displaced = slots[slotIdx]; // null or another VM
  if (sourceIdx >= 0) slots[sourceIdx] = displaced;
  slots[slotIdx] = sourceName;
  _cardOrder = [...slots];
  localStorage.setItem('glorfindel_card_order', JSON.stringify(_cardOrder));
  renderInfra();
}

function toggleBackend(name) {
  if (_expandedBackends.has(name)) _expandedBackends.delete(name);
  else _expandedBackends.add(name);
  renderInfra();
}

function toggleAsset(vmName) {
  if (_expandedVms.has(vmName)) {
    _expandedVms.delete(vmName);
    _collapsedVms.add(vmName);
  } else {
    _expandedVms.add(vmName);
    _collapsedVms.delete(vmName);
  }
  renderInfra();
}

function _dot(color) {
  return `<span style="color:${color};font-size:10px">●</span>`;
}



async function refreshActionsData() {
  const { resources = [] } = _state;
  const toFetch = resources
    .map(r => r.vm_name)
    .filter(vm => {
      const cached = _actionsCache[vm];
      return !cached || (Date.now() - cached.fetchedAt > 30000);
    });

  if (!toFetch.length) return;
  await Promise.all(toFetch.map(async vm => {
    try {
      const r = await fetch(`/api/actions/${vm}?limit=15`);
      const d = await r.json();
      _actionsCache[vm] = { actions: d.actions || [], fetchedAt: Date.now() };
    } catch (e) {}
  }));
  renderInfra();
}

function renderInfra() {
  if (_configMode) return;
  const list           = document.getElementById('incidents-list');
  const rules          = _cfgData?.detection?.rules     || [];
  const detectBackends  = _cfgData?.monitoring_backends  || [];
  const recoverBackends = (_cfgData?.assets || []).filter(a => a.type === 'azure_backup_vault');
  const discovered     = _state?.discovered_assets      || [];
  const knownResources = _cfgData?.known_resources      || [];
  const { resources = [], escalations = [], restores = [] } = _state;

  _escById = {};
  escalations.forEach(e => { _escById[e.id] = e; });
  _rulesCache = rules.slice(); // refresh index cache each render
  const restoreByVm = {};
  restores.forEach(r => { restoreByVm[r.vm_name] = r; });

  const detEscs = escalations.filter(e => e.action === 'improve_detection');
  const vmEscs  = escalations.filter(e => e.action !== 'improve_detection');

  const resourceMap = new Map();
  knownResources.forEach(r => resourceMap.set(r.resource_id, { ...r, states: [] }));
  resources.forEach(r => {
    if (resourceMap.has(r.resource_id)) resourceMap.get(r.resource_id).states = r.states;
    else resourceMap.set(r.resource_id, r);
  });
  // Ajouter les assets découverts absents du resourceMap — déduplique par vm_name
  discovered.forEach(d => {
    const exists = [...resourceMap.values()].some(r => r.vm_name === d.name);
    if (!exists) {
      const key = d.resource_id || `discovered:${d.name}`;
      resourceMap.set(key, { resource_id: key, vm_name: d.name, states: [] });
    }
  });
  vmEscs.forEach(e => {
    const vmName = e.resource_id.split('/').pop();
    const exists = [...resourceMap.values()].some(r => r.vm_name === vmName);
    if (!exists)
      resourceMap.set(e.resource_id, {
        resource_id: e.resource_id,
        vm_name: vmName, states: [] });
  });

  // Auto-expand VMs with active incidents, unless user explicitly collapsed them
  // When incident clears, reset the collapsed preference so next incident re-expands
  [...resourceMap.values()].forEach(r => {
    const hasIncident = (r.states||[]).length > 0
      || vmEscs.some(e => e.resource_id === r.resource_id
           || e.resource_id.split('/').pop() === r.vm_name);
    if (hasIncident && !_collapsedVms.has(r.vm_name)) _expandedVms.add(r.vm_name);
    if (!hasIncident) _collapsedVms.delete(r.vm_name); // allow re-expand on next incident; don't force-collapse user-expanded clean cards
  });

  list.innerHTML = `
    <div class="topo-graph" id="topo-graph">
      <svg class="topo-svg" id="topo-svg"></svg>

      <!-- Layer 1 — Agent -->
      <div class="topo-layer">
        ${_renderAgentNode(rules, detectBackends, recoverBackends, discovered)}
      </div>

      <div class="topo-spacer"></div>

      <!-- Layer 2 — Modules -->
      <div class="topo-layer">
        ${_renderModules(rules, detectBackends, recoverBackends, resources)}
      </div>

      <div class="topo-spacer"></div>

      <!-- Layer 3 — Assets -->
      <div class="topo-assets" id="topo-assets">
        ${(() => {
          _currentVmNames = [...resourceMap.values()].map(r => r.vm_name);
          const slots = _buildSlots(_currentVmNames);
          if (slots.every(s => !s)) return `<div style="color:var(--dim);font-size:11px;padding:24px;text-align:center;width:100%">No assets discovered — check monitoring backends</div>`;
          return slots.map((vmName, slotIdx) => {
            if (vmName) {
              const r = [...resourceMap.values()].find(r => r.vm_name === vmName);
              if (r) return _renderAssetNode(r, vmEscs, detEscs, restoreByVm, slotIdx);
            }
            return `<div class="node-asset-empty"
              ondragover="event.preventDefault();this.classList.add('drag-over')"
              ondragleave="this.classList.remove('drag-over')"
              ondrop="event.preventDefault();this.classList.remove('drag-over');dropOnSlot(${slotIdx},event.dataTransfer.getData('text/plain'))"></div>`;
          }).join('');
        })()}
      </div>


      <!-- Legend -->
      <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center">
        <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);flex-shrink:0">LEGEND</span>
        <span style="font-size:9px;color:var(--dim)">Edges :</span>
        <span style="font-size:10px;color:var(--blue)">━━ detect</span>
        <span style="font-size:10px;color:var(--orange)">━━ protect</span>
        <span style="font-size:10px;color:var(--green)">━━ recover</span>
        <span style="font-size:10px;color:var(--orange)">━━ isolated</span>
        <span style="font-size:10px;color:var(--orange);letter-spacing:2px">╌╌ blocked</span>
        <span style="font-size:10px;color:var(--purple)">━━ escalation</span>
        <span style="font-size:9px;color:var(--dim);margin-left:4px">Assets:</span>
        <span style="font-size:10px"><span style="color:var(--green)">●</span> <span style="color:var(--dim)">clean</span></span>
        <span style="font-size:10px"><span style="color:var(--orange)">●</span> <span style="color:var(--dim)">blocked</span></span>
        <span style="font-size:10px"><span style="color:var(--red)">●</span> <span style="color:var(--dim)">isolated</span></span>
        <span style="font-size:10px"><span style="color:var(--blue)">●</span> <span style="color:var(--dim)">restoring</span></span>
        <span style="font-size:10px"><span style="color:var(--purple)">●</span> <span style="color:var(--dim)">escalation</span></span>
      </div>
    </div>`;

  requestAnimationFrame(_drawTopologyEdges);
  _applyReadOnlyGuards(list);
}

function renderIncidents() { renderInfra(); }

// ── Agent node ─────────────────────────────────────────────────────────────────

function _renderAgentNode(rules, detectBackends, recoverBackends, discovered) {
  const moduleCount = detectBackends.length + recoverBackends.length + 1;
  // Parent node summarises its children: aggregate health of DETECT (rule polling)
  // and RECOVER (backup audit). Distinct from the header's `watch active` (engine
  // heartbeat) and `live` (UI freshness) — three different questions, no redundancy.
  const ruleErr      = rules.some(r => r.last_error);
  const rulesPolling = rules.length && rules.every(r => r.last_poll && !r.last_error);
  const auditChecks  = (_auditData?.audits || []).flatMap(a =>
    (a.checks || []).filter(c => c.action === 'restore_from_backup'));
  const auditErr  = !!_auditData?.error || auditChecks.some(c => c.status === 'fail');
  const auditWarn = auditChecks.some(c => c.status === 'warn');
  const health = (ruleErr || auditErr)                    ? 'err'
               : (auditWarn || (rules.length && !rulesPolling)) ? 'warn'
               : (rules.length || auditChecks.length)     ? 'ok'
               :                                            'idle';
  const [dotColor, dotTitle] =
      health === 'err'  ? ['var(--red)',    'A module is in error']
    : health === 'warn' ? ['var(--orange)', 'A module is degraded']
    : health === 'ok'   ? ['var(--green)',  'All modules healthy']
    :                     ['var(--dim)',    'Awaiting data'];
  const dot = `<span style="color:${dotColor}" title="${dotTitle}">●</span>`;

  return `<div class="node-agent" id="node-agent">
    <div class="node-agent-header">
      <span class="node-agent-title">GLORFINDEL</span>
      ${dot}
    </div>
    <div class="node-agent-stats">
      <span>${moduleCount} modules</span>
    </div>
  </div>`;
}

// ── Module nodes ───────────────────────────────────────────────────────────────

function _renderModules(rules, detectBackends, recoverBackends, resources) {
  // DETECT
  const detectNodes = detectBackends.map(b => {
    const bRules   = rules.filter(r => r.monitoring_backend_name === b.name);
    const hasErr   = bRules.some(r => r.last_error);
    const allPoll  = bRules.length && bRules.every(r => r.last_poll && !r.last_error);
    const lastMatch = bRules.reduce((m, r) => r.last_match && r.last_match > (m||'') ? r.last_match : m, null);
    const dot = hasErr ? `<span style="color:var(--red)">●</span>`
              : allPoll ? `<span style="color:var(--green)">●</span>`
              : `<span style="color:var(--dim)">●</span>`;
    const expandId  = `rules-${b.name.replace(/[^a-z0-9]/gi,'-')}`;
    const isExpanded = _expandedBackends.has(b.name);
    const ruleRows  = bRules.map(r => {
      const idx = _rulesCache.indexOf(r);
      const dc  = r.last_error ? 'var(--red)' : r.last_poll ? 'var(--green)' : 'var(--dim)';
      const mt  = r.last_match ? `<span style="color:var(--orange);font-size:9px;margin-left:auto">${_relTime(r.last_match)}</span>` : '';
      return `<div class="row rule-item" onclick="event.stopPropagation();showRuleByIdx(${idx})"
        style="padding:3px 4px;font-size:10px">
        <span style="color:${dc};font-size:9px">●</span>
        <span style="flex:1">${r.name}</span>
        ${r.ttp ? `<span style="color:var(--dim);font-size:9px">${r.ttp}</span>` : ''}
        ${mt}
        <span style="color:var(--dim);font-size:9px">▸</span>
      </div>`;
    }).join('');
    return `<div class="node-backend detect" id="nb-${b.name}" style="cursor:pointer;max-width:240px"
      onclick="event.stopPropagation();toggleBackend('${b.name}')">
      <div class="node-backend-name">${dot} ${b.name}</div>
      <div class="node-backend-type">${b.type}</div>
      <div class="node-backend-row" style="justify-content:space-between">
        <span>${bRules.length} rule${bRules.length>1?'s':''}</span>
        ${lastMatch ? `<span style="color:var(--orange);font-size:9px">match ${_relTime(lastMatch)}</span>` : ''}
        <span style="color:var(--blue);font-size:9px">${isExpanded ? '▾' : '▸'}</span>
      </div>
      ${hasErr ? `<div class="node-backend-row" style="color:var(--red);font-size:9px">⚠ error</div>` : ''}
      ${isExpanded ? `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">${ruleRows}</div>` : ''}
    </div>`;
  }).join('') || `<div style="color:var(--dim);font-size:10px">No monitoring backends</div>`;

  // PROTECT — capacité de réaction du provider (pas un backend configuré)
  const isIsolated  = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked   = resources.some(r => r.states?.some(s => s.type === 'blocked'));
  const isolCount   = resources.filter(r => r.states?.some(s => s.type === 'isolated')).length;
  const blockCount  = resources.reduce((n, r) =>
    n + (r.states||[]).filter(s => s.type === 'blocked').length, 0);
  const protectDot  = isIsolated ? `<span style="color:var(--red)">●</span>`
                    : isBlocked  ? `<span style="color:var(--orange)">●</span>`
                    :              `<span style="color:var(--green)">●</span>`;
  const protectRows = [
    isolCount ? `<div class="node-backend-row" style="color:var(--red)">${isolCount} isolation${isolCount>1?'s':''} active</div>` : '',
    blockCount ? `<div class="node-backend-row" style="color:var(--orange)">${blockCount} IP${blockCount>1?'s':''} blocked</div>` : '',
    (!isIsolated && !isBlocked) ? `<div class="node-backend-row" style="color:var(--green)">no restrictions</div>` : '',
  ].filter(Boolean).join('');
  const protectNode = `<div class="node-backend protect ${isIsolated ? 'state-error' : isBlocked ? 'state-warn' : ''}" id="module-protect">
    <div class="node-backend-name">${protectDot} network control</div>
    <div class="node-backend-type">cloud provider</div>
    ${protectRows}
  </div>`;

  // RECOVER
  const recoverNodes = recoverBackends.map(b => {
    const checks = (_auditData?.audits || []).flatMap(a =>
      (a.checks||[]).filter(c => c.action === 'restore_from_backup'));
    const hasError = !!_auditData?.error;
    const worst = hasError         ? 'error'
                : _auditLoading    ? 'loading'
                : _auditData === null ? 'pending'
                : checks.some(c => c.status === 'fail') ? 'fail'
                : checks.some(c => c.status === 'warn') ? 'warn'
                : checks.length    ? 'ok'
                :                    'nodata';
    const dot = worst==='ok'      ? `<span style="color:var(--green)">●</span>`
              : worst==='warn'    ? `<span style="color:var(--orange)">●</span>`
              : worst==='fail'    ? `<span style="color:var(--red)">●</span>`
              : worst==='error'   ? `<span style="color:var(--red)">●</span>`
              :                     `<span style="color:var(--dim)">●</span>`;
    const lastRun = _auditLastRun
      ? `<div class="node-backend-row" style="color:var(--dim);font-size:9px">audit ${_relTime(_auditLastRun)}</div>` : '';
    const statusRow = worst==='ok'
      ? `<div class="node-backend-row" style="color:var(--green)">backup ok</div>`
      : worst==='warn'
      ? `<div class="node-backend-row" style="color:var(--orange)">backup stale</div>`
      : worst==='fail'
      ? `<div class="node-backend-row" style="color:var(--red)">backup missing</div>`
      : worst==='error'
      ? `<div class="node-backend-row" style="color:var(--red);font-size:9px">Azure API error</div>`
      : worst==='loading'
      ? `<div class="node-backend-row" style="color:var(--dim)"><span class="spinner"></span>auditing…</div>`
      : worst==='nodata'
      ? `<div class="node-backend-row" style="color:var(--dim)">no assets audited</div>`
      : `<div class="node-backend-row" style="color:var(--dim)">audit pending
          <button class="action" style="font-size:9px;padding:1px 5px;margin-left:4px"
            onclick="event.stopPropagation();refreshAuditData()">↺</button></div>`;
    const refreshBtn = worst !== 'loading'
      ? `<div class="node-backend-row" style="margin-top:2px">
           <button class="action" style="font-size:9px;padding:1px 5px"
             onclick="event.stopPropagation();refreshAuditData()">↺ audit</button>
         </div>` : '';
    return `<div class="node-backend recover ${worst==='fail'||worst==='error'?'state-error':worst==='warn'?'state-warn':''}" id="nb-${b.name}">
      <div class="node-backend-name">${dot} ${b.name}</div>
      <div class="node-backend-type">backup vault</div>
      ${statusRow}
      ${lastRun}
      ${refreshBtn}
    </div>`;
  }).join('') || `<div style="color:var(--dim);font-size:10px">No action backends</div>`;

  return `<div class="topo-modules">
    <div class="topo-module">
      <div class="topo-module-label detect">DETECT</div>
      <div class="topo-module-nodes">${detectNodes}</div>
    </div>
    <div class="topo-module">
      <div class="topo-module-label protect">PROTECT</div>
      <div class="topo-module-nodes">${protectNode}</div>
    </div>
    <div class="topo-module">
      <div class="topo-module-label recover">RECOVER</div>
      <div class="topo-module-nodes">${recoverNodes}</div>
    </div>
  </div>`;
}

// ── Asset nodes ────────────────────────────────────────────────────────────────

function _renderAssetNode(resource, vmEscs, detEscs, restoreByVm, slotIdx = 0) {
  const { resource_id, vm_name, states = [] } = resource;
  const isIsolated  = states.some(s => s.type === 'isolated');
  const isBlocked   = states.some(s => s.type === 'blocked');
  const restoreInfo = restoreByVm[vm_name];
  const myEscs      = vmEscs.filter(e =>
    e.resource_id === resource_id || e.resource_id.split('/').pop() === vm_name);
  const myDetEscs   = (detEscs||[]).filter(e =>
    e.resource_id === resource_id || e.resource_id.split('/').pop() === vm_name);
  const totalEscs   = myEscs.length + myDetEscs.length;
  const isExpanded  = _expandedVms.has(vm_name);

  const stateClass = _pendingActions.has(vm_name) ? 's-releasing'
                   : restoreInfo    ? 's-restoring'
                   : (isIsolated && isBlocked) ? 's-both'
                   : isIsolated     ? 's-isolated'
                   : isBlocked      ? 's-blocked'
                   : myEscs.length  ? 's-incident'
                   : 's-clean';

  const dot = restoreInfo   ? `<span style="color:var(--blue)">●</span>`
            : isIsolated    ? `<span style="color:var(--red)">●</span>`
            : isBlocked     ? `<span style="color:var(--orange)">●</span>`
            : myEscs.length ? `<span style="color:var(--purple)">●</span>`
            :                 `<span style="color:var(--green)">●</span>`;

  // Badges are clickable in compact mode only — expanded mode uses dec-row / esc-items
  const escBadge = totalEscs
    ? `<span ${!isExpanded ? `onclick="event.stopPropagation();showEscModal('${vm_name}')"` : ''}
        style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;
               ${!isExpanded ? 'cursor:pointer;' : ''}
               background:color-mix(in srgb,var(--purple) 18%,transparent);
               color:var(--purple);border:1px solid color-mix(in srgb,var(--purple) 45%,transparent)">
        ${totalEscs} escalation${totalEscs > 1 ? 's' : ''}${!isExpanded ? ' ▸' : ''}</span>`
    : '';

  const stateBadges = [
    restoreInfo ? `<span class="badge restoring" style="font-size:9px">🔄 RESTORING · ${restoreInfo.elapsed_label}</span>` : '',
    ...states.map(s => s.type === 'isolated'
      ? `<span class="badge isolated" style="font-size:9px${!isExpanded ? ';cursor:pointer' : ''}"
           ${!isExpanded ? `onclick="event.stopPropagation();showIsolationModal('${vm_name}')"` : ''}>ISOLATED · ${age(s.since)}</span>`
      : `<span class="badge blocked" style="font-size:9px${!isExpanded ? ';cursor:pointer' : ''}"
           ${!isExpanded ? `onclick="event.stopPropagation();showIsolationModal('${vm_name}')"` : ''}>BLOCKED ${s.ip} · ${age(s.since)}</span>`),
    escBadge,
  ].filter(Boolean).join('');

  const auditEntry = (_auditData?.audits || []).find(a => a.resource_id === resource_id);
  const readiness  = auditEntry
    ? ACTION_GROUPS.map(g => {
        const st = _worstStatus(auditEntry.checks, g.actions);
        const [ic, col] = st==='ok' ? ['✓','var(--green)'] : st==='warn' ? ['⚠','var(--orange)']
                        : st==='fail' ? ['✗','var(--red)'] : ['—','var(--dim)'];
        return `<span style="font-size:11px;color:${col}" title="${g.label}: ${st}">${ic}</span>`;
      }).join(' ')
    : '';

  const cached = _actionsCache[vm_name];
  const escalatedActions = new Set(myEscs.map(e => e.action));
  const seenDecActions   = new Set();

  // Build dec-rows: autonomous actions only, deduplicated, state badge + correction button merged in
  const filteredDecs = (cached?.actions || [])
    .map((a, realIdx) => ({ a, realIdx }))
    .filter(({ a }) => {
      if (a.action === 'improve_detection')                return false;
      if (escalatedActions.has(a.action))                  return false;
      if (seenDecActions.has(a.action))                    return false;
      // Hide state-coupled actions when state is no longer active
      if (a.action === 'isolate_vm'          && !isIsolated) return false;
      if (a.action === 'block_suspicious_ip' && !isBlocked)  return false;
      // Admin/recovery/destructive actions — noise once resolved, handled via esc-item when pending
      if (['release_isolation', 'revoke_temp_access',
           'restore_from_backup', 'delete_resource',
           'wipe_storage', 'modify_network_rule', 'escalate_permissions'].includes(a.action)) return false;
      seenDecActions.add(a.action);
      return true;
    })
    .slice(0, 2);

  const coveredByDec = new Set(filteredDecs.map(({ a }) => a.action));

  const decisionHtml = filteredDecs.map(({ a, realIdx }) => {
    const pct = a.confidence ? Math.round(a.confidence * 100) + '%' : '';
    const hasDetail = !!a.full_reasoning;

    // State badge + correction button for matching autonomous actions
    let badge = '';
    let corrBtn = '';
    if (a.action === 'isolate_vm' && isIsolated) {
      const s = states.find(s => s.type === 'isolated');
      badge   = s ? `<span class="badge isolated" style="font-size:9px;cursor:default">ISOLATED · ${age(s.since)}</span>` : '';
      corrBtn = `<button class="action danger" onclick="event.stopPropagation();confirmRelease('${vm_name}')" style="font-size:9px;padding:2px 7px;margin-left:auto">↩️ Release</button>`;
    } else if (a.action === 'block_suspicious_ip' && isBlocked) {
      const s = states.find(s => s.type === 'blocked');
      badge   = s ? `<span class="badge blocked" style="font-size:9px;cursor:default">BLOCKED ${s.ip} · ${age(s.since)}</span>` : '';
      corrBtn = `<button class="action danger" onclick="event.stopPropagation();confirmUnblock('${vm_name}')" style="font-size:9px;padding:2px 7px;margin-left:auto">↩️ Unblock</button>`;
    }

    const meta = [
      pct   ? `<span class="dec-conf">${pct}</span>` : '',
      a.ttp ? `<span class="dec-ttp">${a.ttp}</span>` : '',
    ].filter(Boolean).join('');

    const sectionClass = corrBtn ? 's-protect' : '';
    return `<div class="section-group ${sectionClass}" style="margin-top:5px">
      ${badge ? `<div style="margin-bottom:3px">${badge}</div>` : ''}
      <div class="dec-row ${hasDetail ? 'dec-clickable' : ''}"
        ${hasDetail ? `onclick="event.stopPropagation();showReasoning('${vm_name}',${realIdx})"` : ''}>
        <div class="dec-header">
          <span class="dec-action">${actionLabel(a.action)}</span>
          ${hasDetail ? `<span style="color:var(--blue);font-size:10px;margin-left:6px">▸ reasoning</span>` : ''}
        </div>
        ${meta ? `<div class="dec-meta">${meta}</div>` : ''}
      </div>
      ${corrBtn ? `<div style="margin-top:5px">${corrBtn}</div>` : ''}
    </div>`;
  }).join('');

  // Fallback: states with no matching dec-row (cache miss) — show badge + button standalone
  const fallbackRows = [];
  if (restoreInfo) fallbackRows.push(
    `<span class="badge restoring" style="font-size:9px">🔄 RESTORING · ${restoreInfo.elapsed_label}</span>`);
  if (isIsolated && !coveredByDec.has('isolate_vm')) {
    const s = states.find(s => s.type === 'isolated');
    fallbackRows.push(`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span class="badge isolated" style="font-size:9px;cursor:default">ISOLATED · ${age(s?.since)}</span>
      <button class="action danger" onclick="event.stopPropagation();confirmRelease('${vm_name}')" style="font-size:9px;padding:2px 7px">↩️ Release</button>
    </div>`);
  }
  if (isBlocked && !coveredByDec.has('block_suspicious_ip')) {
    states.filter(s => s.type === 'blocked').forEach(s => fallbackRows.push(
      `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="badge blocked" style="font-size:9px;cursor:default">BLOCKED ${s.ip} · ${age(s.since)}</span>
        <button class="action danger" onclick="event.stopPropagation();confirmUnblock('${vm_name}')" style="font-size:9px;padding:2px 7px">↩️ Unblock</button>
      </div>`));
  }
  if (isIsolated && isBlocked) fallbackRows.push(
    `<button class="action danger" onclick="event.stopPropagation();confirmReset('${vm_name}')" style="font-size:9px;padding:2px 7px">⟳ Reset</button>`);

  const isClean = !isIsolated && !isBlocked && !restoreInfo && !myEscs.length;

  const globalDefault = _state?.autonomy_default || 'human_only';
  const autonomyMode  = (_state?.autonomy_modes || {})[vm_name] || globalDefault;
  // The mode is ALWAYS shown (per-VM visibility). At the global default it's discreet
  // (neutral/dim); a per-asset override is highlighted in the posture colour — orange =
  // can act (non_disruptive), blue = observe (human_only) — so exceptions pop out.
  const modeDeviates = autonomyMode !== globalDefault;
  const modeIsAct    = autonomyMode === 'non_disruptive';
  const modeTxt      = `${modeIsAct ? '⚡' : '👁'} ${modeIsAct ? 'NON-DISRUPTIVE' : 'HUMAN-ONLY'}`;
  const _defLabel    = globalDefault === 'non_disruptive' ? 'non-disruptive' : 'human-only';
  const _modeBadgeBase = 'font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.5px;flex-shrink:0;cursor:pointer';
  const _modeClick = `onclick="event.stopPropagation();showCapabilityPopover(event,'${autonomyMode}')"`;
  const modeBadge = !modeDeviates
    ? `<span ${_modeClick} title="Autonomy mode — matches global default · click for capability" style="${_modeBadgeBase};background:transparent;color:var(--dim);border:1px solid var(--border)">${modeTxt}</span>`
    : modeIsAct
    ? `<span ${_modeClick} title="Override — acts autonomously (global default: ${_defLabel}) · click for capability" style="${_modeBadgeBase};background:color-mix(in srgb,var(--orange) 16%,transparent);color:var(--orange);border:1px solid color-mix(in srgb,var(--orange) 35%,transparent)">${modeTxt}</span>`
    : `<span ${_modeClick} title="Override — recommend only (global default: ${_defLabel}) · click for capability" style="${_modeBadgeBase};background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent)">${modeTxt}</span>`;

  const modeSelector = isExpanded
    ? `<div style="display:flex;align-items:center;gap:6px;margin-top:6px">
        <span style="font-size:9px;color:var(--dim);font-weight:600;letter-spacing:.5px">MODE</span>
        <select onchange="setAutonomyMode('${vm_name}',this.value)" onclick="event.stopPropagation()"
          style="font-size:9px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:2px 5px;border-radius:3px;cursor:pointer">
          <option value="human_only"${autonomyMode === 'human_only' ? ' selected' : ''}>human-only (recommend)</option>
          <option value="non_disruptive"${autonomyMode === 'non_disruptive' ? ' selected' : ''}>non-disruptive (execute)</option>
        </select>
      </div>`
    : '';

  // Backup section — from audit data (refreshed every 5 min or on user click)
  const backupCheck = (auditEntry?.checks || []).find(c => c.action === 'restore_from_backup');
  const backupMsg = backupCheck?.message || '';
  // Extract "latest Xh ago" from message like "Vault 'rsv-annatar': 5 point(s), latest 2h ago"
  const bMatch = backupMsg.match(/(\d+)\s*point[^,]*,\s*latest\s+(.+)/);
  const backupSummary = bMatch
    ? `<span style="color:var(--green)">${bMatch[1]} RP</span> <span style="color:var(--dim)">· last ${bMatch[2]}</span>`
    : backupCheck
      ? `<span style="color:var(--dim);font-size:9px">${backupMsg.slice(0, 48) || 'checking…'}</span>`
      : `<span style="color:var(--dim)">—</span>`;

  const activeJob = (_state?.active_jobs || []).find(
    j => j.resource_id === resource_id || j.resource_id?.split('/').pop() === vm_name);
  const snapshotInProgress = activeJob?.type === 'snapshot' && activeJob?.status === 'InProgress';
  const snapshotFailed     = activeJob?.type === 'snapshot' && activeJob?.status === 'Failed';
  // Escalade snapshot pending : bouton déjà dans la carte d'escalade — ne pas doubler dans BACKUP
  const hasSnapshotEsc = myEscs.some(e => e.action === 'snapshot' && e.escalation_type === 'low_confidence');
  const snapshotBtn = snapshotInProgress
    ? `<button class="action" disabled style="margin-left:auto;font-size:9px;padding:2px 7px;opacity:.5;cursor:default">⏳ Snapshot…</button>`
    : snapshotFailed
      ? `<button class="action" onclick="event.stopPropagation();doSnapshot('${vm_name}')" style="margin-left:auto;font-size:9px;padding:2px 7px;background:color-mix(in srgb,var(--red) 20%,transparent);color:var(--red);border-color:var(--red)" title="${activeJob?.error || 'Snapshot failed'}">✗ Retry</button>`
      : hasSnapshotEsc
        ? ''
        : `<button class="action" onclick="event.stopPropagation();doSnapshot('${vm_name}')" style="margin-left:auto;font-size:9px;padding:2px 7px">📸 Snapshot</button>`;

  // Readiness checks (NSG / Backup / Compute) — shown in any expanded card. During an
  // incident "can Glorfindel act on this VM?" matters more, not less → not gated on isClean.
  const readinessExpanded = auditEntry
    ? `<div style="display:flex;gap:14px;margin-top:6px;flex-wrap:wrap">
        ${ACTION_GROUPS.map(g => {
          const st = _worstStatus(auditEntry.checks, g.actions);
          const [ic, col] = st==='ok' ? ['✓','var(--green)'] : st==='warn' ? ['⚠','var(--orange)']
                          : st==='fail' ? ['✗','var(--red)'] : ['—','var(--dim)'];
          return `<span style="font-size:11px;color:${col};font-weight:600">${ic} ${g.label}</span>`;
        }).join('')}
      </div>` : '';

  const backupSection = `<div class="section-group s-recover" style="margin-top:5px">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="color:var(--green);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Backup</span>
      <button onclick="event.stopPropagation();refreshAuditVm('${vm_name}')"
        style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;padding:0 2px;line-height:1" title="Refresh backup info">↺</button>
      <span style="margin-left:2px">${backupSummary}</span>
      ${snapshotBtn}
    </div>
  </div>`;

  const expandedBody = `
    ${readinessExpanded}
    ${modeSelector}
    ${fallbackRows.length ? `<div style="display:flex;flex-direction:column;gap:5px;margin-top:6px">${fallbackRows.join('')}</div>` : ''}
    ${decisionHtml || ''}
    ${myEscs.length ? `<div class="vm-escalations" style="margin:8px 0 0;padding:8px 0 0;border-top:1px solid var(--border)">
      ${_groupEscs(myEscs).map(_renderEscGroup).join('')}
    </div>` : ''}
    ${myDetEscs.length ? `<div class="vm-escalations" style="margin:8px 0 0;padding:8px 0 0;border-top:1px solid var(--border)">
      ${_groupEscs(myDetEscs).map(_renderEscGroup).join('')}
    </div>` : ''}
    ${backupSection}`;

  // Compact clean: backup age + snapshot button (always visible without expanding)
  const backupCompact = bMatch
    ? `<span style="font-size:9px;color:var(--green)">${bMatch[1]} RP</span><span style="font-size:9px;color:var(--dim)"> · ${bMatch[2]}</span>`
    : `<span style="font-size:9px;color:var(--dim)">—</span>`;

  const compactSnapshotBtn = snapshotInProgress
    ? `<button class="action" disabled style="margin-left:auto;font-size:9px;padding:1px 6px;opacity:.5;cursor:default">⏳ Snapshot…</button>`
    : snapshotFailed
      ? `<button class="action" onclick="event.stopPropagation();doSnapshot('${vm_name}')" style="margin-left:auto;font-size:9px;padding:1px 6px;background:color-mix(in srgb,var(--red) 20%,transparent);color:var(--red);border-color:var(--red)" title="${activeJob?.error || 'Snapshot failed'}">✗ Retry</button>`
      : hasSnapshotEsc
        ? ''
        : `<button class="action" onclick="event.stopPropagation();doSnapshot('${vm_name}')" style="margin-left:auto;font-size:9px;padding:1px 6px">📸 Snapshot</button>`;

  const compactBody = isClean
    ? `<div style="margin-top:5px;display:flex;align-items:center;gap:6px">
        ${backupCompact}
        ${escBadge}
        ${compactSnapshotBtn}
      </div>`
    : `<div class="node-asset-states" style="margin-top:6px">${stateBadges}</div>`;

  return `<div class="node-asset ${stateClass} ${isExpanded ? 'expanded' : ''}"
    id="asset-${vm_name}"
    draggable="true"
    ondragstart="event.dataTransfer.setData('text/plain','${vm_name}');event.currentTarget.classList.add('dragging')"
    ondragend="event.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(e=>e.classList.remove('drag-over'))"
    ondragover="event.preventDefault();event.currentTarget.classList.add('drag-over')"
    ondragleave="event.currentTarget.classList.remove('drag-over')"
    ondrop="event.preventDefault();event.currentTarget.classList.remove('drag-over');dropOnSlot(${slotIdx},event.dataTransfer.getData('text/plain'))">
    <div class="node-asset-header" onclick="toggleAsset('${vm_name}')">
      ${dot}
      <span class="node-asset-name">${vm_name}</span>
      ${modeBadge}
      ${readiness && !isExpanded ? `<span style="color:var(--dim);font-size:9px">${readiness}</span>` : ''}
      <span style="color:var(--dim);font-size:9px;margin-left:6px">${isExpanded ? '▾' : '▸'}</span>
    </div>
    ${isExpanded ? expandedBody : compactBody}
  </div>`;
}

// ── Topology edge drawing ──────────────────────────────────────────────────────

function _drawTopologyEdges() {
  const svg   = document.getElementById('topo-svg');
  const graph = document.getElementById('topo-graph');
  if (!svg || !graph) return;
  const base = graph.getBoundingClientRect();

  function pt(el, side) {
    if (!el) return null;
    const r = el.getBoundingClientRect();
    const x = r.left - base.left + r.width / 2;
    return {
      x,
      top:    r.top    - base.top,
      bottom: r.bottom - base.top,
      left:   r.left   - base.left,
      right:  r.right  - base.left,
      width:  r.width,
    };
  }

  function bezier(x1, y1, x2, y2, color, dash = '', width = 2.5, opacity = 0.75) {
    const cy = (y1 + y2) / 2;
    return `<path d="M${x1|0},${y1|0} C${x1|0},${cy|0} ${x2|0},${cy|0} ${x2|0},${y2|0}"
      fill="none" stroke="${color}" stroke-width="${width}" opacity="${opacity}"
      stroke-linecap="round"
      ${dash ? `stroke-dasharray="${dash}"` : ''}/>`;
  }

  const rules           = _cfgData?.detection?.rules    || [];
  const detectBackends  = _cfgData?.monitoring_backends || [];
  const recoverBackends = (_cfgData?.assets || []).filter(a => a.type === 'azure_backup_vault');
  const { resources = [], escalations = [] } = _state;
  const isIsolated = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked  = resources.some(r => r.states?.some(s => s.type === 'blocked'));

  const agent = pt(document.getElementById('node-agent'));
  if (!agent) return;

  const lines = [`<defs>
    <filter id="glow-r"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-o"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`];

  // Agent → DETECT backends (always blue — identity color)
  detectBackends.forEach(b => {
    const nb = pt(document.getElementById(`nb-${b.name}`));
    if (!nb) return;
    lines.push(bezier(agent.x, agent.bottom, nb.x, nb.top, 'var(--blue)'));
  });

  // Agent → PROTECT (always orange — identity color, state shown in node)
  const nbNsg = pt(document.getElementById('module-protect'));
  if (nbNsg) {
    lines.push(bezier(agent.x, agent.bottom, nbNsg.x, nbNsg.top, 'var(--orange)'));
  }

  // Agent → RECOVER backends (always green — identity color, state shown in node)
  recoverBackends.forEach(b => {
    const nb = pt(document.getElementById(`nb-${b.name}`));
    if (!nb) return;
    lines.push(bezier(agent.x, agent.bottom, nb.x, nb.top, 'var(--green)'));
  });

  // Structural edges: modules → assets (always visible, dim)
  const discovered = _state?.discovered_assets || [];
  const assetEls = [...document.querySelectorAll('[id^="asset-"]')];

  assetEls.forEach(el => {
    const vmName  = el.id.replace('asset-', '');
    const asset   = pt(el);
    if (!asset) return;

    // DETECT → VM  (via the monitoring backend that discovered it)
    const disc = discovered.find(d => d.name === vmName);
    const detNb = disc
      ? pt(document.getElementById(`nb-${disc.monitoring_backend}`))
      : detectBackends.length ? pt(document.getElementById(`nb-${detectBackends[0].name}`)) : null;
    if (detNb) lines.push(bezier(detNb.x, detNb.bottom, asset.x, asset.top,
      'var(--blue)', '', 1.5, 0.3));

    // PROTECT → VM  (orange = module identity; opacity/dash show state)
    if (nbNsg) {
      const vmRes = resources.find(r => r.vm_name === vmName || r.resource_id.endsWith(vmName));
      const vmIso = vmRes?.states?.some(s => s.type === 'isolated');
      const vmBlk = vmRes?.states?.some(s => s.type === 'blocked');
      if (vmIso) {
        lines.push(bezier(nbNsg.x, nbNsg.bottom, asset.x, asset.top, 'var(--orange)', '', 2, 0.9));
      } else if (vmBlk) {
        lines.push(bezier(nbNsg.x, nbNsg.bottom, asset.x, asset.top, 'var(--orange)', '6,4', 2, 0.9));
      } else {
        lines.push(bezier(nbNsg.x, nbNsg.bottom, asset.x, asset.top, 'var(--orange)', '', 1.5, 0.2));
      }
    }

    // RECOVER → VM  (RSV covers all discovered assets)
    recoverBackends.forEach(b => {
      const nb = pt(document.getElementById(`nb-${b.name}`));
      if (nb) lines.push(bezier(nb.x, nb.bottom, asset.x, asset.top,
        'var(--green)', '', 1.5, 0.3));
    });
  });

  // Incident edges: modules → assets with active escalations (brighter, dashed)
  escalations.forEach(e => {
    const vm    = e.resource_id.split('/').pop();
    const asset = pt(document.getElementById(`asset-${vm}`));
    if (!asset) return;
    const color = e.action === 'restore_from_backup'          ? 'var(--cyan)'
                : e.action === 'isolate_vm'                   ? 'var(--red)'
                : e.action === 'block_suspicious_ip'          ? 'var(--orange)'
                : e.action === 'improve_detection'            ? 'var(--blue)'
                : e.escalation_type === 'verification_failed' ? 'var(--red)'
                : 'var(--purple)';
    const nb = e.action === 'restore_from_backup'
      ? pt(document.getElementById(`nb-${recoverBackends[0]?.name}`))
      : e.action === 'improve_detection'
      ? pt(document.getElementById(`nb-${detectBackends[0]?.name}`))
      : pt(document.getElementById('module-protect'));
    if (nb) lines.push(bezier(nb.x, nb.bottom, asset.x, asset.top, color, '', 2.5, 0.85));
  });

  svg.innerHTML = lines.join('\n');
}

async function doApproveRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/approve-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) toast(`✓ Rule '${d.rule_name}' added to detection_rules.yaml — restart watch to activate`);
    else toast('Error: ' + (d.error || 'unknown'), true);
    // Always ack the escalation — rule may already be approved via CLI
    await doAck(escId);
    refreshState();
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function doRejectRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/reject-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) toast(`✗ Rule '${d.rule_name}' rejected`);
    // Always ack the escalation — rule may already be rejected via CLI
    await doAck(escId);
    refreshState();
  } catch (e) { toast('Error: ' + e.message, true); }
}

// Preventive read-only guard: disable every button that triggers an Azure write,
// detected by its onclick handler. Ack / Cmd / Approve-rule stay active (local only).
const _WRITE_HANDLERS = [
  'doApproveAction', 'confirmRestore', 'doSnapshot',
  'confirmRelease', 'confirmUnblock', 'confirmReset',
];
function _applyReadOnlyGuards(root) {
  if (!_state?.read_only) return;
  (root || document).querySelectorAll('button').forEach(b => {
    const oc = b.getAttribute('onclick') || '';
    if (_WRITE_HANDLERS.some(h => oc.includes(h))) {
      b.disabled = true;
      b.title = 'Read-only credentials (observe-only) — write actions disabled';
    }
  });
}

// ── Feed ───────────────────────────────────────────────────────────────────────

// Dedup escalate feed entries with same action+vm within 5s — same underlying event
const _feedDedup = new Map(); // key → {el, count, ts}
const _FEED_DEDUP_MS = 5000;

function appendFeedEntry(entry) {
  const list = document.getElementById('feed-list');
  const el = document.createElement('div');
  el.className = 'feed-entry';

  const ts = fmtTime(entry.timestamp);

  if (entry.escalate) {
    const key = `${entry.action}|${entry.vm || ''}`;
    const now = Date.now();
    const hit = _feedDedup.get(key);
    if (hit && (now - hit.ts) < _FEED_DEDUP_MS) {
      hit.count++;
      hit.ts = now;
      const pctEl = hit.el.querySelector('.feed-pct');
      if (pctEl) {
        const pct = entry.confidence ? Math.round(entry.confidence * 100) + '%' : '';
        pctEl.textContent = pct ? `${pct} ×${hit.count}` : `×${hit.count}`;
      }
      return; // suppress duplicate row
    }
    _feedDedup.set(key, { el, count: 1, ts: now });
    // prune stale keys
    for (const [k, v] of _feedDedup) {
      if (now - v.ts > _FEED_DEDUP_MS * 4) _feedDedup.delete(k);
    }
  }

  if (entry.type === 'signal') {
    const cls = 'ev-' + entry.event;
    const icons = {
      attack_started: '▶',
      detection: '✓',
      detection_timeout: '⚠',
      recovery_complete: '↺',
      recovery_failed: '✗',
    };
    const icon = icons[entry.event] || '·';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${entry.event}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>`;
  } else {
    const icon = entry.escalate ? '🚨' : entry.verified ? '✓' : entry.verified === false ? '✗' : '⚡';
    const cls  = entry.escalate ? 'act-esc' : entry.verified ? 'act-ok' : entry.verified === false ? 'act-err' : 'act-run';
    const label = entry.escalate ? 'escalate → ' + entry.action : entry.action;
    const pct = entry.confidence ? Math.round(entry.confidence * 100) + '%' : '';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${label}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>
      <span class="feed-pct">${pct}</span>`;
  }

  list.appendChild(el);

  if (_autoScroll) {
    list.scrollTop = list.scrollHeight;
  }
}

document.getElementById('feed-list').addEventListener('scroll', function () {
  const el = this;
  _autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
});
