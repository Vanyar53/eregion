<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glorfindel — War Room</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg1:       #161b22;
    --bg2:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --dim:       #7d8590;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --orange:    #e3b341;
    --blue:      #58a6ff;
    --cyan:      #39d353;
    --purple:    #bc8cff;
    --font:      ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { color: var(--blue); font-weight: 700; font-size: 15px; letter-spacing: 2px; }
  .subtitle { color: var(--dim); font-size: 12px; }
  #live-dot { color: var(--green); font-size: 10px; animation: pulse 2s infinite; }
  #live-dot.disconnected { color: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .spacer { flex: 1; }

  #clock { color: var(--dim); font-size: 11px; }

  .scenario-row { display: flex; gap: 8px; align-items: center; }
  select, button {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }
  select:hover, button:hover { border-color: var(--blue); }
  button.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
  button.primary:hover { background: #388bfd; }
  button.danger  { background: #b62324; border-color: #f85149; color: #fff; }
  button.danger:hover  { background: #f85149; }
  button.action  { background: var(--bg2); border-color: var(--border); font-size: 11px; padding: 3px 8px; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Main layout ── */
  main {
    display: flex;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Feed column (LEFT, fixed width) ── */
  #feed-col {
    width: 390px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #feed-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  .feed-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    font-size: 11px;
    border-radius: 4px;
    transition: background .1s;
  }
  .feed-entry:hover { background: var(--bg1); padding-left: 4px; padding-right: 4px; }
  .feed-ts   { color: var(--dim); font-size: 10px; flex-shrink: 0; width: 100px; }
  .feed-event{ flex-shrink: 0; width: 160px; font-weight: 600; }
  .feed-meta { color: var(--dim); font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .feed-pct  { color: var(--dim); font-size: 10px; flex-shrink: 0; }

  .ev-attack_started    { color: var(--yellow); }
  .ev-detection         { color: var(--green); }
  .ev-detection_timeout { color: var(--orange); }
  .ev-recovery_complete { color: var(--cyan); }
  .ev-recovery_failed   { color: var(--red); }

  .act-ok  { color: var(--green); }
  .act-esc { color: var(--red); }
  .act-run { color: var(--blue); }
  .act-err { color: var(--red); }

  /* ── Incidents column (RIGHT, flex:1) ── */
  #incidents-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    padding: 10px 16px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .infra-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--dim);
    flex: 1;
  }
  .infra-sub {
    font-size: 10px;
    color: var(--dim);
    font-weight: 400;
    margin-left: auto;
  }
  .readiness-inline {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    font-size: 10px;
  }
  .readiness-inline span { color: var(--dim); }
  #incidents-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── Infrastructure Map ── */
  .infra-map {
    position: relative;
    display: grid;
    grid-template-areas:
      "network  monitoring"
      "compute  compute"
      "backup   backup";
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    align-items: start;
    align-content: start;
    gap: 10px;
    padding: 12px;
    flex: 1;
  }
  .infra-map.no-backup {
    grid-template-areas:
      "network  monitoring"
      "compute  compute";
  }
  .map-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .map-zone {
    position: relative;
    z-index: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg1);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .map-zone.zone-alert  { border-color: var(--red);    background: color-mix(in srgb, var(--red)    6%, var(--bg1)); }
  .map-zone.zone-warn   { border-color: var(--orange); background: color-mix(in srgb, var(--orange) 6%, var(--bg1)); }
  .map-zone.zone-ok     { border-color: var(--border); }
  .zone-network    { grid-area: network; }
  .zone-monitoring { grid-area: monitoring; }
  .zone-compute    { grid-area: compute; }
  .zone-backup     { grid-area: backup; }
  .zone-storage    { grid-area: storage; }
  .zone-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--dim);
    margin-bottom: 2px;
  }
  .map-node {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
  }
  .map-node-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .map-node-name { flex: 1; color: var(--text); }
  .map-node-body { color: var(--dim); font-size: 10px; line-height: 1.6; }
  .map-node-body .row { display: flex; align-items: baseline; gap: 6px; }
  .map-decision {
    margin-top: 6px;
    padding: 5px 8px;
    background: var(--bg1);
    border-radius: 4px;
    border-left: 2px solid var(--border);
    font-size: 10px;
    line-height: 1.5;
  }
  .map-decision .dec-row {
    display: flex; align-items: baseline; gap: 6px; padding: 1px 0;
  }
  .map-decision .dec-action { color: var(--cyan); font-weight: 700; }
  .map-decision .dec-conf   { color: var(--orange); }
  .map-decision .dec-ttp    { color: var(--dim); font-size: 9px; }
  .map-decision .dec-text   { color: var(--dim); font-size: 9px; display: block; padding-left: 2px; }
  .map-decision .dec-clickable { cursor: pointer; border-radius: 3px; padding: 2px 4px; margin: -2px -4px; }
  .map-decision .dec-clickable:hover { background: color-mix(in srgb, var(--blue) 10%, transparent); }
  .map-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* ── VM Card ── */
  .vm-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .vm-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .vm-dot { font-size: 10px; }
  .vm-name { font-weight: 700; font-size: 13px; flex: 1; }
  .vm-age  { font-size: 10px; color: var(--dim); }

  .vm-card-body { padding: 10px 14px; }

  .state-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: .5px;
  }
  .badge.isolated  { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .badge.blocked   { background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .badge.restoring { background: #0d2035; color: var(--blue); border: 1px solid #1a4060;
                     animation: pulse 2s infinite; }
  .restore-progress { background: #0a1a2a; border-radius: 4px; padding: 4px 6px; }
  .state-detail    { color: var(--dim); font-size: 11px; }

  /* ── Escalation items ── */
  .vm-escalations {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .esc-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .esc-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .esc-action-label { font-weight: 700; font-size: 12px; color: var(--orange); flex: 1; }
  .esc-context { color: var(--dim); font-size: 10px; margin-bottom: 4px; }
  .esc-reason  { color: var(--dim); font-size: 11px; line-height: 1.5; margin-bottom: 4px; }
  .esc-steps { margin-top: 6px; border-left: 2px solid var(--border); padding-left: 8px; display: flex; flex-direction: column; gap: 3px; }
  .esc-step  { color: var(--dim); font-size: 10px; line-height: 1.5; }
  .esc-query { background: var(--bg2); border-left: 2px solid var(--cyan); padding: 8px;
               font-size: 10px; color: var(--blue); white-space: pre-wrap; overflow-x: auto;
               margin: 6px 0; border-radius: 0 4px 4px 0; }

  .vm-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
  }
  .empty-state .check { font-size: 24px; color: var(--green); margin-bottom: 8px; }

  /* ── Config panel ── */
  #config-panel { font-size: 12px; }
  .cfg-section { margin-bottom: 4px; }
  .cfg-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .cfg-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 4px 0; border-bottom: 1px solid var(--bg2);
  }
  .cfg-key   { color: var(--dim); font-size: 11px; flex-shrink: 0; width: 130px; }
  .cfg-val   { color: var(--text); font-size: 11px; word-break: break-all; }
  .cfg-badge {
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 4px; flex-shrink: 0;
  }
  .cfg-badge.ok  { background: #1a3a1a; color: var(--green); border: 1px solid #2d5a2d; }
  .cfg-badge.warn{ background: #3d2e00; color: var(--orange); border: 1px solid #6d5200; }
  .cfg-badge.err { background: #3d1a1a; color: var(--red); border: 1px solid #6d2c2c; }
  .cfg-badge.dim { background: var(--bg2); color: var(--dim); border: 1px solid var(--border); }
  .rule-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; border-radius: 6px; cursor: pointer;
    border-bottom: 1px solid var(--bg2);
  }
  .rule-item:hover { background: var(--bg2); }
  .rule-dot { font-size: 9px; flex-shrink: 0; }
  .rule-dot.ok   { color: var(--green); }
  .rule-dot.err  { color: var(--red); }
  .rule-dot.dim  { color: var(--dim); }
  .rule-name { font-size: 11px; flex: 1; }
  .rule-meta { font-size: 10px; color: var(--dim); display: flex; gap: 6px; flex-shrink: 0; }
  .cfg-backend-header {
    font-size: 10px; font-weight: 600; color: var(--blue);
    margin: 8px 0 4px; letter-spacing: 0.5px;
  }
  .modal.wide { max-width: 680px; min-width: 500px; }
  .modal-query {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; font-family: var(--font); font-size: 11px; color: var(--cyan);
    white-space: pre; overflow-x: auto; margin-bottom: 16px; line-height: 1.5;
    max-height: 220px; overflow-y: auto;
  }

  .ttp-table { width: 100%; border-collapse: collapse; }
  .ttp-table th { padding: 4px 8px; font-size: 10px; color: var(--dim); text-align: left; border-bottom: 1px solid var(--border); }
  .ttp-table td { padding: 5px 8px; font-size: 11px; border-bottom: 1px solid var(--bg2); }
  .ttp-table td:first-child { color: var(--blue); font-weight: 600; }
  .ttp-table td:last-child { text-align: right; }

  button#config-toggle.active { border-color: var(--blue); color: var(--blue); }

  /* ── Topology Graph ── */
  .topo-graph {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 20px 20px 16px;
    flex: 1;
    overflow-y: auto;
    gap: 0;
  }
  .topo-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .topo-layer {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }
  .topo-spacer { height: 52px; flex-shrink: 0; }

  /* Agent node */
  .node-agent {
    background: var(--bg1);
    border: 2px solid var(--blue);
    border-radius: 10px;
    padding: 12px 20px;
    min-width: 240px;
    max-width: 420px;
    cursor: pointer;
    transition: box-shadow .2s;
    position: relative;
    z-index: 1;
  }
  .node-agent:hover { box-shadow: 0 0 20px color-mix(in srgb, var(--blue) 15%, transparent); }
  .node-agent-header { display: flex; align-items: center; gap: 8px; }
  .node-agent-title { color: var(--blue); font-weight: 700; font-size: 14px; letter-spacing: 2px; flex: 1; }
  .node-agent-stats { display: flex; gap: 14px; margin-top: 6px; font-size: 10px; color: var(--dim); }
  .agent-rules-panel {
    display: none;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    flex-direction: column;
    gap: 2px;
    max-height: 220px;
    overflow-y: auto;
  }
  .agent-rules-panel.open { display: flex; }

  /* Module sections */
  .topo-modules {
    display: flex;
    gap: 0;
    position: relative;
    z-index: 1;
    align-items: flex-start;
  }
  .topo-module {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
  }
  .topo-module + .topo-module { border-left: 1px solid var(--border); }
  .topo-module-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--dim);
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    white-space: nowrap;
    align-self: stretch;
    text-align: center;
  }
  .topo-module-label.detect  { border-color: var(--blue);   color: var(--blue); }
  .topo-module-label.protect { border-color: var(--orange); color: var(--orange); }
  .topo-module-label.recover { border-color: var(--green);  color: var(--green); }
  .topo-module-nodes { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

  /* Backend nodes */
  .node-backend {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    min-width: 140px;
    max-width: 200px;
    font-size: 11px;
    position: relative;
  }
  .node-backend.detect  { border: 1px solid var(--blue); }
  .node-backend.protect { border: 1px solid var(--orange); }
  .node-backend.recover { border: 1px solid var(--green); }
  .node-backend-name { font-weight: 700; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
  .node-backend-type { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .node-backend-row  { display: flex; align-items: center; gap: 4px; color: var(--dim); font-size: 10px; margin-top: 2px; }

  /* Asset layer */
  .topo-assets {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-start;
    position: relative;
    z-index: 1;
    padding: 4px 0;
  }
  .node-asset {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    min-width: 200px;
    flex: 0 1 340px;
    transition: border-color .15s, background .15s;
    cursor: pointer;
    position: relative;
  }
  .node-asset.s-isolated  { border-color: var(--red);    background: color-mix(in srgb, var(--red)    5%, var(--bg1)); }
  .node-asset.s-blocked   { border-color: var(--orange); background: color-mix(in srgb, var(--orange) 5%, var(--bg1)); }
  .node-asset.s-both      { border-color: var(--red);    background: color-mix(in srgb, var(--red)    6%, var(--bg1)); }
  .node-asset.s-restoring { border-color: var(--blue);   background: color-mix(in srgb, var(--blue)   5%, var(--bg1)); animation: pulse 2s infinite; }
  .node-asset.s-incident  { border: 2px solid var(--purple); background: color-mix(in srgb, var(--purple) 6%, var(--bg1)); box-shadow: 0 0 8px color-mix(in srgb, var(--purple) 20%, transparent); }
  .node-asset.expanded    { cursor: default; }
  .node-asset:not(.expanded):hover { box-shadow: 0 0 0 1px var(--dim); }
  .node-asset-header { display: flex; align-items: center; gap: 6px; }
  .node-asset-name   { font-weight: 700; font-size: 12px; flex: 1; }
  .node-asset-states { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .node-asset-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 100;
    max-width: 320px;
  }
  #toast.show { opacity: 1; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    min-width: 360px;
    max-width: 520px;
  }
  .modal-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .modal-body  { color: var(--dim); font-size: 12px; line-height: 1.6; margin-bottom: 16px; }
  .modal-cmd   { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
                 padding: 8px 12px; font-family: var(--font); font-size: 11px; color: var(--cyan);
                 white-space: pre-wrap; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--dim);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <span class="logo">GLORFINDEL</span>
  <span class="subtitle">War Room</span>
  <span id="watch-dot" style="font-size:10px;color:var(--dim)">●</span>
  <span id="watch-label" style="color:var(--dim);font-size:11px">watch…</span>
  <span style="color:var(--border);margin:0 4px">│</span>
  <span id="live-dot">●</span>
  <span id="live-label" style="color:var(--dim);font-size:11px">connecting…</span>

  <div class="spacer"></div>

  <div class="scenario-row">
    <select id="scenario-select"><option value="">Run scenario…</option></select>
    <button class="primary" id="run-btn" disabled>▶ Run</button>
  </div>

  <button id="config-toggle" class="action" onclick="toggleConfig()" title="Azure configuration">⚙ Config</button>
  <span id="clock" style="min-width:70px;text-align:right"></span>
</header>

<main>
  <!-- Feed LEFT -->
  <div id="feed-col">
    <div class="col-header">LIVE FEED</div>
    <div id="feed-list"></div>
  </div>

  <!-- Infrastructure / Config RIGHT -->
  <div id="incidents-col">
    <div class="col-header" id="right-col-header">INFRASTRUCTURE</div>
    <div id="incidents-list">
      <div class="empty-state">
        <div class="check">✓</div>
        <div>All clear — no active incidents</div>
        <div style="margin-top:6px;font-size:11px">Run a scenario to start</div>
      </div>
    </div>
    <div id="config-panel" style="display:none;flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:16px;"></div>
  </div>
</main>

<div id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-cmd"   id="modal-cmd" style="display:none"></div>
    <div class="modal-actions">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-confirm" class="primary"></button>
    </div>
  </div>
</div>

<script>
// ── Label maps (mirrors escalations.py) ────────────────────────────────────────

const ACTION_LABELS = {
  isolate_vm:           'VM isolée du réseau',
  release_isolation:    'Isolation levée',
  snapshot:             'Snapshot forensique créé',
  block_suspicious_ip:  'IP suspecte bloquée',
  revoke_temp_access:   'Accès temporaire révoqué',
  restore_from_backup:  'Restauration depuis backup',
  delete_resource:      'Ressource supprimée',
  wipe_storage:         'Stockage effacé',
  modify_network_rule:  'Règle réseau modifiée',
  escalate_permissions: 'Permissions élevées',
};

const ESC_LABELS = {
  low_confidence:      'detection timeout',
  destructive_action:  'action destructive',
  proposed_action:     'action inconnue',
  verification_failed: 'vérification échouée',
  proposed_rule:       'règle proposée',
  ttl_exceeded:        'TTL expiré',
};

function actionLabel(action) {
  return ACTION_LABELS[action] || action;
}

function escLabel(type) {
  return ESC_LABELS[type] || type;
}

function cliCommand(esc) {
  const rid = esc.resource_id;
  const id  = esc.id.slice(0, 8);
  if (esc.action === 'restore_from_backup') {
    return `glorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'verification_failed') {
    return `glorfindel revert ${rid} --yes\nglorfindel ack ${id}`;
  }
  if (esc.escalation_type === 'low_confidence') {
    return `# Vérifier le snapshot, puis si nécessaire :\nglorfindel restore ${rid} --yes\nglorfindel ack ${id}`;
  }
  return `glorfindel ack ${id}`;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function age(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm ago';
}

function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toISOString().slice(11, 19) + ' UTC';
}

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.querySelector('.modal').classList.remove('wide');
}

function openModal(title, body, cmd, confirmLabel, confirmClass, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const cmdEl = document.getElementById('modal-cmd');
  if (cmd) { cmdEl.textContent = cmd; cmdEl.style.display = ''; }
  else cmdEl.style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = confirmLabel;
  btn.className = confirmClass;
  btn.onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modal').classList.add('open');
}

function showReasoning(vmName, idx) {
  const cached = _actionsCache[vmName];
  if (!cached) return;
  const a = cached.actions[idx];
  if (!a) return;

  const pct  = a.confidence ? ` · ${Math.round(a.confidence * 100)}%` : '';
  const title = `${actionLabel(a.action)}${pct} — ${a.ttp || ''} — ${a.timestamp ? new Date(a.timestamp).toISOString().slice(11,19) + ' UTC' : ''}`;
  const text  = a.full_reasoning || a.reasoning || '(no reasoning available)';

  document.getElementById('modal-title').textContent = title;
  // Render reasoning with step headers highlighted
  const formatted = text
    .replace(/^(Étape\s+\d+\s*[–\-:].*)/gim, '\n$1\n')
    .replace(/^(Step\s+\d+\s*[–\-:].*)/gim, '\n$1\n')
    .trim();
  const bodyEl = document.getElementById('modal-body');
  bodyEl.textContent = formatted;

  const cmdEl = document.getElementById('modal-cmd');
  cmdEl.style.display = 'none';

  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = closeModal;

  document.getElementById('modal').classList.add('open');
}

function openCommandModal(escId) {
  const esc = _escById[escId];
  if (!esc) return;
  const cmd = cliCommand(esc);
  const label = actionLabel(esc.action);
  document.getElementById('modal-title').textContent = '📋 ' + label;
  document.getElementById('modal-body').textContent = 'Commande CLI à exécuter pour cette escalade :';
  const cmdEl = document.getElementById('modal-cmd');
  cmdEl.textContent = cmd;
  cmdEl.style.display = '';
  document.getElementById('modal-cancel').style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = () => {
    closeModal();
    document.getElementById('modal-cancel').style.display = '';
  };
  document.getElementById('modal').classList.add('open');
}

// ── State ──────────────────────────────────────────────────────────────────────

let _state      = { resources: [], escalations: [] };
let _escById    = {};
let _cfgData    = null;
let _auditData     = null;   // null=never loaded, {audits:[]} = loaded (possibly empty)
let _auditLoading  = false;
let _auditLastRun  = null;   // ISO timestamp of last successful fetch
let _actionsCache = {};   // vm_name → {actions, fetchedAt}
let _autoScroll = true;

// ── Clock ──────────────────────────────────────────────────────────────────────

setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toISOString().slice(11, 19) + ' UTC';
}, 1000);

// ── Scenarios ──────────────────────────────────────────────────────────────────

async function loadScenarios() {
  try {
    const r = await fetch('/api/scenarios');
    const data = await r.json();
    const sel = document.getElementById('scenario-select');
    data.scenarios.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      document.getElementById('run-btn').disabled = !sel.value;
    });
  } catch (e) {}
}

document.getElementById('run-btn').addEventListener('click', () => {
  const name = document.getElementById('scenario-select').value;
  if (!name) return;
  openModal(
    'Run scenario',
    `This will launch annatar run scenarios/azure/${name}.yaml on the live Azure infrastructure.`,
    `annatar run scenarios/azure/${name}.yaml`,
    '▶ Run',
    'primary',
    () => runScenario(name),
  );
});

async function runScenario(name) {
  toast('⚡ Starting ' + name + '…');
  try {
    await fetch(`/api/run/${name}`, { method: 'POST' });
  } catch (e) {
    toast('✗ Failed to start scenario: ' + e.message);
  }
}

// ── Infrastructure cards ───────────────────────────────────────────────────────

function _renderEscItem(e) {
  const label = actionLabel(e.action);
  const ctx   = [e.ttp, e.severity, escLabel(e.escalation_type)].filter(Boolean).join(' · ');
  const steps = (e.suggested_steps || []).slice(0, 3);
  const stepsHtml = steps.length
    ? `<div class="esc-steps">${steps.map(s => `<div class="esc-step">• ${s}</div>`).join('')}</div>` : '';
  const escId = e.id;
  const isRule = e.action === 'improve_detection' && e.proposal_id;
  const queryHtml = isRule && e.proposed_query
    ? `<pre class="esc-query">${e.proposed_query.trim()}</pre>` : '';
  const ruleButtons = isRule ? `
    <button class="action ok" onclick="doApproveRule('${e.proposal_id}','${escId}')" style="flex-shrink:0">✓ Approve</button>
    <button class="action" onclick="doRejectRule('${e.proposal_id}','${escId}')" style="flex-shrink:0;color:var(--red)">✗ Reject</button>` : '';
  return `<div class="esc-item">
    <div class="esc-item-header">
      <span class="esc-action-label">🚨 ${label}</span>
      <button class="action" onclick="confirmAck('${escId}')" style="flex-shrink:0">✓ Ack</button>
      <button class="action" onclick="openCommandModal('${escId}')" style="flex-shrink:0">📋 Cmd</button>
      ${ruleButtons}
    </div>
    ${ctx ? `<div class="esc-context">${ctx}</div>` : ''}
    <div class="esc-reason">${e.reason}</div>
    ${queryHtml}${stepsHtml}
  </div>`;
}

function _escFooter(escs) {
  if (!escs.length) return '';
  return `<div class="vm-escalations" style="margin:0;padding:8px 14px;border-top:1px solid var(--border)">
    ${escs.map(_renderEscItem).join('')}
  </div>`;
}

// ── Topology rendering ─────────────────────────────────────────────────────────

let _expandedVms      = new Set();
let _expandedBackends = new Set();
let _rulesCache       = [];   // flat array, index used in onclick to avoid JSON.stringify in HTML

function toggleBackend(name) {
  if (_expandedBackends.has(name)) _expandedBackends.delete(name);
  else _expandedBackends.add(name);
  renderInfra();
}

function toggleAsset(vmName) {
  if (_expandedVms.has(vmName)) _expandedVms.delete(vmName);
  else _expandedVms.add(vmName);
  renderInfra();
}

function _dot(color) {
  return `<span style="color:${color};font-size:10px">●</span>`;
}

function _networkZone(resources, escalations) {
  const isIsolated = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked  = resources.some(r => r.states?.some(s => s.type === 'blocked'));
  const status = isIsolated ? 'alert' : isBlocked ? 'warn' : 'ok';
  const dot = isIsolated ? _dot('var(--red)') : isBlocked ? _dot('var(--orange)') : _dot('var(--green)');

  const blockRows = resources.flatMap(r =>
    (r.states || []).filter(s => s.type === 'blocked').map(s =>
      `<div class="row"><span class="badge blocked" style="font-size:9px">BLOCKED</span>
       <span>${s.ip}</span><span style="color:var(--dim)">${age(s.since)}</span></div>`
    )
  ).join('');

  const isolRows = resources.filter(r => r.states?.some(s => s.type === 'isolated')).map(r =>
    `<div class="row"><span class="badge isolated" style="font-size:9px">DENY-ALL</span>
     <span style="color:var(--dim)">${r.vm_name}</span></div>`
  ).join('');

  return `<div class="map-zone zone-network ${_zoneClass(status)}" id="zone-network">
    <div class="zone-label">NETWORK</div>
    <div class="map-node">
      <div class="map-node-header">${dot}<span class="map-node-name">nsg-annatar</span></div>
      <div class="map-node-body">
        ${blockRows || isolRows
          ? blockRows + isolRows
          : `<span style="color:var(--green)">✓ No active rules</span>`}
      </div>
    </div>
  </div>`;
}

function _monitoringZone(rules, backends, discoveredAssets, postureGaps) {
  const hasErr  = rules.some(r => r.last_error);
  const allPoll = rules.length > 0 && rules.every(r => r.last_poll && !r.last_error);
  const zoneStatus = hasErr ? 'alert' : 'ok';

  const discByBackend = {};
  (discoveredAssets || []).forEach(a => {
    (discByBackend[a.monitoring_backend] = discByBackend[a.monitoring_backend] || []).push(a);
  });
  const gapsByVm = {};
  (postureGaps || []).forEach(g => {
    (gapsByVm[g.vm_name] = gapsByVm[g.vm_name] || []).push(g);
  });

  const nodes = (backends || []).map(b => {
    const bRules = rules.filter(r => r.monitoring_backend_name === b.name);
    const bDisc  = discByBackend[b.name] || [];
    const bErr   = bRules.some(r => r.last_error);
    const bPoll  = bRules.length > 0 && bRules.every(r => r.last_poll && !r.last_error);
    const dot    = bErr ? _dot('var(--red)') : bPoll ? _dot('var(--green)') : _dot('var(--dim)');

    const discRows = bDisc.map(a => {
      const vmGaps = gapsByVm[a.name] || [];
      const gapRows = vmGaps.map(g => {
        const col = g.severity === 'critical' ? 'var(--red)' : 'var(--orange)';
        const icon = g.severity === 'critical' ? '✗' : '⚠';
        return `<div class="row" style="padding-left:16px">
          <span style="color:${col};font-size:9px">${icon}</span>
          <span style="color:${col};font-size:10px">${g.check}</span>
          <span style="color:var(--dim);font-size:9px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                title="${g.message}">${g.message}</span>
        </div>`;
      }).join('');
      return `<div class="row">
        <span style="color:${vmGaps.length ? (vmGaps.some(g=>g.severity==='critical') ? 'var(--red)' : 'var(--orange)') : 'var(--green)'};font-size:9px">●</span>
        <span style="font-size:11px">${a.name}</span>
        <span style="color:var(--dim);font-size:9px;margin-left:auto">${_relTime(a.last_seen)}</span>
      </div>${gapRows}`;
    }).join('') || `<div class="row"><span style="color:var(--dim);font-size:10px">No assets — discovery pending</span></div>`;

    const ruleRows = bRules.map(r => {
      const dotCls = r.last_error ? 'var(--red)' : r.last_poll ? 'var(--green)' : 'var(--dim)';
      const match  = r.last_match ? `<span style="color:var(--orange);font-size:9px">${_relTime(r.last_match)}</span>` : '';
      return `<div class="row rule-item" style="padding:3px 4px;border-radius:4px;cursor:pointer"
          onclick='showRuleDetail(${JSON.stringify(r)})'>
        <span style="color:${dotCls};font-size:9px">●</span>
        <span style="font-size:11px;flex:1">${r.name}</span>
        ${r.ttp ? `<span class="cfg-badge dim" style="font-size:9px">${r.ttp}</span>` : ''}
        ${match}
        <span style="color:var(--dim);font-size:9px">▸</span>
      </div>`;
    }).join('') || `<div class="row"><span style="color:var(--dim);font-size:10px">No rules for this backend</span></div>`;

    return `<div class="map-node" style="margin-bottom:8px">
      <div class="map-node-header">${dot}
        <span class="map-node-name">${b.name}</span>
        <span style="font-size:9px;color:var(--dim)">${b.type}</span>
      </div>
      <div class="map-node-body">
        <div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Assets</div>
        ${discRows}
        <div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px">Rules</div>
        ${ruleRows}
      </div>
    </div>`;
  }).join('');

  const emptyNode = backends && backends.length === 0
    ? `<div class="map-node"><div class="map-node-body">
        <span style="color:var(--dim)">No monitoring backends — add to glorfindel-config.yaml</span>
      </div></div>`
    : '';

  return `<div class="map-zone zone-monitoring ${_zoneClass(zoneStatus)}" id="zone-monitoring">
    <div class="zone-label">MONITORING</div>
    ${nodes || emptyNode}
  </div>`;
}

function _computeZone(resourceMap, vmEscs, restoreByVm) {
  const anyAlert = [...resourceMap.values()].some(r =>
    r.states?.some(s => s.type === 'isolated')
  );
  const anyWarn = [...resourceMap.values()].some(r =>
    r.states?.some(s => s.type === 'blocked') || r.states?.length > 0
  );
  const status = anyAlert ? 'alert' : anyWarn ? 'warn' : 'ok';

  const nodes = [...resourceMap.values()].map(resource => {
    const { resource_id, vm_name, states = [] } = resource;
    const isIsolated  = states.some(s => s.type === 'isolated');
    const isBlocked   = states.some(s => s.type === 'blocked');
    const myEscs      = vmEscs.filter(e =>
      e.resource_id === resource_id || e.resource_id.split('/').pop() === vm_name);
    const restoreInfo = restoreByVm[vm_name];
    const cached      = _actionsCache[vm_name];

    const dot = restoreInfo   ? _dot('var(--blue)')
              : isIsolated    ? _dot('var(--red)')
              : isBlocked     ? _dot('var(--orange)')
              : myEscs.length ? _dot('var(--orange)')
              :                 _dot('var(--green)');

    const stateRows = [
      restoreInfo ? `<div class="row"><span class="badge restoring" style="font-size:9px">🔄 RESTORING</span>
        <span style="color:var(--dim)">${restoreInfo.elapsed_label}</span></div>` : '',
      ...states.map(s => s.type === 'isolated'
        ? `<div class="row"><span class="badge isolated" style="font-size:9px">ISOLATED</span>
           <span style="color:var(--dim)">${age(s.since)}</span></div>`
        : `<div class="row"><span class="badge blocked" style="font-size:9px">BLOCKED</span>
           <span>${s.ip}</span><span style="color:var(--dim)">${age(s.since)}</span></div>`)
    ].join('');

    const auditEntry = (_auditData?.audits || []).find(a => a.resource_id === resource_id);
    const readiness  = auditEntry
      ? ACTION_GROUPS.map(g => {
          const st = _worstStatus(auditEntry.checks, g.actions);
          const [ic, col] = st === 'ok' ? ['✓','var(--green)'] : st === 'warn' ? ['⚠','var(--orange)']
                          : st === 'fail' ? ['✗','var(--red)'] : ['—','var(--dim)'];
          return `<span><span style="color:${col}">${ic}</span> ${g.label}</span>`;
        }).join('  ')
      : '';

    // Last LLM decisions (conclusion pre-extracted server-side, full reasoning on click)
    const reasonHtml = (cached?.actions || []).slice(0, 2).map((a, idx) => {
      const pct = a.confidence ? Math.round(a.confidence * 100) + '%' : '';
      const hasDetail = !!a.full_reasoning;
      return `<div class="dec-row ${hasDetail ? 'dec-clickable' : ''}"
        ${hasDetail ? `onclick="showReasoning('${vm_name}',${idx})" title="Click to see full reasoning"` : ''}>
        <span class="dec-action">${actionLabel(a.action)}</span>
        ${pct ? `<span class="dec-conf">${pct}</span>` : ''}
        ${a.ttp ? `<span class="dec-ttp">${a.ttp}</span>` : ''}
        ${hasDetail ? `<span style="color:var(--blue);font-size:10px;margin-left:auto">▸ reasoning</span>` : ''}
      </div>`;
    }).join('');

    const actions = [];
    if (isIsolated) actions.push(`<button class="action danger" onclick="confirmRelease('${vm_name}')">↩️ Release</button>`);
    if (isBlocked)  actions.push(`<button class="action danger" onclick="confirmUnblock('${vm_name}')">↩️ Unblock</button>`);
    if (isIsolated && isBlocked) actions.push(`<button class="action danger" onclick="confirmReset('${vm_name}')">⟳ Reset</button>`);
    if (!restoreInfo && myEscs.some(e => e.action === 'restore_from_backup'))
      actions.push(`<button class="action primary" onclick="confirmRestore('${vm_name}')">🔄 Restore</button>`);

    const clean = !isIsolated && !isBlocked && !restoreInfo && !myEscs.length;

    return `<div class="map-node">
      <div class="map-node-header">${dot}
        <span class="map-node-name">${vm_name}</span>
        ${readiness ? `<span style="font-size:9px;color:var(--dim);margin-left:auto">${readiness}</span>` : ''}
      </div>
      <div class="map-node-body">
        ${clean ? `<span style="color:var(--green)">✓ No active incidents</span>` : stateRows}
        ${reasonHtml ? `<div class="map-decision">${reasonHtml}</div>` : ''}
        ${actions.length ? `<div class="map-actions">${actions.join('')}</div>` : ''}
      </div>
      ${_escFooter(myEscs)}
    </div>`;
  }).join('');

  return `<div class="map-zone zone-compute ${_zoneClass(status)}" id="zone-compute">
    <div class="zone-label">COMPUTE</div>
    ${nodes || `<div class="map-node"><div class="map-node-body" style="color:var(--dim)">No resources configured</div></div>`}
  </div>`;
}

function _backupZone(rsvEscs, restores) {
  const allAudits    = _auditData?.audits || [];
  // Vault name: from RSV asset config, then audit data, then fallback
  const rsvAsset     = (_cfgData?.assets || []).find(a => a.type === 'azure_backup_vault');
  const vault        = rsvAsset?.vault_name || allAudits[0]?.vault || 'rsv-annatar';
  const backupChecks = allAudits.flatMap(a => (a.checks||[]).filter(c => c.action === 'restore_from_backup'));
  const worst = backupChecks.some(c => c.status === 'fail') ? 'fail'
              : backupChecks.some(c => c.status === 'warn') ? 'warn'
              : backupChecks.length ? 'ok' : 'unknown';
  const dot = worst === 'ok'   ? _dot('var(--green)')
            : worst === 'warn' ? _dot('var(--orange)')
            : worst === 'fail' ? _dot('var(--red)')
            :                    _dot('var(--dim)');
  const status = worst === 'fail' ? 'alert' : worst === 'warn' ? 'warn' : 'ok';

  const restoreRows = restores.map(r =>
    `<div class="row"><span class="badge restoring" style="font-size:9px">🔄 RESTORING</span>
     <span style="color:var(--dim)">${r.vm_name} · ${r.elapsed_label}</span></div>`).join('');

  const backupRows = backupChecks.length
    ? backupChecks.map(c => {
        const col  = c.status === 'ok' ? 'var(--green)' : c.status === 'warn' ? 'var(--orange)' : 'var(--red)';
        const icon = c.status === 'ok' ? '✓' : c.status === 'warn' ? '⚠' : '✗';
        return `<div class="row"><span style="color:${col}">${icon}</span>
          <span style="color:var(--dim)">${c.message}</span></div>`;
      }).join('')
    : `<div style="color:var(--dim)">Loading…</div>`;

  const rsvEscHtml = rsvEscs.length ? `<div class="vm-escalations" style="margin:0;padding:6px 10px;border-top:1px solid var(--border)">
    ${rsvEscs.map(e => {
      const vm = e.resource_id.split('/').pop();
      const restoring = restores.some(r => r.vm_name === vm);
      const ctx = [e.ttp, e.severity].filter(Boolean).join(' · ');
      return `<div class="esc-item"><div class="esc-item-header">
        <span class="esc-action-label">🚨 restore_from_backup</span>
        <button class="action" onclick="confirmAck('${e.id}')" style="flex-shrink:0">✓ Ack</button>
        <button class="action" onclick="openCommandModal('${e.id}')" style="flex-shrink:0">📋</button>
        ${!restoring ? `<button class="action primary" onclick="confirmRestore('${vm}')" style="flex-shrink:0">🔄 Restore</button>` : ''}
      </div>
      ${ctx ? `<div class="esc-context">${ctx}</div>` : ''}
      <div class="esc-reason">${e.reason}</div>
      </div>`;
    }).join('')}</div>` : '';

  return `<div class="map-zone zone-backup ${_zoneClass(status)}" id="zone-backup">
    <div class="zone-label">BACKUP</div>
    <div class="map-node">
      <div class="map-node-header">${dot}<span class="map-node-name">${vault}</span></div>
      <div class="map-node-body">${restoreRows}${backupRows}</div>
    </div>
    ${rsvEscHtml}
  </div>`;
}


function _drawConnections() {  // kept for safety, no longer called
  const svg = document.getElementById('map-svg');
  if (!svg) return;
  const map = document.getElementById('infra-map');
  if (!map) return;
  const mapRect = map.getBoundingClientRect();

  function bbox(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      cx: r.left - mapRect.left + r.width / 2,
      cy: r.top - mapRect.top + r.height / 2,
      top: r.top - mapRect.top,
      bottom: r.bottom - mapRect.top,
      left: r.left - mapRect.left,
      right: r.right - mapRect.left,
    };
  }

  const net = bbox('zone-network');
  const mon = bbox('zone-monitoring');
  const cmp = bbox('zone-compute');
  const bkp = bbox('zone-backup');
  if (!net || !cmp) return;

  const { resources = [] } = _state;
  const isIsolated = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked  = resources.some(r => r.states?.some(s => s.type === 'blocked'));
  const hasDetErr  = (_cfgData?.detection?.rules || []).some(r => r.last_error);

  const netColor = isIsolated ? '#e74c3c' : isBlocked ? '#f39c12' : '#556';
  const monColor = hasDetErr  ? '#e74c3c' : '#2ecc71';
  const bkpColor = '#556';

  const defs = `<defs>
    <marker id="a-r" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#e74c3c"/></marker>
    <marker id="a-o" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#f39c12"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#2ecc71"/></marker>
    <marker id="a-d" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#556"/></marker>
  </defs>`;

  function mId(c) {
    return c === '#e74c3c' ? 'a-r' : c === '#f39c12' ? 'a-o' : c === '#2ecc71' ? 'a-g' : 'a-d';
  }

  function seg(x1, y1, x2, y2, color, dash = '') {
    return `<line x1="${x1|0}" y1="${y1|0}" x2="${x2|0}" y2="${y2|0}"
      stroke="${color}" stroke-width="2"
      ${dash ? `stroke-dasharray="${dash}"` : ''}
      marker-end="url(#${mId(color)})" opacity="0.85"/>`;
  }

  const lines = [defs];

  // NETWORK → COMPUTE
  lines.push(seg(net.cx, net.bottom + 2, net.cx, cmp.top - 4,
    netColor, isIsolated ? '5,4' : ''));

  // MONITORING → COMPUTE (enters right side)
  if (mon) lines.push(seg(mon.cx, mon.bottom + 2, mon.cx, cmp.top - 4, monColor, '4,3'));

  // COMPUTE → BACKUP (only if RSV asset is configured)
  if (bkp) lines.push(seg(bkp.cx, cmp.bottom + 2, bkp.cx, bkp.top - 4, bkpColor));

  svg.innerHTML = lines.join('\n');
}

async function refreshActionsData() {
  const { resources = [] } = _state;
  const toFetch = resources
    .map(r => r.vm_name)
    .filter(vm => {
      const cached = _actionsCache[vm];
      return !cached || (Date.now() - cached.fetchedAt > 30000);
    });

  for (const vm of toFetch) {
    try {
      const r = await fetch(`/api/actions/${vm}?limit=15`);
      const d = await r.json();
      _actionsCache[vm] = { actions: d.actions || [], fetchedAt: Date.now() };
    } catch (e) {}
  }
  if (toFetch.length) renderInfra();
}

function renderInfra() {
  if (_configMode) return;
  const list           = document.getElementById('incidents-list');
  const rules          = _cfgData?.detection?.rules     || [];
  const detectBackends  = _cfgData?.monitoring_backends  || [];
  const recoverBackends = (_cfgData?.assets || []).filter(a => a.type === 'azure_backup_vault');
  const discovered     = _state?.discovered_assets      || [];
  const knownResources = _cfgData?.known_resources      || [];
  const { resources = [], escalations = [], restores = [] } = _state;

  _escById = {};
  escalations.forEach(e => { _escById[e.id] = e; });
  _rulesCache = rules.slice(); // refresh index cache each render
  const restoreByVm = {};
  restores.forEach(r => { restoreByVm[r.vm_name] = r; });

  const detEscs = escalations.filter(e => e.action === 'improve_detection');
  const vmEscs  = escalations.filter(e => e.action !== 'improve_detection');

  const resourceMap = new Map();
  knownResources.forEach(r => resourceMap.set(r.resource_id, { ...r, states: [] }));
  resources.forEach(r => {
    if (resourceMap.has(r.resource_id)) resourceMap.get(r.resource_id).states = r.states;
    else resourceMap.set(r.resource_id, r);
  });
  // Ajouter les assets découverts absents du resourceMap — déduplique par vm_name
  discovered.forEach(d => {
    const exists = [...resourceMap.values()].some(r => r.vm_name === d.name);
    if (!exists) {
      const key = d.resource_id || `discovered:${d.name}`;
      resourceMap.set(key, { resource_id: key, vm_name: d.name, states: [] });
    }
  });
  vmEscs.forEach(e => {
    if (!resourceMap.has(e.resource_id))
      resourceMap.set(e.resource_id, {
        resource_id: e.resource_id,
        vm_name: e.resource_id.split('/').pop(), states: [] });
  });

  // Auto-expand VMs with active incidents
  [...resourceMap.values()].forEach(r => {
    const hasIncident = (r.states||[]).length > 0
      || vmEscs.some(e => e.resource_id === r.resource_id
           || e.resource_id.split('/').pop() === r.vm_name);
    if (hasIncident) _expandedVms.add(r.vm_name);
  });

  list.innerHTML = `
    <div class="topo-graph" id="topo-graph">
      <svg class="topo-svg" id="topo-svg"></svg>

      <!-- Layer 1 — Agent -->
      <div class="topo-layer">
        ${_renderAgentNode(rules, detectBackends, recoverBackends, discovered)}
      </div>

      <div class="topo-spacer"></div>

      <!-- Layer 2 — Modules -->
      <div class="topo-layer">
        ${_renderModules(rules, detectBackends, recoverBackends, resources)}
      </div>

      <div class="topo-spacer"></div>

      <!-- Layer 3 — Assets -->
      <div class="topo-assets" id="topo-assets">
        ${[...resourceMap.values()].map(r =>
            _renderAssetNode(r, vmEscs, restoreByVm)).join('')}
        ${resourceMap.size === 0 ? `<div style="color:var(--dim);font-size:11px;padding:24px;text-align:center;width:100%">
            No assets discovered — check monitoring backends</div>` : ''}
      </div>

      <!-- Detection rule escalations -->
      ${detEscs.length ? `<div style="padding:12px 0 0">
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);margin-bottom:8px">DETECTION RULES</div>
        ${detEscs.map(_renderEscItem).join('')}
      </div>` : ''}

      <!-- Legend -->
      <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center">
        <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);flex-shrink:0">LÉGENDE</span>
        <span style="font-size:9px;color:var(--dim)">Traits :</span>
        <span style="font-size:10px;color:var(--blue)">━━ detect</span>
        <span style="font-size:10px;color:var(--orange)">━━ protect</span>
        <span style="font-size:10px;color:var(--green)">━━ recover</span>
        <span style="font-size:10px;color:var(--red)">━━ isolé</span>
        <span style="font-size:10px;color:var(--red);letter-spacing:2px">╌╌ bloqué</span>
        <span style="font-size:10px;color:var(--purple)">━━ escalade</span>
        <span style="font-size:9px;color:var(--dim);margin-left:4px">Assets :</span>
        <span style="font-size:10px"><span style="color:var(--green)">●</span> <span style="color:var(--dim)">clean</span></span>
        <span style="font-size:10px"><span style="color:var(--orange)">●</span> <span style="color:var(--dim)">bloqué</span></span>
        <span style="font-size:10px"><span style="color:var(--red)">●</span> <span style="color:var(--dim)">isolé</span></span>
        <span style="font-size:10px"><span style="color:var(--blue)">●</span> <span style="color:var(--dim)">restauration</span></span>
        <span style="font-size:10px"><span style="color:var(--purple)">●</span> <span style="color:var(--dim)">escalade</span></span>

  requestAnimationFrame(_drawTopologyEdges);

function renderIncidents() { renderInfra(); }

// ── Agent node ─────────────────────────────────────────────────────────────────

function _renderAgentNode(rules, detectBackends, recoverBackends, discovered) {
  const moduleCount = detectBackends.length + recoverBackends.length + 1;
  const hasErr      = rules.some(r => r.last_error);
  const dot         = hasErr
    ? `<span style="color:var(--red)" title="rule error">●</span>`
    : `<span style="color:var(--green)" title="polling">●</span>`;

  return `<div class="node-agent" id="node-agent">
    <div class="node-agent-header">
      <span class="node-agent-title">GLORFINDEL</span>
      ${dot}
    </div>
    <div class="node-agent-stats">
      <span>${moduleCount} modules</span>
    </div>
  </div>`;
}

// ── Module nodes ───────────────────────────────────────────────────────────────

function _renderModules(rules, detectBackends, recoverBackends, resources) {
  // DETECT
  const detectNodes = detectBackends.map(b => {
    const bRules   = rules.filter(r => r.monitoring_backend_name === b.name);
    const hasErr   = bRules.some(r => r.last_error);
    const allPoll  = bRules.length && bRules.every(r => r.last_poll && !r.last_error);
    const lastMatch = bRules.reduce((m, r) => r.last_match && r.last_match > (m||'') ? r.last_match : m, null);
    const dot = hasErr ? `<span style="color:var(--red)">●</span>`
              : allPoll ? `<span style="color:var(--green)">●</span>`
              : `<span style="color:var(--dim)">●</span>`;
    const expandId  = `rules-${b.name.replace(/[^a-z0-9]/gi,'-')}`;
    const isExpanded = _expandedBackends.has(b.name);
    const ruleRows  = bRules.map(r => {
      const idx = _rulesCache.indexOf(r);
      const dc  = r.last_error ? 'var(--red)' : r.last_poll ? 'var(--green)' : 'var(--dim)';
      const mt  = r.last_match ? `<span style="color:var(--orange);font-size:9px;margin-left:auto">${_relTime(r.last_match)}</span>` : '';
      return `<div class="row rule-item" onclick="event.stopPropagation();showRuleByIdx(${idx})"
        style="padding:3px 4px;font-size:10px">
        <span style="color:${dc};font-size:9px">●</span>
        <span style="flex:1">${r.name}</span>
        ${r.ttp ? `<span style="color:var(--dim);font-size:9px">${r.ttp}</span>` : ''}
        ${mt}
        <span style="color:var(--dim);font-size:9px">▸</span>
      </div>`;
    }).join('');
    return `<div class="node-backend detect" id="nb-${b.name}" style="cursor:pointer;max-width:240px"
      onclick="event.stopPropagation();toggleBackend('${b.name}')">
      <div class="node-backend-name">${dot} ${b.name}</div>
      <div class="node-backend-type">${b.type}</div>
      <div class="node-backend-row" style="justify-content:space-between">
        <span>${bRules.length} règle${bRules.length>1?'s':''}</span>
        ${lastMatch ? `<span style="color:var(--orange);font-size:9px">match ${_relTime(lastMatch)}</span>` : ''}
        <span style="color:var(--blue);font-size:9px">${isExpanded ? '▾' : '▸'}</span>
      </div>
      ${hasErr ? `<div class="node-backend-row" style="color:var(--red);font-size:9px">⚠ error</div>` : ''}
      ${isExpanded ? `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">${ruleRows}</div>` : ''}
    </div>`;
  }).join('') || `<div style="color:var(--dim);font-size:10px">No monitoring backends</div>`;

  // PROTECT — capacité de réaction du provider (pas un backend configuré)
  const isIsolated  = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked   = resources.some(r => r.states?.some(s => s.type === 'blocked'));
  const isolCount   = resources.filter(r => r.states?.some(s => s.type === 'isolated')).length;
  const blockCount  = resources.reduce((n, r) =>
    n + (r.states||[]).filter(s => s.type === 'blocked').length, 0);
  const protectDot  = isIsolated ? `<span style="color:var(--red)">●</span>`
                    : isBlocked  ? `<span style="color:var(--orange)">●</span>`
                    :              `<span style="color:var(--green)">●</span>`;
  const protectRows = [
    isolCount ? `<div class="node-backend-row" style="color:var(--red)">${isolCount} isolation${isolCount>1?'s':''} active${isolCount>1?'s':''}</div>` : '',
    blockCount ? `<div class="node-backend-row" style="color:var(--orange)">${blockCount} IP${blockCount>1?'s':''} bloquée${blockCount>1?'s':''}</div>` : '',
    (!isIsolated && !isBlocked) ? `<div class="node-backend-row" style="color:var(--green)">aucune restriction</div>` : '',
  ].filter(Boolean).join('');
  const protectNode = `<div class="node-backend protect ${isIsolated ? 'state-error' : isBlocked ? 'state-warn' : ''}" id="module-protect">
    <div class="node-backend-name">${protectDot} network control</div>
    <div class="node-backend-type">cloud provider</div>
    ${protectRows}
  </div>`;

  // RECOVER
  const recoverNodes = recoverBackends.map(b => {
    const checks = (_auditData?.audits || []).flatMap(a =>
      (a.checks||[]).filter(c => c.action === 'restore_from_backup'));
    const hasError = !!_auditData?.error;
    const worst = hasError         ? 'error'
                : _auditLoading    ? 'loading'
                : _auditData === null ? 'pending'
                : checks.some(c => c.status === 'fail') ? 'fail'
                : checks.some(c => c.status === 'warn') ? 'warn'
                : checks.length    ? 'ok'
                :                    'nodata';
    const dot = worst==='ok'      ? `<span style="color:var(--green)">●</span>`
              : worst==='warn'    ? `<span style="color:var(--orange)">●</span>`
              : worst==='fail'    ? `<span style="color:var(--red)">●</span>`
              : worst==='error'   ? `<span style="color:var(--red)">●</span>`
              :                     `<span style="color:var(--dim)">●</span>`;
    const lastRun = _auditLastRun
      ? `<div class="node-backend-row" style="color:var(--dim);font-size:9px">audit ${_relTime(_auditLastRun)}</div>` : '';
    const statusRow = worst==='ok'
      ? `<div class="node-backend-row" style="color:var(--green)">backup ok</div>`
      : worst==='warn'
      ? `<div class="node-backend-row" style="color:var(--orange)">backup stale</div>`
      : worst==='fail'
      ? `<div class="node-backend-row" style="color:var(--red)">backup manquant</div>`
      : worst==='error'
      ? `<div class="node-backend-row" style="color:var(--red);font-size:9px">erreur Azure API</div>`
      : worst==='loading'
      ? `<div class="node-backend-row" style="color:var(--dim)"><span class="spinner"></span>audit…</div>`
      : worst==='nodata'
      ? `<div class="node-backend-row" style="color:var(--dim)">aucun asset audité</div>`
      : `<div class="node-backend-row" style="color:var(--dim)">audit en attente
          <button class="action" style="font-size:9px;padding:1px 5px;margin-left:4px"
            onclick="event.stopPropagation();refreshAuditData()">↺</button></div>`;
    const refreshBtn = worst !== 'loading'
      ? `<div class="node-backend-row" style="margin-top:2px">
           <button class="action" style="font-size:9px;padding:1px 5px"
             onclick="event.stopPropagation();refreshAuditData()">↺ audit</button>
         </div>` : '';
    return `<div class="node-backend recover ${worst==='fail'||worst==='error'?'state-error':worst==='warn'?'state-warn':''}" id="nb-${b.name}">
      <div class="node-backend-name">${dot} ${b.name}</div>
      <div class="node-backend-type">backup vault</div>
      ${statusRow}
      ${lastRun}
      ${refreshBtn}
    </div>`;
  }).join('') || `<div style="color:var(--dim);font-size:10px">No action backends</div>`;

  return `<div class="topo-modules">
    <div class="topo-module">
      <div class="topo-module-label detect">DETECT</div>
      <div class="topo-module-nodes">${detectNodes}</div>
    </div>
    <div class="topo-module">
      <div class="topo-module-label protect">PROTECT</div>
      <div class="topo-module-nodes">${protectNode}</div>
    </div>
    <div class="topo-module">
      <div class="topo-module-label recover">RECOVER</div>
      <div class="topo-module-nodes">${recoverNodes}</div>
    </div>
  </div>`;
}

// ── Asset nodes ────────────────────────────────────────────────────────────────

function _renderAssetNode(resource, vmEscs, restoreByVm) {
  const { resource_id, vm_name, states = [] } = resource;
  const isIsolated  = states.some(s => s.type === 'isolated');
  const isBlocked   = states.some(s => s.type === 'blocked');
  const restoreInfo = restoreByVm[vm_name];
  const myEscs      = vmEscs.filter(e =>
    e.resource_id === resource_id || e.resource_id.split('/').pop() === vm_name);
  const isExpanded  = _expandedVms.has(vm_name);

  const stateClass = restoreInfo    ? 's-restoring'
                   : (isIsolated && isBlocked) ? 's-both'
                   : isIsolated     ? 's-isolated'
                   : isBlocked      ? 's-blocked'
                   : myEscs.length  ? 's-incident'
                   : 's-clean';

  const dot = restoreInfo   ? `<span style="color:var(--blue)">●</span>`
            : isIsolated    ? `<span style="color:var(--red)">●</span>`
            : isBlocked     ? `<span style="color:var(--orange)">●</span>`
            : myEscs.length ? `<span style="color:var(--purple)">●</span>`
            :                 `<span style="color:var(--green)">●</span>`;

  const stateBadges = [
    restoreInfo ? `<span class="badge restoring" style="font-size:9px">🔄 RESTORING · ${restoreInfo.elapsed_label}</span>` : '',
    ...states.map(s => s.type === 'isolated'
      ? `<span class="badge isolated" style="font-size:9px">ISOLATED · ${age(s.since)}</span>`
      : `<span class="badge blocked" style="font-size:9px">BLOCKED ${s.ip} · ${age(s.since)}</span>`)
  ].filter(Boolean).join('');

  const auditEntry = (_auditData?.audits || []).find(a => a.resource_id === resource_id);
  const readiness  = auditEntry
    ? ACTION_GROUPS.map(g => {
        const st = _worstStatus(auditEntry.checks, g.actions);
        const [ic, col] = st==='ok' ? ['✓','var(--green)'] : st==='warn' ? ['⚠','var(--orange)']
                        : st==='fail' ? ['✗','var(--red)'] : ['—','var(--dim)'];
        return `<span style="font-size:9px"><span style="color:${col}">${ic}</span> ${g.label}</span>`;
      }).join('  ')
    : '';

  const cached = _actionsCache[vm_name];
  const decisionHtml = (cached?.actions || [])
    .filter(a => a.action !== 'improve_detection')
    .slice(0, 2).map((a, idx) => {
    const pct = a.confidence ? Math.round(a.confidence * 100) + '%' : '';
    const hasDetail = !!a.full_reasoning;
    return `<div class="dec-row ${hasDetail ? 'dec-clickable' : ''}"
      ${hasDetail ? `onclick="event.stopPropagation();showReasoning('${vm_name}',${idx})"` : ''}>
      <span class="dec-action">${actionLabel(a.action)}</span>
      ${pct ? `<span class="dec-conf">${pct}</span>` : ''}
      ${a.ttp ? `<span class="dec-ttp">${a.ttp}</span>` : ''}
      ${hasDetail ? `<span style="color:var(--blue);font-size:10px;margin-left:auto">▸ reasoning</span>` : ''}
    </div>`;
  }).join('');

  const actions = [];
  if (isIsolated) actions.push(`<button class="action danger" onclick="event.stopPropagation();confirmRelease('${vm_name}')">↩️ Release</button>`);
  if (isBlocked)  actions.push(`<button class="action danger" onclick="event.stopPropagation();confirmUnblock('${vm_name}')">↩️ Unblock</button>`);
  if (isIsolated && isBlocked) actions.push(`<button class="action danger" onclick="event.stopPropagation();confirmReset('${vm_name}')">⟳ Reset</button>`);
  if (!restoreInfo && myEscs.some(e => e.action === 'restore_from_backup'))
    actions.push(`<button class="action primary" onclick="event.stopPropagation();confirmRestore('${vm_name}')">🔄 Restore</button>`);

  const isClean = !isIsolated && !isBlocked && !restoreInfo && !myEscs.length;

  const expandedBody = `
    ${stateBadges ? `<div class="node-asset-states">${stateBadges}</div>` : ''}
    ${decisionHtml ? `<div class="map-decision" style="margin-top:8px">${decisionHtml}</div>` : ''}
    ${actions.length ? `<div class="node-asset-actions">${actions.join('')}</div>` : ''}
    ${myEscs.length ? `<div class="vm-escalations" style="margin:8px 0 0;padding:8px 0 0;border-top:1px solid var(--border)">
      ${myEscs.map(_renderEscItem).join('')}
    </div>` : ''}`;

  const compactBody = isClean ? '' : `
    <div class="node-asset-states" style="margin-top:6px">${stateBadges}</div>
    ${myEscs.length ? `<div style="margin-top:6px;font-size:10px;color:var(--orange)">🚨 ${myEscs.length} escalade${myEscs.length>1?'s':''}</div>` : ''}
    ${actions.length ? `<div class="node-asset-actions">${actions.join('')}</div>` : ''}`;

  return `<div class="node-asset ${stateClass} ${isExpanded ? 'expanded' : ''}"
    id="asset-${vm_name}" onclick="toggleAsset('${vm_name}')">

// ── Topology edge drawing ──────────────────────────────────────────────────────

function _drawTopologyEdges() {
  const svg   = document.getElementById('topo-svg');
  const graph = document.getElementById('topo-graph');
  if (!svg || !graph) return;
  const base = graph.getBoundingClientRect();

  function pt(el, side) {
    if (!el) return null;
    const r = el.getBoundingClientRect();
    const x = r.left - base.left + r.width / 2;
    return {
      x,
      top:    r.top    - base.top,
      bottom: r.bottom - base.top,
      left:   r.left   - base.left,
      right:  r.right  - base.left,
      width:  r.width,
    };
  }

  function bezier(x1, y1, x2, y2, color, dash = '', width = 2.5, opacity = 0.75) {
    const cy = (y1 + y2) / 2;
    return `<path d="M${x1|0},${y1|0} C${x1|0},${cy|0} ${x2|0},${cy|0} ${x2|0},${y2|0}"
      fill="none" stroke="${color}" stroke-width="${width}" opacity="${opacity}"
      stroke-linecap="round"
      ${dash ? `stroke-dasharray="${dash}"` : ''}/>`;
  }

  const rules           = _cfgData?.detection?.rules    || [];
  const detectBackends  = _cfgData?.monitoring_backends || [];
  const recoverBackends = (_cfgData?.assets || []).filter(a => a.type === 'azure_backup_vault');
  const { resources = [], escalations = [] } = _state;
  const isIsolated = resources.some(r => r.states?.some(s => s.type === 'isolated'));
  const isBlocked  = resources.some(r => r.states?.some(s => s.type === 'blocked'));

  const agent = pt(document.getElementById('node-agent'));
  if (!agent) return;

  const lines = [`<defs>
    <filter id="glow-r"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-o"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`];

  // Agent → DETECT backends (always blue — identity color)
  detectBackends.forEach(b => {
    const nb = pt(document.getElementById(`nb-${b.name}`));
    if (!nb) return;
    lines.push(bezier(agent.x, agent.bottom, nb.x, nb.top, 'var(--blue)'));
  });

  // Agent → PROTECT (always orange — identity color, state shown in node)
  const nbNsg = pt(document.getElementById('module-protect'));
  if (nbNsg) {
    lines.push(bezier(agent.x, agent.bottom, nbNsg.x, nbNsg.top, 'var(--orange)'));
  }

  // Agent → RECOVER backends (always green — identity color, state shown in node)
  recoverBackends.forEach(b => {
    const nb = pt(document.getElementById(`nb-${b.name}`));
    if (!nb) return;
    lines.push(bezier(agent.x, agent.bottom, nb.x, nb.top, 'var(--green)'));
  });

  // Structural edges: modules → assets (always visible, dim)
  const discovered = _state?.discovered_assets || [];
  const assetEls = [...document.querySelectorAll('[id^="asset-"]')];

  assetEls.forEach(el => {
    const vmName  = el.id.replace('asset-', '');
    const asset   = pt(el);
    if (!asset) return;

    // DETECT → VM  (via the monitoring backend that discovered it)
    const disc = discovered.find(d => d.name === vmName);
    const detNb = disc
      ? pt(document.getElementById(`nb-${disc.monitoring_backend}`))
      : detectBackends.length ? pt(document.getElementById(`nb-${detectBackends[0].name}`)) : null;
    if (detNb) lines.push(bezier(detNb.x, detNb.bottom, asset.x, asset.top,
      'var(--blue)', '', 1.5, 0.3));

    // PROTECT → VM  (rouge si isolé/bloqué, orange dim si clean)
    if (nbNsg) {
      const vmRes = resources.find(r => r.vm_name === vmName || r.resource_id.endsWith(vmName));
      const vmIso = vmRes?.states?.some(s => s.type === 'isolated');
      const vmBlk = vmRes?.states?.some(s => s.type === 'blocked');
      if (vmIso) {
        // isolé — rouge plein
        lines.push(bezier(nbNsg.x, nbNsg.bottom, asset.x, asset.top, 'var(--red)', '', 1.5, 0.7));
      } else if (vmBlk) {
        // bloqué — rouge tirets
        lines.push(bezier(nbNsg.x, nbNsg.bottom, asset.x, asset.top, 'var(--red)', '6,4', 1.5, 0.7));
      } else {
        // clean — orange dim
        lines.push(bezier(nbNsg.x, nbNsg.bottom, asset.x, asset.top, 'var(--orange)', '', 1.5, 0.2));
      }
    }

    // RECOVER → VM  (RSV covers all discovered assets)
    recoverBackends.forEach(b => {
      const nb = pt(document.getElementById(`nb-${b.name}`));
      if (nb) lines.push(bezier(nb.x, nb.bottom, asset.x, asset.top,
        'var(--green)', '', 1.5, 0.3));
    });
  });

  // Incident edges: modules → assets with active escalations (brighter, dashed)
  escalations.forEach(e => {
    const vm    = e.resource_id.split('/').pop();
    const asset = pt(document.getElementById(`asset-${vm}`));
    if (!asset) return;
    const color = e.action === 'restore_from_backup'          ? 'var(--cyan)'
                : e.action === 'isolate_vm'                   ? 'var(--red)'
                : e.action === 'block_suspicious_ip'          ? 'var(--orange)'
                : e.action === 'improve_detection'            ? 'var(--blue)'
                : e.escalation_type === 'verification_failed' ? 'var(--red)'
                : 'var(--purple)';
    const nb = e.action === 'restore_from_backup'
      ? pt(document.getElementById(`nb-${recoverBackends[0]?.name}`))
      : e.action === 'improve_detection'
      ? pt(document.getElementById(`nb-${detectBackends[0]?.name}`))
      : pt(document.getElementById('module-protect'));
    if (nb) lines.push(bezier(nb.x, nb.bottom, asset.x, asset.top, color, '', 2.5, 0.85));
  });

  svg.innerHTML = lines.join('\n');
}

async function doApproveRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/approve-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      toast(`✓ Rule '${d.rule_name}' added to detection_rules.yaml — restart watch to activate`);
      await doAck(escId);
      refreshState();
    } else {
      toast('Error: ' + (d.error || 'unknown'), true);
    }
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function doRejectRule(proposalId, escId) {
  try {
    const r = await fetch(`/api/action/reject-rule/${proposalId}`, {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      toast(`✗ Rule '${d.rule_name}' rejected`);
      await doAck(escId);
      refreshState();
    } else {
      toast('Error: ' + (d.error || 'unknown'), true);
    }
  } catch (e) { toast('Error: ' + e.message, true); }
}

// ── Feed ───────────────────────────────────────────────────────────────────────

function appendFeedEntry(entry) {
  const list = document.getElementById('feed-list');
  const el = document.createElement('div');
  el.className = 'feed-entry';

  const ts = fmtTime(entry.timestamp);

  if (entry.type === 'signal') {
    const cls = 'ev-' + entry.event;
    const icons = {
      attack_started: '▶',
      detection: '✓',
      detection_timeout: '⚠',
      recovery_complete: '↺',
      recovery_failed: '✗',
    };
    const icon = icons[entry.event] || '·';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${entry.event}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>`;
  } else {
    const icon = entry.escalate ? '🚨' : entry.verified ? '✓' : entry.verified === false ? '✗' : '⚡';
    const cls  = entry.escalate ? 'act-esc' : entry.verified ? 'act-ok' : entry.verified === false ? 'act-err' : 'act-run';
    const label = entry.escalate ? 'escalate → ' + entry.action : entry.action;
    const pct = entry.confidence ? Math.round(entry.confidence * 100) + '%' : '';
    el.innerHTML = `
      <span class="feed-ts">${ts}</span>
      <span class="feed-event ${cls}">${icon} ${label}</span>
      <span class="feed-meta">${entry.ttp || ''} ${entry.vm || ''}</span>
      <span class="feed-pct">${pct}</span>`;
  }

  list.appendChild(el);

  if (_autoScroll) {
    list.scrollTop = list.scrollHeight;
  }
}

document.getElementById('feed-list').addEventListener('scroll', function () {
  const el = this;
  _autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
});

// ── WebSocket ──────────────────────────────────────────────────────────────────

let _ws = null;
let _wsRetry = 1000;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  _ws = new WebSocket(`${proto}://${location.host}/api/feed`);

  _ws.onopen = () => {
    _wsRetry = 1000;
    document.getElementById('live-dot').classList.remove('disconnected');
    document.getElementById('live-label').textContent = 'live';
    document.getElementById('feed-list').innerHTML = '';
  };

  _ws.onmessage = (evt) => {
    try {
      const entry = JSON.parse(evt.data);
      appendFeedEntry(entry);
      if (entry.type === 'action' || entry.escalate) {
        refreshState();
      }
    } catch (e) {}
  };

  _ws.onclose = () => {
    document.getElementById('live-dot').classList.add('disconnected');
    document.getElementById('live-label').textContent = 'reconnecting…';
    setTimeout(connectWS, _wsRetry);
    _wsRetry = Math.min(_wsRetry * 2, 10000);
  };

  _ws.onerror = () => _ws.close();
}

// ── Watch status ───────────────────────────────────────────────────────────────

async function refreshWatchStatus() {
  try {
    const r = await fetch('/api/watch/status');
    const d = await r.json();
    const dot   = document.getElementById('watch-dot');
    const label = document.getElementById('watch-label');
    if (d.status === 'running') {
      dot.style.color   = 'var(--green)';
      label.textContent = 'watch active';
      label.style.color = 'var(--green)';
    } else if (d.status === 'stale') {
      dot.style.color   = 'var(--orange)';
      label.textContent = 'watch stale';
      label.style.color = 'var(--orange)';
    } else if (d.status === 'stopped') {
      dot.style.color   = 'var(--red)';
      label.textContent = 'watch stopped';
      label.style.color = 'var(--red)';
    } else {
      dot.style.color   = 'var(--dim)';
      label.textContent = 'watch unknown';
      label.style.color = 'var(--dim)';
    }
  } catch (e) {}
}

setInterval(refreshWatchStatus, 15000);

function mask(s, keep = 8) {
  if (!s) return '—';
  return s.slice(0, keep) + '…' + s.slice(-4);
}

function ttpStatus(c) {
  if (c.detected && c.timeout) return ['⚠ partial', 'warn'];
  if (c.detected)  return ['✓ detected', 'ok'];
  if (c.timeout)   return ['✗ timeout', 'err'];
  return ['— unknown', 'dim'];
}

function _relTime(iso) {
  if (!iso) return '—';
  const age = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (age < 60) return `${age}s ago`;
  if (age < 3600) return `${Math.floor(age / 60)}m ago`;
  return `${Math.floor(age / 3600)}h ago`;
}

function showRuleDetail(rule) {
  const statusTxt = rule.last_error
    ? `⚠ error: ${rule.last_error}`
    : rule.last_match
      ? `✓ last match ${_relTime(rule.last_match)} · ${rule.match_count} total`
      : rule.last_poll
        ? `polled ${_relTime(rule.last_poll)} · no match yet`
        : 'not polled yet';

  document.getElementById('modal-title').textContent =
    `${rule.name}${rule.ttp ? '  ·  ' + rule.ttp : ''}`;

  const bodyEl = document.getElementById('modal-body');
  bodyEl.innerHTML = `
    <div style="margin-bottom:8px;color:var(--text)">${rule.description || '—'}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
      <span class="cfg-badge dim">${rule.source}</span>
      <span class="cfg-badge dim">backend: ${rule.monitoring_backend_name || '—'}</span>
      <span class="cfg-badge dim">every ${rule.interval_s}s</span>
      ${rule.last_error
        ? '<span class="cfg-badge err">error</span>'
        : rule.last_match
          ? '<span class="cfg-badge ok">matched</span>'
          : '<span class="cfg-badge dim">no match</span>'}
    </div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px">${statusTxt}</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Query</div>
    <div class="modal-query">${(rule.query||'').trim()}</div>`;

  document.getElementById('modal-cmd').style.display = 'none';
  const btn = document.getElementById('modal-confirm');
  btn.textContent = 'Close';
  btn.className = 'action';
  btn.onclick = closeModal;
  document.querySelector('.modal').classList.add('wide');
  document.getElementById('modal').classList.add('open');
}

function showRuleByIdx(idx) {

// ── Data constants (used by infra cards) ──────────────────────────────────────

const ACTION_GROUPS = [
  { label: 'NSG',    actions: ['isolate_vm', 'block_suspicious_ip'] },
  { label: 'Backup', actions: ['restore_from_backup'] },
  { label: 'Compute',actions: ['snapshot'] },
];

function _worstStatus(checks, actions) {
  const relevant = checks.filter(c =>
    actions.some(a => c.action.split(/,\s*/).includes(a)));
  if (!relevant.length) return 'skip';
  if (relevant.some(c => c.status === 'fail'))  return 'fail';
  if (relevant.some(c => c.status === 'warn'))  return 'warn';
  if (relevant.every(c => c.status === 'ok'))   return 'ok';
  return 'skip';
}

// ── Config + audit data refresh ────────────────────────────────────────────────

async function refreshCfgData() {
  try {
    const r = await fetch('/api/config');
    _cfgData = await r.json();
    renderInfra();
  } catch (e) {}
}

async function refreshAuditData() {
  if (_auditLoading) return;
  _auditLoading = true;
  renderInfra();
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch('/api/audit', { signal: ctrl.signal });
    _auditData    = await r.json();
    _auditLastRun = new Date().toISOString();
  } catch (e) {
    _auditData = { audits: [], error: e.name === 'AbortError' ? 'timeout (20s)' : e.message };
  } finally {
    clearTimeout(timer);
    _auditLoading = false;
    renderInfra();
  }
}

// ── Init ───────────────────────────────────────────────────────────────────────

(async function init() {
  await loadScenarios();
  await refreshCfgData();     // detection rules + known resources → renderInfra
  await refreshState();       // active incidents → renderInfra
  await refreshWatchStatus();
  connectWS();
  setInterval(refreshCfgData,   30000);  // rules polling status
  setInterval(refreshAuditData, 300000); // backup/compute readiness (slow, Azure API)
  refreshAuditData();                    // first audit in background
})();
