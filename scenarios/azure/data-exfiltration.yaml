name: azure-data-exfiltration
description: Simulate large outbound data transfer, validate network anomaly detection
mitre: T1041
version: "1.0.0"

target:
  type: azure_vm
  resource_group: annatar
  vm_name: vm-annatar-victim
  log_analytics_workspace_id: "b451c51a-1cd0-4125-ac70-6aaf2c1dc209"

prerequisites:
  detection:
    - name: storage_blob_logs
      table: StorageBlobLogs
      why: detection query reads PutBlob operations — requires diagnostic settings on the storage account
      verify: "StorageBlobLogs | where AccountName == 'stannatarexfil' | where TimeGenerated > ago(1h) | limit 1"
      setup: "az monitor diagnostic-settings create --resource <storage_id> --workspace <workspace_id> --logs '[{\"category\":\"StorageBlobLogs\",\"enabled\":true}]'"
    - name: vm_managed_identity
      why: exfil_sim.sh uploads via MSI — VM needs Storage Blob Data Contributor on the storage account
      verify: "az role assignment list --assignee <vm_principal_id> --scope <storage_id>"
      setup: "az role assignment create --assignee <vm_principal_id> --role 'Storage Blob Data Contributor' --scope <storage_id>"

setup:
  - name: prepare_test_volume
    action: run_script_on_vm
    script: scripts/vm/setup_testdata.sh  # Cleans residuals from previous runs, ensures marker

steps:
  - name: exfiltrate_synthetic_data
    action: run_script_on_vm
    script: scripts/vm/exfil_sim.sh
    record: T0

detection:
  source: azure_monitor
  query: |
    StorageBlobLogs
    | where AccountName == "stannatarexfil"
    | where OperationName == "PutBlob"
    | where ObjectKey has "exfil-target"
    | where TimeGenerated > ago(5m)
    | project TimeGenerated, CallerIpAddress, ObjectKey, ResponseBodySize
  # StorageBlobLogs populated in seconds via diagnostic settings on stannatarexfil.
  # CallerIpAddress = VM's public IP — passed to block_suspicious_ip.
  # Requires: terraform apply -target=azurerm_monitor_diagnostic_setting.exfil_storage
  timeout: "300s"

# No recovery for exfiltration — detection only
recovery: null

cleanup: []
