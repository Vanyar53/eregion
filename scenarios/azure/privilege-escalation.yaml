name: azure-privilege-escalation
description: >
  Simulate T1548.003 — attacker with a foothold on the VM escalates to root via a
  misconfigured sudoers wildcard entry. Validates that Glorfindel isolates the VM
  on confirmed OS-level compromise.
mitre: T1548.003
version: "1.0.0"

target:
  type: azure_vm
  resource_group: annatar
  vm_name: vm-annatar-victim

prerequisites:
  detection:
    - name: syslog_dcr
      table: Syslog
      why: detection query reads auth facility — same DCR pipeline as T1110.001
      verify: "Syslog | where Facility == 'auth' | where TimeGenerated > ago(1h) | where Computer == 'vm-annatar-victim' | limit 1"
      setup: "Create a DCR with Syslog data source (facility: auth, level: Warning) and associate it with the VM"
    - name: ama_heartbeat
      table: Heartbeat
      why: AMA must be running — NSG isolation from a previous run blocks AMA (outbound deny-all), causing detection timeout
      verify: "Heartbeat | where TimeGenerated > ago(5m) | where Computer == 'vm-annatar-victim' | limit 1"
      setup: "If AMA is silenced by a stale isolation: glorfindel release <resource_id> --yes, then wait ~2 min for AMA to reconnect"

setup:
  - name: prepare_test_volume
    action: run_script_on_vm
    script: scripts/vm/setup_testdata.sh

steps:
  - name: simulate_privilege_escalation
    action: run_script_on_vm
    script: scripts/vm/privilege_escalation_sim.sh
    record: T0

detection:
  source: azure_monitor
  workspace_id: "b451c51a-1cd0-4125-ac70-6aaf2c1dc209"  # Log Analytics Workspace ID — replace with yours
  query: |
    Syslog
    | where Facility == "auth"
    | where TimeGenerated > ago(5m)
    | where SyslogMessage has "sudo"
          and SyslogMessage has "USER=root"
          and SyslogMessage has "COMMAND="
    | where SyslogMessage !has "NOT in sudoers"
          and SyslogMessage !has "authentication failure"
    | project TimeGenerated, Computer, SyslogMessage
    | limit 1
  # Syslog DCR collects auth.warning — same pipeline as T1110.001 (~60s latency).
  timeout: "300s"

# No disk restore needed — no data files were modified, only syslog entries injected.
# After isolation, the operator decides: forensic examination or restore_from_backup.
recovery: null

cleanup: []
