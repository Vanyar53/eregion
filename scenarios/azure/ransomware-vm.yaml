name: azure-ransomware-vm
description: Simulate ransomware file encryption on a test data volume, validate
  detection and RTO
mitre: T1486
version: "1.0.0"

# ─── Target ────────────────────────────────────────────────────────────────────
# The VM where the attack is simulated. Must be in a resource group tagged
# annatar-test: "true" — Annatar refuses to run on untagged resources.
#
# CLIENT SETUP:
#   1. Deploy the test VM via `annatar init` (or your own Terraform).
#   2. Point log_analytics_workspace_id at your existing Log Analytics Workspace.
#      The VM's OMS agent must be sending Perf/Heartbeat data to that workspace.
#      Find the workspace ID: Azure Portal → Log Analytics → Properties → Workspace ID
target:
  type: azure_vm
  resource_group: annatar            # Resource group of the test VM
  vm_name: vm-annatar-victim         # Name of the test VM
  log_analytics_workspace_id: "b451c51a-1cd0-4125-ac70-6aaf2c1dc209"

setup:
  - name: initialize_test_volume
    action: run_script_on_vm
    script: scripts/vm/setup_testdata.sh  # Creates marker, removes residuals from previous runs

# ─── Attack steps ──────────────────────────────────────────────────────────────
# T0 is the moment the attack starts. All timings are measured from T0.
steps:
  - name: mass_encrypt_data_volume
    action: run_script_on_vm
    script: scripts/vm/ransomware_sim.sh  # Encrypts /mnt/testdata with openssl, leaves enc_*.dat artifacts
    record: T0                         # Start the RTO clock here

# ─── Detection ─────────────────────────────────────────────────────────────────
# Annatar polls your Log Analytics Workspace until this KQL query returns results.
# T1 = moment the alert fires. detection_s = T1 − T0.
#
# CLIENT SETUP:
#   Replace this query with whatever alert query your SOC / Azure Monitor rule uses.
#   The default detects a Disk Write spike > 50 MB/s — typical ransomware I/O pattern.
#   time_max is your declared detection SLA. FAIL if the alert takes longer.
detection:
  source: azure_monitor
  query: |
    Perf
    | where ObjectName == "Logical Disk" and CounterName == "Disk Write Bytes/sec"
    | where CounterValue > 52428800
    | where TimeGenerated > ago(10m)
    | summarize MaxWrite = max(CounterValue) by bin(TimeGenerated, 1m), Computer
  timeout: "300s"   # Give up polling after this duration (not a SLA — just a hard stop)
  time_max: "180s"  # Declared detection SLA. FAIL if detection_s > time_max.
  record: T1

# ─── Recovery ──────────────────────────────────────────────────────────────────
# Annatar triggers an Azure Backup OriginalLocation restore, then:
#   - Waits for a Heartbeat in LAW to confirm the VM is back online (T3)
#   - Runs scripts/verify_restore.sh on the VM to confirm disk is in clean state
# recovery_s = T3 − T0.  FAIL if recovery_s > time_max, or integrity check fails.
#
# CLIENT SETUP:
#   Replace vault with the name of the Recovery Services Vault that protects this VM.
#   The vault must have at least one recovery point — run a backup before the test.
#   time_max is your declared RTO. If recovery takes longer, the test fails.
#   heartbeat_timeout is how long to wait for the VM to come back before giving up.
recovery:
  action: azure_backup_restore
  vault: rsv-annatar      # Name of your Recovery Services Vault
  data_disk_snapshot: snap-annatar-testdata  # Snapshot of clean data disk (Azure Backup V1 does not restore externally-attached data disks)
  time_max: "1800s"       # Declared RTO = 30 minutes. Adjust to your organisation's SLA.
  heartbeat_timeout: "600s"  # Max wait for VM heartbeat after restore completes
  record: T3

cleanup:
  - name: remove_attack_artifacts
    action: run_script_on_vm
    script: scripts/vm/cleanup_testdata.sh  # Fallback if restore failed — removes enc_*.dat manually
