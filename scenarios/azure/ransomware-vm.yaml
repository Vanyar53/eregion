name: azure-ransomware-vm
description: Simulate ransomware file encryption on a test data volume, validate detection and RTO
mitre: T1486
version: "1.0.0"

target:
  type: azure_vm
  resource_group: rg-annatar-test          # Must be tagged annatar-test: "true"
  vm_name: vm-annatar-victim
  log_analytics_workspace_id: ""           # Fill with your LAW workspace ID

setup: []

steps:
  - name: mass_encrypt_data_volume
    action: run_script_on_vm
    script: scripts/ransomware_sim.sh
    record: T0

detection:
  source: azure_monitor
  query: |
    Perf
    | where ObjectName == "Logical Disk" and CounterName == "Disk Write Bytes/sec"
    | where CounterValue > 52428800
    | where TimeGenerated > ago(10m)
  timeout: "300s"
  record: T1

recovery:
  action: azure_backup_restore
  vault: rsv-annatar
  record: T3

thresholds:
  detection_time_max: "120s"
  recovery_time_max: "1800s"     # RTO déclaré = 30 minutes

cleanup: []
